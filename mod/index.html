<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/favicon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mod Panel — ContentLore</title>
<meta name="robots" content="noindex,nofollow">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:oklch(0.10 0.04 190);--fg:oklch(0.97 0.02 320);--card:oklch(0.14 0.05 190);--card2:oklch(0.19 0.06 190);--ink-dim:oklch(0.78 0.05 320);--ink-faint:oklch(0.55 0.06 190);--signal:oklch(0.82 0.20 195);--signal-dim:oklch(0.65 0.18 195);--border:oklch(0.28 0.06 190);--green:oklch(0.82 0.22 145);--red:oklch(0.68 0.27 25);--font-d:'Bebas Neue',Impact,sans-serif;--font-m:'JetBrains Mono',monospace;--font-b:'Inter',system-ui,sans-serif}
html{background:var(--bg);color-scheme:dark}
body{background:var(--bg);color:var(--fg);font-family:var(--font-b);-webkit-font-smoothing:antialiased}
.login{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
.login-box{background:var(--card);border:1px solid var(--border);padding:32px;max-width:360px;width:100%}
.login-box h1{font-family:var(--font-d);font-size:28px;margin-bottom:16px}
.login-box input{width:100%;padding:10px 12px;background:var(--bg);border:1px solid var(--border);color:var(--fg);font-family:var(--font-m);font-size:13px;margin-bottom:12px}
.login-box input:focus{outline:none;border-color:var(--signal)}
.login-box button{width:100%;padding:10px;background:var(--signal);color:var(--bg);border:none;font-family:var(--font-d);font-size:16px;letter-spacing:2px;cursor:pointer}
.login-box .err{color:var(--red);font-size:12px;margin-top:8px;display:none}

.app{display:none}
.nav{height:48px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;position:sticky;top:0;z-index:100}
.nav-brand{font-family:var(--font-d);font-size:20px;letter-spacing:2px;margin-right:auto;display:flex;align-items:center;gap:8px}
.nav-brand img{height:32px}
.nav-brand .mod-tag{font-family:var(--font-m);font-size:9px;color:var(--bg);background:var(--red);padding:2px 6px;letter-spacing:1px}
.nav a{font-family:var(--font-m);font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--ink-faint);text-decoration:none;padding:0 12px}
.nav a:hover{color:var(--fg)}

.mx{max-width:1200px;margin:0 auto;padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:24px}
.kpi{background:var(--card);border:1px solid var(--border);padding:16px}
.kpi .v{font-family:var(--font-d);font-size:32px;line-height:1}
.kpi .l{font-family:var(--font-m);font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--ink-faint);margin-top:4px}
.kpi .v.ok{color:var(--green)}
.kpi .v.warn{color:oklch(0.78 0.20 60)}
.kpi .v.signal{color:var(--signal)}

.sh{font-family:var(--font-d);font-size:24px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.panel{background:var(--card);border:1px solid var(--border);padding:16px;margin-bottom:16px}
.panel h3{font-family:var(--font-d);font-size:18px;margin-bottom:10px}

.btn{font-family:var(--font-m);font-size:11px;text-transform:uppercase;letter-spacing:1px;padding:8px 16px;border:1px solid var(--border);background:var(--card2);color:var(--fg);cursor:pointer;transition:all .2s;margin-right:6px;margin-bottom:6px}
.btn:hover{border-color:var(--signal);color:var(--signal)}
.btn.danger{border-color:var(--red);color:var(--red)}
.btn.danger:hover{background:var(--red);color:var(--bg)}
.btn:disabled{opacity:.4;cursor:not-allowed}

.log{background:var(--bg);border:1px solid var(--border);padding:12px;font-family:var(--font-m);font-size:11px;color:var(--ink-dim);max-height:200px;overflow-y:auto;white-space:pre-wrap;margin-top:8px}

table{width:100%;border-collapse:collapse;margin-top:8px}
th{font-family:var(--font-m);font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--ink-faint);text-align:left;padding:8px;border-bottom:1px solid var(--border)}
td{padding:8px;border-bottom:1px solid oklch(0.28 0.06 190/.4);font-size:13px;color:var(--ink-dim)}
td:first-child{font-family:var(--font-d);font-size:15px;color:var(--fg)}
.badge{font-family:var(--font-m);font-size:9px;text-transform:uppercase;letter-spacing:1px;padding:2px 6px}
.badge.live{color:var(--green);background:oklch(0.82 0.22 145/.1);border:1px solid oklch(0.82 0.22 145/.3)}
.badge.offline{color:var(--ink-faint);background:oklch(0.55 0.06 190/.1);border:1px solid oklch(0.55 0.06 190/.3)}
.badge.kick{color:oklch(0.82 0.22 145)}
.badge.twitch{color:oklch(0.65 0.25 295)}

.tabs{display:flex;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{font-family:var(--font-m);font-size:11px;text-transform:uppercase;letter-spacing:2px;padding:10px 16px;cursor:pointer;color:var(--ink-faint);border-bottom:2px solid transparent;transition:all .2s}
.tab:hover{color:var(--fg)}
.tab.active{color:var(--signal);border-bottom-color:var(--signal)}
.tab-content{display:none}
.tab-content.active{display:block}

::selection{background:var(--signal);color:var(--bg)}
</style>
</head>
<body>

<div class="login" id="login">
  <div class="login-box">
    <h1>Mod Panel</h1>
    <input type="password" id="pw" placeholder="Admin token" onkeydown="if(event.key==='Enter')doLogin()">
    <button onclick="doLogin()">Authenticate</button>
    <div class="err" id="err">Invalid token</div>
  </div>
</div>

<div class="app" id="app">
  <nav class="nav">
    <div class="nav-brand"><img src="/logo.png" alt="CL"><span class="mod-tag">MOD</span></div>
    <a href="/" target="_blank">Site</a>
    <a href="/gta-rp/" target="_blank">Hub</a>
    <a href="#" onclick="doLogout()">Logout</a>
  </nav>

  <div class="mx">
    <div class="grid" id="kpis"></div>

    <div class="tabs">
      <div class="tab active" onclick="switchTab('dashboard')">Dashboard</div>
      <div class="tab" onclick="switchTab('creators')">Creators</div>
      <div class="tab" onclick="switchTab('controls')">Controls</div>
      <div class="tab" onclick="switchTab('discovery')">Discovery</div>
    </div>

    <div class="tab-content active" id="tab-dashboard">
      <div class="sh">Live Now</div>
      <div class="panel" id="live-panel"><div class="log">Loading...</div></div>
      <div class="sh">Scheduler Status</div>
      <div class="panel" id="scheduler-panel"><div class="log">Loading...</div></div>
    </div>

    <div class="tab-content" id="tab-creators">
      <div class="sh">Allowlist (26 creators)</div>
      <div class="panel" id="creators-panel"></div>
    </div>

    <div class="tab-content" id="tab-controls">
      <div class="sh">Manual Controls</div>
      <div class="panel">
        <h3>Scheduler</h3>
        <button class="btn" onclick="triggerPoll()">Trigger Poll</button>
        <button class="btn" onclick="rebuildSessions()">Rebuild Sessions</button>
        <button class="btn" onclick="backfillAvatars()">Backfill Avatars</button>
        <div class="log" id="control-log">Ready. Click a button to execute.</div>
      </div>
      <div class="panel">
        <h3>Database</h3>
        <button class="btn" onclick="getCreatorCount()">Count Creators</button>
        <button class="btn" onclick="getAvatarStats()">Avatar Stats</button>
        <div class="log" id="db-log">Ready.</div>
      </div>
    </div>

    <div class="tab-content" id="tab-discovery">
      <div class="sh">Discovery Queue</div>
      <div class="panel" id="discovery-panel"><div class="log">Loading...</div></div>
    </div>
  </div>
</div>

<script>
let TOKEN = '';
const SCHED_URL = 'https://contentlore-scheduler.dynamomc2019.workers.dev';

function doLogin() {
  TOKEN = document.getElementById('pw').value;
  fetch('/api/admin/backfill-avatars', {headers:{Authorization:'Bearer '+TOKEN}})
    .then(r => {
      if (r.ok) {
        document.getElementById('login').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        sessionStorage.setItem('mod_token', TOKEN);
        loadDashboard();
      } else {
        document.getElementById('err').style.display = 'block';
      }
    }).catch(() => { document.getElementById('err').style.display = 'block'; });
}

function doLogout() {
  sessionStorage.removeItem('mod_token');
  TOKEN = '';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login').style.display = 'flex';
}

// Auto-login if token saved
const saved = sessionStorage.getItem('mod_token');
if (saved) { TOKEN = saved; document.getElementById('pw').value = saved; doLogin(); }

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if (name === 'creators') loadCreators();
  if (name === 'discovery') loadDiscovery();
}

function fmtBig(n) {
  if (n==null) return '—';
  if (n>=1e3) return (n/1e3).toFixed(1)+'k';
  return String(n);
}

async function loadDashboard() {
  // KPIs
  try {
    const [liveR, statsR] = await Promise.all([
      fetch('/api/live-now'),
      fetch('/api/admin/backfill-avatars', {headers:{Authorization:'Bearer '+TOKEN}}),
    ]);
    const liveD = await liveR.json();
    const statsD = await statsR.json();
    const live = (liveD.ok && liveD.live) ? liveD.live : [];
    const viewers = live.reduce((s,c) => s+(c.viewers||0), 0);

    document.getElementById('kpis').innerHTML = `
      <div class="kpi"><div class="v ${live.length>0?'ok':'warn'}">${live.length}</div><div class="l">live now</div></div>
      <div class="kpi"><div class="v signal">${fmtBig(viewers)}</div><div class="l">viewers</div></div>
      <div class="kpi"><div class="v">${statsD.total_creators||'?'}</div><div class="l">total creators</div></div>
      <div class="kpi"><div class="v ${statsD.missing_avatars>100?'warn':'ok'}">${statsD.missing_avatars||0}</div><div class="l">missing avatars</div></div>
    `;

    // Live table
    if (live.length === 0) {
      document.getElementById('live-panel').innerHTML = '<div style="padding:16px;color:var(--ink-dim)">No streams live right now</div>';
    } else {
      document.getElementById('live-panel').innerHTML = `<table><thead><tr><th>Creator</th><th>Platform</th><th>Viewers</th><th>Game</th><th>Uptime</th></tr></thead><tbody>
        ${live.sort((a,b)=>(b.viewers||0)-(a.viewers||0)).map(s => `<tr>
          <td>${s.display_name}</td>
          <td><span class="badge ${s.platform}">${s.platform}</span></td>
          <td>${fmtBig(s.viewers)}</td>
          <td style="color:var(--ink-dim);font-size:12px">${s.game_name||'—'}</td>
          <td style="color:var(--ink-faint);font-size:12px">${s.uptime_mins?Math.floor(s.uptime_mins/60)+'h '+s.uptime_mins%60+'m':'—'}</td>
        </tr>`).join('')}</tbody></table>`;
    }
  } catch(e) {
    document.getElementById('kpis').innerHTML = '<div class="kpi"><div class="v warn">ERR</div><div class="l">Failed to load</div></div>';
  }

  // Scheduler status
  try {
    const r = await fetch(SCHED_URL+'/status');
    const d = await r.json();
    const lastPoll = d.poll ? new Date(d.poll.timestamp || d.poll.at || 0).toLocaleString() : 'Never';
    const lastSessions = d.sessions ? new Date(d.sessions.timestamp || d.sessions.at || 0).toLocaleString() : 'Never';
    document.getElementById('scheduler-panel').innerHTML = `<div class="log">Last poll: ${lastPoll}\nLast session rebuild: ${lastSessions}\nCursor: ${d.cursor || 'none'}\n\nFull response:\n${JSON.stringify(d, null, 2)}</div>`;
  } catch(e) {
    document.getElementById('scheduler-panel').innerHTML = `<div class="log" style="color:var(--red)">Failed to reach scheduler: ${e.message}</div>`;
  }
}

async function loadCreators() {
  try {
    const r = await fetch('/api/creators?limit=100');
    const d = await r.json();
    const creators = d.creators || [];
    document.getElementById('creators-panel').innerHTML = `<div style="margin-bottom:8px;font-family:var(--font-m);font-size:11px;color:var(--ink-dim)">${creators.length} creators loaded (showing first 100)</div>
    <table><thead><tr><th>Name</th><th>Platform</th><th>Avatar</th><th>Updated</th></tr></thead><tbody>
      ${creators.map(c => `<tr>
        <td>${c.display_name}</td>
        <td><span class="badge ${(c.primary_platform||'twitch').toLowerCase()}">${c.primary_platform||'twitch'}</span></td>
        <td>${c.avatar_url && !c.avatar_url.includes('previews-ttv') ? '✓' : '<span style="color:var(--red)">✗</span>'}</td>
        <td style="color:var(--ink-faint);font-size:11px">${c.updated_at ? new Date(c.updated_at).toLocaleDateString() : '—'}</td>
      </tr>`).join('')}</tbody></table>`;
  } catch(e) {
    document.getElementById('creators-panel').innerHTML = `<div class="log" style="color:var(--red)">Error: ${e.message}</div>`;
  }
}

async function loadDiscovery() {
  try {
    const r = await fetch('/api/admin/discovery', {headers:{Authorization:'Bearer '+TOKEN}});
    if (!r.ok) throw new Error('Discovery endpoint not available ('+r.status+')');
    const d = await r.json();
    const queue = d.queue || d.pending || [];
    if (queue.length === 0) {
      document.getElementById('discovery-panel').innerHTML = '<div style="padding:16px;color:var(--ink-dim)">Discovery queue empty — no new creators pending review</div>';
    } else {
      document.getElementById('discovery-panel').innerHTML = `<table><thead><tr><th>Name</th><th>Platform</th><th>Viewers</th><th>Action</th></tr></thead><tbody>
        ${queue.map(c => `<tr>
          <td>${c.display_name||c.name||'?'}</td>
          <td><span class="badge ${(c.platform||'twitch').toLowerCase()}">${c.platform||'twitch'}</span></td>
          <td>${c.viewers||'—'}</td>
          <td><button class="btn" onclick="approveCreator('${c.id||c.handle}')">Approve</button></td>
        </tr>`).join('')}</tbody></table>`;
    }
  } catch(e) {
    document.getElementById('discovery-panel').innerHTML = `<div class="log">${e.message}</div>`;
  }
}

async function triggerPoll() {
  const log = document.getElementById('control-log');
  log.textContent = 'Triggering poll...';
  try {
    const r = await fetch(SCHED_URL+'/trigger', {method:'POST', headers:{'X-Admin-Password':TOKEN}});
    const d = await r.json();
    log.textContent = 'Poll result:\n' + JSON.stringify(d, null, 2);
    loadDashboard();
  } catch(e) { log.textContent = 'Error: '+e.message; }
}

async function rebuildSessions() {
  const log = document.getElementById('control-log');
  log.textContent = 'Rebuilding sessions...';
  try {
    const r = await fetch(SCHED_URL+'/rebuild-sessions', {method:'POST', headers:{'X-Admin-Password':TOKEN}});
    const d = await r.json();
    log.textContent = 'Sessions result:\n' + JSON.stringify(d, null, 2);
  } catch(e) { log.textContent = 'Error: '+e.message; }
}

async function backfillAvatars() {
  const log = document.getElementById('control-log');
  log.textContent = 'Backfilling avatars...';
  try {
    const r = await fetch('/api/admin/backfill-avatars', {method:'POST', headers:{Authorization:'Bearer '+TOKEN}});
    const d = await r.json();
    log.textContent = 'Avatar backfill result:\n' + JSON.stringify(d, null, 2);
    loadDashboard();
  } catch(e) { log.textContent = 'Error: '+e.message; }
}

async function getCreatorCount() {
  const log = document.getElementById('db-log');
  try {
    const r = await fetch('/api/creators?limit=1');
    const d = await r.json();
    log.textContent = 'Total creators: ' + (d.count || d.creators?.length || '?');
  } catch(e) { log.textContent = 'Error: '+e.message; }
}

async function getAvatarStats() {
  const log = document.getElementById('db-log');
  try {
    const r = await fetch('/api/admin/backfill-avatars', {headers:{Authorization:'Bearer '+TOKEN}});
    const d = await r.json();
    log.textContent = JSON.stringify(d, null, 2);
  } catch(e) { log.textContent = 'Error: '+e.message; }
}

async function approveCreator(id) {
  const log = document.getElementById('discovery-panel');
  try {
    const r = await fetch('/api/admin/discovery', {
      method:'PUT',
      headers:{Authorization:'Bearer '+TOKEN, 'Content-Type':'application/json'},
      body: JSON.stringify({id, status:'approved'})
    });
    const d = await r.json();
    loadDiscovery();
  } catch(e) { alert('Error: '+e.message); }
}
</script>
</body>
</html>
