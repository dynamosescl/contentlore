<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="/cl-theme.css">
<meta name="theme-color" content="#0d1f1f">
<script src="/pwa.js" defer></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mod Dashboard · ContentLore</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:oklch(0.10 0.04 190);--fg:oklch(0.97 0.02 320);
  --card:oklch(0.14 0.05 190);--card2:oklch(0.19 0.06 190);
  --ink-dim:oklch(0.78 0.05 320);--ink-faint:oklch(0.55 0.06 190);
  --signal:oklch(0.82 0.20 195);--signal-cyan:oklch(0.85 0.18 200);
  --green:oklch(0.82 0.22 145);--amber:oklch(0.78 0.20 60);--red:oklch(0.68 0.27 25);
  --border:oklch(0.28 0.06 190);
  --rookie:#9aa6b2;--regular:#3acc88;--trusted:#5b9bff;--senior:#b56fff;--head:#f5c84a;
  --font-d:'Bebas Neue',Impact,sans-serif;--font-m:'JetBrains Mono',monospace;--font-b:'Inter',system-ui,sans-serif;
  --cut:polygon(0 0,calc(100% - 14px) 0,100% 14px,100% 100%,0 100%);
}
html{background:var(--bg);color-scheme:dark}
body{background:var(--bg);color:var(--fg);font-family:var(--font-b);min-height:100vh;-webkit-font-smoothing:antialiased;position:relative}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:1;background-image:repeating-linear-gradient(0deg,oklch(0.82 0.20 195/.04) 0 1px,transparent 1px 3px);mix-blend-mode:screen}
body>*{position:relative;z-index:3}

.nav{height:48px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;position:sticky;top:0;z-index:100;gap:14px}
.nav-brand{font-family:var(--font-d);font-size:22px;letter-spacing:2px;text-decoration:none;color:var(--fg);display:flex;align-items:center}
.nav-brand img{height:40px;filter:brightness(1.1)}
.nav-mod{font-family:var(--font-m);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-faint)}
.nav-mod strong{color:var(--signal)}
.nav-spacer{flex:1}
.nav-link{font-family:var(--font-m);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-faint);text-decoration:none;padding:8px 12px;border:1px solid var(--border);transition:all .15s}
.nav-link:hover{border-color:var(--signal);color:var(--signal)}
.lvl-badge{display:inline-block;font-family:var(--font-m);font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:3px 8px;border-radius:2px;font-weight:700;color:#0a0c10;line-height:1}
.lvl-badge.rookie{background:var(--rookie)}
.lvl-badge.regular{background:var(--regular)}
.lvl-badge.trusted{background:var(--trusted)}
.lvl-badge.senior{background:var(--senior);color:#fff}
.lvl-badge.head{background:var(--head)}

.mx{max-width:1280px;margin:0 auto;padding:24px}

/* Welcome bar */
.welcome{display:flex;align-items:center;gap:18px;background:var(--card);border:1px solid var(--border);clip-path:var(--cut);padding:18px 22px;margin-bottom:20px;flex-wrap:wrap;position:relative;overflow:hidden}
.welcome::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top right,oklch(0.82 0.20 195/.10),transparent 60%);pointer-events:none}
.welcome-name{font-family:var(--font-d);font-size:32px;letter-spacing:2px;line-height:1;position:relative}
.welcome-meta{display:flex;gap:14px;flex-wrap:wrap;font-family:var(--font-m);font-size:11px;letter-spacing:1.5px;color:var(--ink-faint);text-transform:uppercase;position:relative}
.welcome-meta strong{color:var(--fg);font-weight:500}
.xp-bar{flex:1 1 220px;min-width:220px;position:relative}
.xp-row{display:flex;justify-content:space-between;font-family:var(--font-m);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-faint);margin-bottom:6px}
.xp-track{height:8px;background:var(--card2);border:1px solid var(--border);overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--signal-cyan),var(--signal));transition:width .4s}

/* Scene strip */
.scene-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
@media(max-width:760px){.scene-strip{grid-template-columns:1fr 1fr}}
.scene-stat{padding:14px 18px;clip-path:var(--cut);background:var(--card);border:1px solid var(--border)}
.scene-stat .l{font-family:var(--font-m);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-faint);margin-bottom:4px}
.scene-stat .v{font-family:var(--font-d);font-size:28px;letter-spacing:1px;line-height:1}
.scene-stat .v.signal{color:var(--signal)}
.scene-stat .v.cyan{color:var(--signal-cyan)}
.scene-stat .v.green{color:var(--green)}
.scene-stat .v.amber{color:var(--amber)}

/* Section headings */
.sec-h{font-family:var(--font-d);font-size:24px;letter-spacing:2px;margin:24px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:baseline;gap:10px}
.sec-h .sub{font-family:var(--font-m);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-faint)}

/* Creator card */
.creator{background:var(--card);border:1px solid var(--border);clip-path:var(--cut);padding:0;margin-bottom:18px;overflow:hidden}
.creator-head{display:flex;align-items:center;gap:14px;padding:16px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.creator-av{width:56px;height:56px;border-radius:50%;background:var(--card2);object-fit:cover;border:1px solid var(--border)}
.creator-av-ph{width:56px;height:56px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:24px;color:var(--ink-faint);border:1px solid var(--border)}
.creator-info{flex:1;min-width:0}
.creator-name{font-family:var(--font-d);font-size:28px;letter-spacing:1.5px;line-height:1}
.creator-meta{font-family:var(--font-m);font-size:11px;letter-spacing:1.5px;color:var(--ink-faint);text-transform:uppercase;margin-top:4px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.live-pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-m);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;padding:3px 10px;border:1px solid;line-height:1}
.live-pill.live{color:var(--signal);border-color:var(--signal);background:oklch(0.82 0.20 195/.10)}
.live-pill.live::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--signal);animation:pulse 1.6s infinite}
.live-pill.off{color:var(--ink-faint);border-color:var(--ink-faint)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.creator-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{font-family:var(--font-m);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;padding:8px 14px;background:var(--card2);border:1px solid var(--border);color:var(--ink-dim);cursor:pointer;transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--signal-cyan);color:var(--signal-cyan)}
.btn-primary{background:var(--signal);color:var(--bg);border-color:var(--signal)}
.btn-primary:hover{box-shadow:0 0 14px oklch(0.82 0.20 195/.4)}
.btn-danger{border-color:var(--red);color:var(--red)}
.btn-danger:hover{background:var(--red);color:var(--fg)}

.creator-body{padding:16px 18px}
.embed-wrap{aspect-ratio:16/9;background:#000;border:1px solid var(--border);overflow:hidden;margin-bottom:14px;position:relative}
.embed-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0}

.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:14px}
.stat-tile{padding:12px 14px;background:var(--card2);border:1px solid var(--border);clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,0 100%)}
.stat-tile .l{font-family:var(--font-m);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-faint);margin-bottom:4px}
.stat-tile .v{font-family:var(--font-d);font-size:24px;letter-spacing:1px;line-height:1;display:flex;align-items:baseline;gap:6px}
.stat-tile .v .delta{font-family:var(--font-m);font-size:11px;letter-spacing:1px}
.stat-tile .v .delta.up{color:var(--green)}
.stat-tile .v .delta.down{color:var(--red)}

.peers{display:flex;flex-wrap:wrap;gap:8px}
.peer-chip{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;background:var(--card2);border:1px solid var(--border);clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,0 100%);font-size:13px;text-decoration:none;color:var(--fg)}
.peer-chip:hover{border-color:var(--signal-cyan)}
.peer-chip .v{color:var(--signal-cyan);font-family:var(--font-m);font-size:11px}

.clips-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.clip-mini{display:block;text-decoration:none;color:inherit;background:var(--card2);border:1px solid var(--border);clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,0 100%);overflow:hidden;transition:all .15s}
.clip-mini:hover{border-color:var(--signal)}
.clip-mini .thumb{aspect-ratio:16/9;background:#000;position:relative;overflow:hidden}
.clip-mini .thumb img{width:100%;height:100%;object-fit:cover}
.clip-mini .thumb .vw{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.7);color:var(--signal);font-family:var(--font-m);font-size:11px;padding:2px 6px;letter-spacing:.5px}
.clip-mini .body{padding:8px 10px}
.clip-mini .title{font-size:12px;line-height:1.4;color:var(--fg);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.4em;margin-bottom:6px}
.clip-mini .actions{display:flex;gap:6px}
.clip-mini .tag-btn{flex:1;font-family:var(--font-m);font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:5px 6px;background:var(--card);border:1px solid var(--border);color:var(--ink-dim);cursor:pointer;text-align:center;transition:all .1s}
.clip-mini .tag-btn:hover{border-color:var(--signal);color:var(--signal)}

/* Tools accordion (placeholder for item 4) */
.tools-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-top:14px}
.tool-tile{padding:14px 18px;background:var(--card2);border:1px solid var(--border);clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,0 100%);transition:all .15s}
.tool-tile.disabled{opacity:.5}
.tool-tile h4{font-family:var(--font-d);font-size:18px;letter-spacing:1px;margin-bottom:4px;color:var(--fg)}
.tool-tile h4 .perm{font-family:var(--font-m);font-size:9px;letter-spacing:1.5px;color:var(--amber);margin-left:6px}
.tool-tile p{font-size:12px;color:var(--ink-dim);line-height:1.5}

/* Contributions */
.contrib-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:760px){.contrib-row{grid-template-columns:1fr}}
.contrib-card{background:var(--card);border:1px solid var(--border);clip-path:var(--cut);padding:18px}
.contrib-h{font-family:var(--font-d);font-size:18px;letter-spacing:1.5px;color:var(--signal-cyan);margin-bottom:10px}
.contrib-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.contrib-list li{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-top:1px dashed var(--border);font-family:var(--font-m);font-size:12px}
.contrib-list li:first-child{border-top:0}
.contrib-list .t{color:var(--ink-dim)}
.contrib-list .x{color:var(--signal);font-weight:600}

.empty{padding:24px;text-align:center;color:var(--ink-faint);font-family:var(--font-m);font-size:13px;letter-spacing:2px;text-transform:uppercase}

.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--card);border:1px solid var(--signal);color:var(--fg);font-family:var(--font-m);font-size:13px;padding:14px 22px;clip-path:var(--cut);z-index:9998;opacity:0;pointer-events:none;transition:all .25s;letter-spacing:1px;text-transform:uppercase;max-width:90vw}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.err{border-color:var(--red);color:oklch(0.85 0.20 25)}

.footer{padding:36px 24px;text-align:center;font-family:var(--font-m);font-size:12px;text-transform:uppercase;letter-spacing:2px;color:var(--ink-faint);margin-top:48px;border-top:1px solid var(--border)}
.footer a{color:var(--ink-faint);text-decoration:none;margin:0 6px}
.footer a:hover{color:var(--signal-cyan)}

::selection{background:var(--signal);color:var(--bg)}
</style>
</head>
<body>
<nav class="nav">
  <a href="/" class="nav-brand"><img src="/logo.png" alt="ContentLore"></a>
  <span class="nav-mod" id="welcome-strip">Loading…</span>
  <span class="nav-spacer"></span>
  <a class="nav-link" href="/moderators/">About</a>
  <button class="nav-link" id="logout" type="button">Sign out</button>
</nav>

<div class="mx">
  <div id="dashboard-host">
    <div class="empty">Loading mod dashboard…</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="footer">
  ContentLore · Mod Dashboard · Refreshes every 60 seconds ·
  <a href="/gta-rp/">Live hub</a>
</div>

<script>
const TOKEN_KEY = 'cl:mod:token';
const PROFILE_KEY = 'cl:mod:profile';

function getToken() { try { return localStorage.getItem(TOKEN_KEY) || ''; } catch { return ''; } }
function clearToken() { try { localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(PROFILE_KEY); } catch {} }

if (!getToken()) {
  location.replace('/moderators/login/');
}

document.getElementById('logout').addEventListener('click', () => {
  clearToken();
  location.assign('/moderators/login/');
});

const esc = s => (s ?? '').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtN = n => n == null ? '—' : (n >= 1000 ? (n/1000).toFixed(n>=10000?0:1)+'k' : String(Math.round(n)));
const fmtMins = m => m == null ? '' : (m >= 60 ? Math.floor(m/60) + 'h ' + (m%60) + 'm' : m + 'm');
function timeAgo(ts) {
  if (!ts) return '';
  const diff = Math.floor(Date.now()/1000) - ts;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}
const CONTRIB_LABELS = {
  clip_tag: 'Tagged a clip',
  character_add: 'Added a character',
  social_update: 'Updated socials',
  stream_notes: 'Wrote stream notes',
  moment_flag: 'Flagged a moment',
  bio_edit: 'Edited bio',
};

function showToast(msg, isErr) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('err', !!isErr);
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3600);
}

async function loadDashboard() {
  try {
    const res = await fetch('/api/mod/dashboard', {
      headers: { Authorization: 'Bearer ' + getToken() },
    });
    if (res.status === 401 || res.status === 403) {
      clearToken();
      location.replace('/moderators/login/');
      return;
    }
    const d = await res.json();
    if (!d.ok) throw new Error(d.error || 'dashboard failed');
    render(d);
  } catch (e) {
    document.getElementById('dashboard-host').innerHTML =
      '<div class="empty" style="color:oklch(0.85 0.20 25)">Couldn\\'t load dashboard: ' + esc(e.message || e) + '</div>';
  }
}

function render(d) {
  // Top welcome strip in nav.
  document.getElementById('welcome-strip').innerHTML =
    `<strong>${esc(d.mod.display_name)}</strong> · <span class="lvl-badge ${esc(d.mod.level)}">${esc(d.mod.level)}</span> · ${d.mod.xp} XP`;

  const host = document.getElementById('dashboard-host');
  host.innerHTML = renderWelcome(d) + renderScene(d.scene) + renderCreators(d.creators) + renderContributions(d.contributions);

  // Hook clip-tag buttons (item 4 ships the actual endpoint; for now they show a "coming soon" toast).
  document.querySelectorAll('.tag-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      const tools = btn.closest('.creator')?.querySelector('.tools-anchor');
      if (tools) tools.scrollIntoView({ behavior: 'smooth', block: 'start' });
      showToast('Open the contribution tools below to tag this clip');
    });
  });
}

function renderWelcome(d) {
  const next = d.contributions.next_level;
  const xpRow = next
    ? `<div class="xp-row"><span>${esc(d.mod.level.toUpperCase())}</span><span>${d.mod.xp} / ${next.min} XP → ${next.id.toUpperCase()}</span></div>
       <div class="xp-track"><div class="xp-fill" style="width:${d.contributions.progress_pct}%"></div></div>`
    : `<div class="xp-row"><span>${esc(d.mod.level.toUpperCase())}</span><span>Max level reached · ${d.mod.xp} XP</span></div>
       <div class="xp-track"><div class="xp-fill" style="width:100%"></div></div>`;
  return `<div class="welcome">
    <div>
      <div class="welcome-name">Welcome back, ${esc(d.mod.display_name)}</div>
      <div class="welcome-meta">
        <span><strong>${d.creators.length}</strong> creator${d.creators.length === 1 ? '' : 's'}</span>
        <span><strong>${d.contributions.recent.length}</strong> recent action${d.contributions.recent.length === 1 ? '' : 's'}</span>
        ${d.mod.twitch_handle ? `<span>Twitch <strong>${esc(d.mod.twitch_handle)}</strong></span>` : ''}
        ${d.mod.kick_handle ? `<span>Kick <strong>${esc(d.mod.kick_handle)}</strong></span>` : ''}
      </div>
    </div>
    <div class="xp-bar">${xpRow}</div>
  </div>`;
}

function renderScene(s) {
  const hypeLabel = s.hype?.band?.label || '—';
  const hypeEmoji = s.hype?.band?.emoji || '📡';
  return `<div class="scene-strip">
    <div class="scene-stat"><div class="l">Streamers live</div><div class="v signal">${s.total_live}</div></div>
    <div class="scene-stat"><div class="l">Total viewers</div><div class="v cyan">${fmtN(s.total_viewers)}</div></div>
    <div class="scene-stat"><div class="l">Scene hype</div><div class="v amber">${hypeEmoji} ${esc(hypeLabel)}</div></div>
    <div class="scene-stat"><div class="l">Status</div><div class="v green">${s.total_live > 0 ? 'On air' : 'Quiet'}</div></div>
  </div>`;
}

function renderCreators(creators) {
  if (!creators.length) {
    return '<div class="empty">No creators yet — contact an admin to update which creator(s) you mod for.</div>';
  }
  return `<h2 class="sec-h">Your Creators <span class="sub">${creators.length}</span></h2>` +
    creators.map(c => renderCreator(c)).join('');
}

function renderCreator(c) {
  const av = c.avatar_url
    ? `<img class="creator-av" src="${esc(c.avatar_url)}" alt="${esc(c.display_name)}">`
    : `<div class="creator-av-ph">${esc((c.display_name||'?').charAt(0).toUpperCase())}</div>`;

  const live = c.is_live;
  const livePill = live
    ? `<span class="live-pill live">LIVE · ${fmtN(c.viewers)}</span>`
    : `<span class="live-pill off">OFFLINE</span>`;

  const embed = live && c.embed_url
    ? `<div class="embed-wrap"><iframe src="${esc(c.embed_url)}" allow="autoplay; fullscreen" allowfullscreen></iframe></div>`
    : '';

  let viewersTile = '';
  if (live) {
    if (c.viewers_vs_avg_pct != null) {
      const cls = c.viewers_vs_avg_pct >= 0 ? 'up' : 'down';
      const arrow = c.viewers_vs_avg_pct >= 0 ? '↑' : '↓';
      const sign = c.viewers_vs_avg_pct >= 0 ? '+' : '';
      viewersTile = `<div class="stat-tile"><div class="l">Viewers vs 7d avg</div><div class="v">${fmtN(c.viewers)} <span class="delta ${cls}">${arrow} ${sign}${c.viewers_vs_avg_pct}%</span></div></div>`;
    } else {
      viewersTile = `<div class="stat-tile"><div class="l">Viewers</div><div class="v">${fmtN(c.viewers)}</div></div>`;
    }
  } else {
    viewersTile = `<div class="stat-tile"><div class="l">7-day avg viewers</div><div class="v">${fmtN(c.avg_viewers_7d)}</div></div>`;
  }

  const serverTile = c.detected_server
    ? `<div class="stat-tile"><div class="l">Detected server</div><div class="v" style="font-size:18px">${esc(c.detected_server.name)}</div></div>`
    : (live ? `<div class="stat-tile"><div class="l">Server</div><div class="v" style="font-size:14px;color:var(--ink-faint)">Not detected</div></div>` : '');

  const uptimeTile = live
    ? `<div class="stat-tile"><div class="l">On air</div><div class="v" style="font-size:18px">${esc(fmtMins(c.uptime_mins) || 'just on')}</div></div>`
    : '';

  const peersHtml = c.same_server_peers.length
    ? `<h4 class="sec-h" style="font-size:16px;margin-top:18px;margin-bottom:8px;border-bottom:none;padding-bottom:0">Same server right now</h4>
       <div class="peers">${c.same_server_peers.map(p => `<a class="peer-chip" href="/creator-profile/${esc(p.handle)}"><strong>${esc(p.display_name)}</strong> <span class="v">${fmtN(p.viewers)}</span></a>`).join('')}</div>`
    : (live && c.detected_server ? `<p style="font-family:var(--font-m);font-size:11px;color:var(--ink-faint);letter-spacing:1px;margin-top:14px">No other tracked creators on ${esc(c.detected_server.name)} right now.</p>` : '');

  const clipsHtml = c.recent_clips.length
    ? `<h4 class="sec-h" style="font-size:16px;margin-top:18px;margin-bottom:8px;border-bottom:none;padding-bottom:0">Recent clips · last 24h</h4>
       <div class="clips-row">${c.recent_clips.map(cl => {
         const tu = (cl.thumbnail_url || '').replace('%{width}','320').replace('%{height}','180');
         return `<a class="clip-mini" href="${esc(cl.url || '#')}" target="_blank" rel="noopener" data-clip-id="${esc(cl.id || '')}">
           <div class="thumb">${tu ? `<img src="${esc(tu)}" loading="lazy" alt="">` : ''}<span class="vw">${fmtN(cl.view_count)}</span></div>
           <div class="body">
             <div class="title">${esc(cl.title || 'Untitled')}</div>
             <div class="actions"><button class="tag-btn" data-clip-id="${esc(cl.id || '')}" type="button">+ Tag this clip</button></div>
           </div>
         </a>`;
       }).join('')}</div>`
    : '';

  return `
    <div class="creator">
      <div class="creator-head">
        ${av}
        <div class="creator-info">
          <div class="creator-name">${esc(c.display_name)}</div>
          <div class="creator-meta">
            ${livePill}
            ${live && c.game_name ? `<span>${esc(c.game_name)}</span>` : ''}
            <span>${esc(c.platform === 'kick' ? 'Kick' : 'Twitch')}</span>
          </div>
        </div>
        <div class="creator-actions">
          <a class="btn" href="/creator-profile/${esc(c.handle)}">Profile ↗</a>
          ${live ? `<a class="btn btn-primary" href="${esc(c.profile_url)}" target="_blank" rel="noopener">Watch ↗</a>` : ''}
        </div>
      </div>
      <div class="creator-body">
        ${embed}
        <div class="stat-row">
          ${viewersTile}
          ${serverTile}
          ${uptimeTile}
        </div>
        ${peersHtml}
        ${clipsHtml}
        <div class="tools-anchor"></div>
      </div>
    </div>
  `;
}

function renderContributions(c) {
  const recent = c.recent.slice(0, 8);
  const recentHtml = recent.length
    ? `<ul class="contrib-list">${recent.map(r => `
        <li><span class="t">${esc(CONTRIB_LABELS[r.type] || r.type)} · ${esc(timeAgo(r.created_at))}</span><span class="x">+${r.xp_earned} XP</span></li>
      `).join('')}</ul>`
    : `<div class="empty">No actions yet — start tagging clips, adding characters, or writing notes to earn XP.</div>`;

  const totals = Object.entries(c.by_type || {}).map(([t, n]) =>
    `<li><span class="t">${esc(CONTRIB_LABELS[t] || t)}</span><span class="x">${n}</span></li>`
  ).join('');

  return `
    <h2 class="sec-h">Your Contributions <span class="sub">${c.total_xp} XP total</span></h2>
    <div class="contrib-row">
      <div class="contrib-card">
        <div class="contrib-h">Recent activity</div>
        ${recentHtml}
      </div>
      <div class="contrib-card">
        <div class="contrib-h">Lifetime breakdown</div>
        ${totals ? `<ul class="contrib-list">${totals}</ul>` : '<div class="empty">No contributions logged yet.</div>'}
      </div>
    </div>
  `;
}

loadDashboard();
setInterval(loadDashboard, 60_000);
</script>
</body>
</html>
