<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<link rel="stylesheet" href="/cl-theme.css">
<meta name="theme-color" content="#0d1f1f">
<script src="/pwa.js" defer></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mod Dashboard · ContentLore</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:oklch(0.10 0.04 190);--fg:oklch(0.97 0.02 320);
  --card:oklch(0.14 0.05 190);--card2:oklch(0.19 0.06 190);
  --ink-dim:oklch(0.78 0.05 320);--ink-faint:oklch(0.55 0.06 190);
  --signal:oklch(0.82 0.20 195);--signal-cyan:oklch(0.85 0.18 200);
  --green:oklch(0.82 0.22 145);--amber:oklch(0.78 0.20 60);--red:oklch(0.68 0.27 25);
  --border:oklch(0.28 0.06 190);
  --rookie:#9aa6b2;--regular:#3acc88;--trusted:#5b9bff;--senior:#b56fff;--head:#f5c84a;
  --font-d:'Bebas Neue',Impact,sans-serif;--font-m:'JetBrains Mono',monospace;--font-b:'Inter',system-ui,sans-serif;
  --cut:polygon(0 0,calc(100% - 14px) 0,100% 14px,100% 100%,0 100%);
}
html{background:var(--bg);color-scheme:dark}
body{background:var(--bg);color:var(--fg);font-family:var(--font-b);min-height:100vh;-webkit-font-smoothing:antialiased;position:relative}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:1;background-image:repeating-linear-gradient(0deg,oklch(0.82 0.20 195/.04) 0 1px,transparent 1px 3px);mix-blend-mode:screen}
body>*{position:relative;z-index:3}

.nav{height:48px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;position:sticky;top:0;z-index:100;gap:14px}
.nav-brand{font-family:var(--font-d);font-size:22px;letter-spacing:2px;text-decoration:none;color:var(--fg);display:flex;align-items:center}
.nav-brand img{height:40px;filter:brightness(1.1)}
.nav-mod{font-family:var(--font-m);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-faint)}
.nav-mod strong{color:var(--signal)}
.nav-spacer{flex:1}
.nav-link{font-family:var(--font-m);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-faint);text-decoration:none;padding:8px 12px;border:1px solid var(--border);transition:all .15s}
.nav-link:hover{border-color:var(--signal);color:var(--signal)}
.lvl-badge{display:inline-block;font-family:var(--font-m);font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:3px 8px;border-radius:2px;font-weight:700;color:#0a0c10;line-height:1}
.lvl-badge.rookie{background:var(--rookie)}
.lvl-badge.regular{background:var(--regular)}
.lvl-badge.trusted{background:var(--trusted)}
.lvl-badge.senior{background:var(--senior);color:#fff}
.lvl-badge.head{background:var(--head)}

.mx{max-width:1280px;margin:0 auto;padding:24px}

/* Welcome bar */
.welcome{display:flex;align-items:center;gap:18px;background:var(--card);border:1px solid var(--border);clip-path:var(--cut);padding:18px 22px;margin-bottom:20px;flex-wrap:wrap;position:relative;overflow:hidden}
.welcome::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top right,oklch(0.82 0.20 195/.10),transparent 60%);pointer-events:none}
.welcome-name{font-family:var(--font-d);font-size:32px;letter-spacing:2px;line-height:1;position:relative}
.welcome-meta{display:flex;gap:14px;flex-wrap:wrap;font-family:var(--font-m);font-size:11px;letter-spacing:1.5px;color:var(--ink-faint);text-transform:uppercase;position:relative}
.welcome-meta strong{color:var(--fg);font-weight:500}
.xp-bar{flex:1 1 220px;min-width:220px;position:relative}
.xp-row{display:flex;justify-content:space-between;font-family:var(--font-m);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-faint);margin-bottom:6px}
.xp-track{height:8px;background:var(--card2);border:1px solid var(--border);overflow:hidden}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--signal-cyan),var(--signal));transition:width .4s}

/* Scene strip */
.scene-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
@media(max-width:760px){.scene-strip{grid-template-columns:1fr 1fr}}
.scene-stat{padding:14px 18px;clip-path:var(--cut);background:var(--card);border:1px solid var(--border)}
.scene-stat .l{font-family:var(--font-m);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-faint);margin-bottom:4px}
.scene-stat .v{font-family:var(--font-d);font-size:28px;letter-spacing:1px;line-height:1}
.scene-stat .v.signal{color:var(--signal)}
.scene-stat .v.cyan{color:var(--signal-cyan)}
.scene-stat .v.green{color:var(--green)}
.scene-stat .v.amber{color:var(--amber)}

/* Section headings */
.sec-h{font-family:var(--font-d);font-size:24px;letter-spacing:2px;margin:24px 0 12px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:baseline;gap:10px}
.sec-h .sub{font-family:var(--font-m);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-faint)}

/* Creator card */
.creator{background:var(--card);border:1px solid var(--border);clip-path:var(--cut);padding:0;margin-bottom:18px;overflow:hidden}
.creator-head{display:flex;align-items:center;gap:14px;padding:16px 18px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.creator-av{width:56px;height:56px;border-radius:50%;background:var(--card2);object-fit:cover;border:1px solid var(--border)}
.creator-av-ph{width:56px;height:56px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:24px;color:var(--ink-faint);border:1px solid var(--border)}
.creator-info{flex:1;min-width:0}
.creator-name{font-family:var(--font-d);font-size:28px;letter-spacing:1.5px;line-height:1}
.creator-meta{font-family:var(--font-m);font-size:11px;letter-spacing:1.5px;color:var(--ink-faint);text-transform:uppercase;margin-top:4px;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.live-pill{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-m);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;padding:3px 10px;border:1px solid;line-height:1}
.live-pill.live{color:var(--signal);border-color:var(--signal);background:oklch(0.82 0.20 195/.10)}
.live-pill.live::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--signal);animation:pulse 1.6s infinite}
.live-pill.off{color:var(--ink-faint);border-color:var(--ink-faint)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

.creator-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{font-family:var(--font-m);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;padding:8px 14px;background:var(--card2);border:1px solid var(--border);color:var(--ink-dim);cursor:pointer;transition:all .15s;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.btn:hover{border-color:var(--signal-cyan);color:var(--signal-cyan)}
.btn-primary{background:var(--signal);color:var(--bg);border-color:var(--signal)}
.btn-primary:hover{box-shadow:0 0 14px oklch(0.82 0.20 195/.4)}
.btn-danger{border-color:var(--red);color:var(--red)}
.btn-danger:hover{background:var(--red);color:var(--fg)}

.creator-body{padding:16px 18px}
.embed-wrap{aspect-ratio:16/9;background:#000;border:1px solid var(--border);overflow:hidden;margin-bottom:14px;position:relative}
.embed-wrap iframe{position:absolute;inset:0;width:100%;height:100%;border:0}

.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:14px}
.stat-tile{padding:12px 14px;background:var(--card2);border:1px solid var(--border);clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,0 100%)}
.stat-tile .l{font-family:var(--font-m);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-faint);margin-bottom:4px}
.stat-tile .v{font-family:var(--font-d);font-size:24px;letter-spacing:1px;line-height:1;display:flex;align-items:baseline;gap:6px}
.stat-tile .v .delta{font-family:var(--font-m);font-size:11px;letter-spacing:1px}
.stat-tile .v .delta.up{color:var(--green)}
.stat-tile .v .delta.down{color:var(--red)}

.peers{display:flex;flex-wrap:wrap;gap:8px}
.peer-chip{display:inline-flex;align-items:center;gap:8px;padding:6px 12px;background:var(--card2);border:1px solid var(--border);clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,0 100%);font-size:13px;text-decoration:none;color:var(--fg)}
.peer-chip:hover{border-color:var(--signal-cyan)}
.peer-chip .v{color:var(--signal-cyan);font-family:var(--font-m);font-size:11px}

.clips-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.clip-mini{display:block;text-decoration:none;color:inherit;background:var(--card2);border:1px solid var(--border);clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,0 100%);overflow:hidden;transition:all .15s}
.clip-mini:hover{border-color:var(--signal)}
.clip-mini .thumb{aspect-ratio:16/9;background:#000;position:relative;overflow:hidden}
.clip-mini .thumb img{width:100%;height:100%;object-fit:cover}
.clip-mini .thumb .vw{position:absolute;bottom:6px;right:6px;background:rgba(0,0,0,.7);color:var(--signal);font-family:var(--font-m);font-size:11px;padding:2px 6px;letter-spacing:.5px}
.clip-mini .body{padding:8px 10px}
.clip-mini .title{font-size:12px;line-height:1.4;color:var(--fg);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.4em;margin-bottom:6px}
.clip-mini .actions{display:flex;gap:6px}
.clip-mini .tag-btn{flex:1;font-family:var(--font-m);font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:5px 6px;background:var(--card);border:1px solid var(--border);color:var(--ink-dim);cursor:pointer;text-align:center;transition:all .1s}
.clip-mini .tag-btn:hover{border-color:var(--signal);color:var(--signal)}

/* Mod tools — accordion-style sections per creator */
.tools{margin-top:18px;padding-top:14px;border-top:1px dashed var(--border)}
.tools-h{font-family:var(--font-d);font-size:18px;letter-spacing:1.5px;color:var(--signal-cyan);margin-bottom:10px}
.tool{margin-bottom:10px;background:var(--card2);border:1px solid var(--border);clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,0 100%);overflow:hidden}
.tool > summary{cursor:pointer;padding:12px 16px;font-family:var(--font-d);font-size:16px;letter-spacing:1px;color:var(--fg);display:flex;justify-content:space-between;align-items:center;list-style:none}
.tool > summary::-webkit-details-marker{display:none}
.tool > summary::after{content:'▾';font-family:var(--font-b);font-size:12px;color:var(--ink-faint);transition:transform .15s}
.tool[open] > summary::after{transform:rotate(180deg)}
.tool > summary .perm{font-family:var(--font-m);font-size:9px;letter-spacing:1.5px;color:var(--amber);margin-left:6px;text-transform:uppercase}
.tool > summary .perm.locked{color:var(--red)}
.tool .body{padding:12px 16px 16px;border-top:1px solid var(--border)}
.tool input[type=text],.tool input[type=url],.tool textarea,.tool select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--fg);font-family:var(--font-b);font-size:13px;padding:9px 11px;clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,0 100%);margin-bottom:8px}
.tool textarea{min-height:80px;font-family:var(--font-b);resize:vertical}
.tool label{display:block;font-family:var(--font-m);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-faint);margin-bottom:4px}
.tool .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:560px){.tool .row{grid-template-columns:1fr}}
.tool .save{font-family:var(--font-d);font-size:14px;letter-spacing:1.5px;background:var(--signal);color:var(--bg);border:0;padding:10px 22px;clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,0 100%);cursor:pointer;transition:all .15s}
.tool .save:hover{box-shadow:0 0 14px oklch(0.82 0.20 195/.4)}
.tool .save:disabled{opacity:.5;cursor:default}
.tool .lock-msg{font-family:var(--font-m);font-size:12px;color:var(--ink-faint);letter-spacing:1px;line-height:1.5;text-align:center;padding:16px}
.char-list{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
.char-item{display:flex;justify-content:space-between;gap:10px;padding:10px 12px;background:var(--bg);border:1px solid var(--border);font-size:13px;align-items:center}
.char-item .name{font-family:var(--font-d);font-size:18px;letter-spacing:1px;color:var(--fg)}
.char-item .meta{font-family:var(--font-m);font-size:10px;color:var(--ink-faint);letter-spacing:1.5px;margin-top:2px;text-transform:uppercase}
.char-item .status{font-family:var(--font-m);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:2px 8px;border:1px solid var(--border)}
.char-item .status.active{color:var(--green);border-color:var(--green)}
.char-item .status.retired{color:var(--ink-faint)}
.char-item .status.dead{color:var(--red);border-color:var(--red)}
.tag-form{display:none;flex-direction:column;gap:6px;margin-top:10px;padding:10px;background:var(--bg);border:1px solid var(--signal-cyan)}
.tag-form.open{display:flex}
.tag-form input{margin-bottom:0}
.tag-form .btns{display:flex;gap:6px}
.tag-form .btns button{flex:1;font-family:var(--font-m);font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:8px;background:var(--card);border:1px solid var(--border);color:var(--ink-dim);cursor:pointer}
.tag-form .btns .submit{background:var(--signal-cyan);color:var(--bg);border-color:var(--signal-cyan)}

/* Stream notes panel */
.notes-panel{margin-top:18px;padding:14px 16px;background:var(--card2);border:1px solid var(--signal-cyan);clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,0 100%)}
.notes-panel .head{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:10px;margin-bottom:10px}
.notes-panel .h{font-family:var(--font-d);font-size:18px;letter-spacing:1.5px;color:var(--signal-cyan);display:flex;align-items:center;gap:8px}
.notes-panel .meta{font-family:var(--font-m);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--ink-faint)}
.notes-panel .meta .saving{color:var(--amber)}
.notes-panel .meta .saved{color:var(--green)}
.notes-panel textarea{width:100%;min-height:140px;background:var(--bg);border:1px solid var(--border);color:var(--fg);font-family:'JetBrains Mono',monospace;font-size:13px;padding:11px 13px;clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,0 100%);line-height:1.6;resize:vertical}
.notes-panel textarea:focus{border-color:var(--signal);outline:none}
.notes-panel .row{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center}
.notes-panel .flag-btn{font-family:var(--font-m);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;padding:8px 14px;background:var(--signal);color:var(--bg);border:0;cursor:pointer;clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,0 100%);transition:all .15s}
.notes-panel .flag-btn:hover{box-shadow:0 0 12px oklch(0.82 0.20 195/.4)}
.notes-panel .flag-btn:disabled{opacity:.5;cursor:default}
.notes-panel .flag-list{margin-top:10px;display:flex;flex-direction:column;gap:5px}
.notes-panel .flag-item{display:flex;justify-content:space-between;gap:10px;padding:6px 10px;background:var(--bg);border-left:2px solid var(--signal);font-family:var(--font-m);font-size:11px;letter-spacing:.5px}
.notes-panel .flag-item .ts{color:var(--signal-cyan)}
.notes-panel .flag-item .lbl{color:var(--ink-dim);flex:1;text-align:left}
.notes-panel .info{font-family:var(--font-m);font-size:10px;color:var(--ink-faint);letter-spacing:1px;line-height:1.5;margin-top:6px}

/* Contributions */
.contrib-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:760px){.contrib-row{grid-template-columns:1fr}}
.contrib-card{background:var(--card);border:1px solid var(--border);clip-path:var(--cut);padding:18px}
.contrib-h{font-family:var(--font-d);font-size:18px;letter-spacing:1.5px;color:var(--signal-cyan);margin-bottom:10px}
.contrib-list{list-style:none;display:flex;flex-direction:column;gap:6px}
.contrib-list li{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-top:1px dashed var(--border);font-family:var(--font-m);font-size:12px}
.contrib-list li:first-child{border-top:0}
.contrib-list .t{color:var(--ink-dim)}
.contrib-list .x{color:var(--signal);font-weight:600}

.empty{padding:24px;text-align:center;color:var(--ink-faint);font-family:var(--font-m);font-size:13px;letter-spacing:2px;text-transform:uppercase}

.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);background:var(--card);border:1px solid var(--signal);color:var(--fg);font-family:var(--font-m);font-size:13px;padding:14px 22px;clip-path:var(--cut);z-index:9998;opacity:0;pointer-events:none;transition:all .25s;letter-spacing:1px;text-transform:uppercase;max-width:90vw}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.err{border-color:var(--red);color:oklch(0.85 0.20 25)}

.footer{padding:36px 24px;text-align:center;font-family:var(--font-m);font-size:12px;text-transform:uppercase;letter-spacing:2px;color:var(--ink-faint);margin-top:48px;border-top:1px solid var(--border)}
.footer a{color:var(--ink-faint);text-decoration:none;margin:0 6px}
.footer a:hover{color:var(--signal-cyan)}

::selection{background:var(--signal);color:var(--bg)}
</style>
</head>
<body>
<nav class="nav">
  <a href="/" class="nav-brand"><img src="/logo.png" alt="ContentLore"></a>
  <span class="nav-mod" id="welcome-strip">Loading…</span>
  <span class="nav-spacer"></span>
  <a class="nav-link" href="/moderators/">About</a>
  <button class="nav-link" id="alerts-btn" type="button" data-state="off">🔕 Alerts</button>
  <button class="nav-link" id="logout" type="button">Sign out</button>
</nav>

<div class="mx">
  <div id="dashboard-host">
    <div class="empty">Loading mod dashboard…</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<div class="footer">
  ContentLore · Mod Dashboard · Refreshes every 60 seconds ·
  <a href="/gta-rp/">Live hub</a>
</div>

<script>
const TOKEN_KEY = 'cl:mod:token';
const PROFILE_KEY = 'cl:mod:profile';

function getToken() { try { return localStorage.getItem(TOKEN_KEY) || ''; } catch { return ''; } }
function clearToken() { try { localStorage.removeItem(TOKEN_KEY); localStorage.removeItem(PROFILE_KEY); } catch {} }

if (!getToken()) {
  location.replace('/moderators/login/');
}

document.getElementById('logout').addEventListener('click', () => {
  clearToken();
  location.assign('/moderators/login/');
});

// ---------- Mod alerts (item 6) ----------
const ALERTS_KEY = 'cl:mod:alerts:endpoint';
function urlBase64ToUint8(b64) {
  const padding = '='.repeat((4 - b64.length % 4) % 4);
  const base64 = (b64 + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  const out = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) out[i] = raw.charCodeAt(i);
  return out;
}

async function refreshAlertsBtn() {
  const btn = document.getElementById('alerts-btn');
  if (!btn) return;
  const stored = (() => { try { return localStorage.getItem(ALERTS_KEY); } catch { return null; } })();
  if (stored && Notification.permission === 'granted') {
    btn.dataset.state = 'on';
    btn.textContent = '🔔 Alerts on';
  } else {
    btn.dataset.state = 'off';
    btn.textContent = '🔕 Alerts';
  }
}

document.addEventListener('DOMContentLoaded', refreshAlertsBtn);
setTimeout(refreshAlertsBtn, 100);

document.getElementById('alerts-btn').addEventListener('click', async () => {
  const btn = document.getElementById('alerts-btn');
  if (btn.dataset.state === 'on') {
    // Disable: unsubscribe + clear local state.
    try {
      const reg = await navigator.serviceWorker?.getRegistration();
      const sub = await reg?.pushManager?.getSubscription();
      if (sub) await sub.unsubscribe();
    } catch {}
    try { localStorage.removeItem(ALERTS_KEY); } catch {}
    btn.dataset.state = 'off';
    btn.textContent = '🔕 Alerts';
    showToast('Mod alerts off');
    return;
  }
  // Enable.
  if (!('serviceWorker' in navigator) || !('PushManager' in window)) {
    showToast('Push notifications unsupported on this browser', true);
    return;
  }
  try {
    const perm = await Notification.requestPermission();
    if (perm !== 'granted') {
      showToast('Permission denied', true);
      return;
    }
    const reg = await navigator.serviceWorker.ready;
    const keyRes = await fetch('/api/push/vapid-public-key');
    const keyJson = await keyRes.json();
    if (!keyJson?.ok || !keyJson.key) {
      showToast('Push not configured server-side', true);
      return;
    }
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8(keyJson.key),
    });
    const res = await modFetch('/api/mod/push-subscribe', {
      method: 'POST',
      body: JSON.stringify({ subscription: sub.toJSON() }),
    });
    const j = await res.json();
    if (!j.ok) {
      await sub.unsubscribe().catch(() => {});
      showToast(j.error || 'Subscription failed', true);
      return;
    }
    try { localStorage.setItem(ALERTS_KEY, sub.endpoint); } catch {}
    btn.dataset.state = 'on';
    btn.textContent = '🔔 Alerts on';
    showToast("Mod alerts on — you'll get a heads-up before the public feed");
  } catch (e) {
    showToast('Subscribe failed: ' + (e.message || e), true);
  }
});

const esc = s => (s ?? '').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtN = n => n == null ? '—' : (n >= 1000 ? (n/1000).toFixed(n>=10000?0:1)+'k' : String(Math.round(n)));
const fmtMins = m => m == null ? '' : (m >= 60 ? Math.floor(m/60) + 'h ' + (m%60) + 'm' : m + 'm');
function timeAgo(ts) {
  if (!ts) return '';
  const diff = Math.floor(Date.now()/1000) - ts;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

const notesState = new Map(); // creator -> { text, lastSaved, dirty, timer }
function ukToday() {
  return new Intl.DateTimeFormat('en-CA', { timeZone: 'Europe/London', year: 'numeric', month: '2-digit', day: '2-digit' }).format(new Date());
}
function fmtTimeOnly(ts) {
  if (!ts) return '';
  return new Date(ts * 1000).toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', timeZone: 'Europe/London' });
}

function attachNotesHandlers(mod) {
  document.querySelectorAll('[data-notes]').forEach(panel => {
    const handle = panel.dataset.creator;
    const ta = panel.querySelector('[data-notes-text]');
    const status = panel.querySelector('[data-status]');
    const flagBtn = panel.querySelector('[data-flag]');
    const flagLabel = panel.querySelector('[data-flag-label]');
    const flagList = panel.querySelector('[data-flag-list]');

    // Initial fetch.
    fetchNotes(handle).then(data => {
      ta.value = data.notes || '';
      renderFlagList(flagList, data.flagged_moments || []);
      status.innerHTML = data.exists
        ? `<span class="saved">Loaded · last saved ${fmtTimeOnly(data.updated_at)}</span>`
        : '<span>New session</span>';
    }).catch(() => {
      status.innerHTML = '<span style="color:oklch(0.85 0.20 25)">Failed to load</span>';
    });

    // Auto-save: 30s debounce after the last keystroke.
    let saveTimer = null;
    let lastSaved = '';
    const scheduleSave = () => {
      if (saveTimer) clearTimeout(saveTimer);
      status.innerHTML = '<span class="saving">Unsaved…</span>';
      saveTimer = setTimeout(async () => {
        if (ta.value === lastSaved) {
          status.innerHTML = '<span class="saved">All changes saved</span>';
          return;
        }
        status.innerHTML = '<span class="saving">Saving…</span>';
        try {
          const res = await modFetch('/api/mod/stream-notes', {
            method: 'POST',
            body: JSON.stringify({ creator_handle: handle, notes: ta.value }),
          });
          const j = await res.json();
          if (!j.ok) throw new Error(j.error || 'save failed');
          lastSaved = ta.value;
          status.innerHTML = `<span class="saved">Saved · ${fmtTimeOnly(j.saved_at)}</span>`;
          if (j.xp_awarded > 0) showToast(`+${j.xp_awarded} XP · stream notes started`);
        } catch (e) {
          status.innerHTML = `<span style="color:oklch(0.85 0.20 25)">Save failed: ${esc(e.message || e)}</span>`;
        }
      }, 30_000);
    };
    ta.addEventListener('input', scheduleSave);
    // Force-save on blur — useful if the mod tabs away before the timer fires.
    ta.addEventListener('blur', () => {
      if (saveTimer) {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(() => {}, 0); // no-op, force scheduled timer to fire immediately
      }
      // Trigger an immediate save run.
      if (ta.value !== lastSaved) {
        modFetch('/api/mod/stream-notes', {
          method: 'POST',
          body: JSON.stringify({ creator_handle: handle, notes: ta.value }),
        }).then(r => r.json()).then(j => {
          if (j?.ok) {
            lastSaved = ta.value;
            status.innerHTML = `<span class="saved">Saved · ${fmtTimeOnly(j.saved_at)}</span>`;
          }
        }).catch(() => {});
      }
    });

    // Flag button.
    flagBtn.addEventListener('click', async () => {
      flagBtn.disabled = true;
      const label = flagLabel.value.trim() || null;
      try {
        const res = await modFetch('/api/mod/flag-moment', {
          method: 'POST',
          body: JSON.stringify({ creator_handle: handle, label }),
        });
        const j = await res.json();
        if (!j.ok) showToast(j.error || 'Flag failed', true);
        else {
          showToast(`+${j.xp_awarded} XP · moment flagged`);
          renderFlagList(flagList, j.flagged_moments || []);
          flagLabel.value = '';
        }
      } catch { showToast('Network error', true); }
      flagBtn.disabled = false;
    });
  });
}

async function fetchNotes(handle) {
  const res = await modFetch('/api/mod/stream-notes?creator=' + encodeURIComponent(handle) + '&date=' + ukToday());
  if (res.status === 401 || res.status === 403) throw new Error('not authorised');

}

      <span class="lbl">${esc(f.label || 'Notable moment')}</span>

}

};
function modHasPerm(mod, perm) { return (PERM_BY_LEVEL[mod.level] || []).includes(perm); }

async function modFetch(path, opts = {}) {
  return fetch(path, {
    ...opts,
    headers: {
      ...(opts.headers || {}),
      Authorization: 'Bearer ' + getToken(),
      'content-type': 'application/json',
    },
  });
}

function attachClipTagHandlers(mod) {
  document.querySelectorAll('.tag-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      e.stopPropagation();
      if (!modHasPerm(mod, 'tag_clip')) {
        showToast('Need Rookie+ to tag clips (you should already have this — check status)', true);
        return;
      }
      const card = btn.closest('.clip-mini');
      const clipId = card.dataset.clipId;
      // Toggle inline form below the actions.
      let form = card.querySelector('.tag-form');
      if (!form) {
        form = document.createElement('div');
        form.className = 'tag-form open';
        form.innerHTML = `
          <input type="text" placeholder="tag (e.g. funny, gang war)" maxlength="40" data-tag>
          <input type="text" placeholder="optional context" maxlength="500" data-ctx>
          <div class="btns"><button type="button" data-action="cancel">Cancel</button><button type="button" class="submit" data-action="submit">Tag +10 XP</button></div>
        `;
        card.querySelector('.body').appendChild(form);
        form.querySelector('[data-action="cancel"]').addEventListener('click', () => form.remove());
        form.querySelector('[data-action="submit"]').addEventListener('click', async () => {
          const tag = form.querySelector('[data-tag]').value.trim();
          const ctx = form.querySelector('[data-ctx]').value.trim();
          if (!tag) { showToast('Enter a tag', true); return; }
          const submit = form.querySelector('[data-action="submit"]');
          submit.disabled = true; submit.textContent = 'Saving…';
          try {
            const res = await modFetch('/api/mod/clip-tag', {
              method: 'POST',
              body: JSON.stringify({ clip_id: clipId, tag, context_description: ctx || null }),
            });
            const j = await res.json();
            if (!j.ok) showToast(j.error || 'Tag failed', true);
            else {
              showToast(`+${j.xp_awarded} XP · #${tag}`);
              form.remove();
              loadDashboard();
            }
          } catch { showToast('Network error', true); }
          submit.disabled = false; submit.textContent = 'Tag +10 XP';
        });
        form.querySelector('[data-tag]').focus();
      } else {
        form.classList.toggle('open');
      }
    });
  });
}

      <div class="row">
        <button type="button" class="flag-btn" data-flag>📌 Flag this moment</button>
        <input type="text" data-flag-label placeholder="Optional label (e.g. 'shootout starts')" maxlength="120" style="flex:1;background:var(--bg);border:1px solid var(--border);color:var(--fg);font-family:var(--font-m);font-size:12px;padding:7px 10px;clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,0 100%)">
      </div>
      <div class="flag-list" data-flag-list></div>
      <div class="info">Notes save every 30 seconds while you type. They're private to you, but the previous day's notes feed into the next AI scene recap.</div>
    </div>
  `;
}

function renderTools(c) {
  // Pull current values from the API response — socials are now part of the
  // creator card payload via getCuratedEntry on the dashboard endpoint.
  // The tools always render, but locked sections show a permission message
  // instead of the form when the mod doesn't have the level for it.
  const profile = getCachedProfile();
  const mod = profile || { level: 'rookie' };

  const sec = (key, headLabel, perm, body, openByDefault = false) => {
    const locked = perm && !modHasPermInline(mod.level, perm);
    const head = `<summary>${headLabel}${perm ? ` <span class="perm ${locked ? 'locked' : ''}">${perm.replace('_', ' ')}</span>` : ''}</summary>`;
    const inner = locked
      ? `<div class="lock-msg">Locked — requires ${permLabel(perm)} level. Earn XP by tagging clips, writing notes, or adding characters.</div>`
      : body;
    return `<details class="tool" ${openByDefault ? 'open' : ''}>${head}<div class="body">${inner}</div></details>`;
  };

  // Read current bio + socials from the per-creator data (we passed them
  // via the dashboard endpoint in getCuratedEntry).
  const charBody = `
    <div class="char-list" data-creator="${esc(c.handle)}"><div class="empty" style="font-size:11px;padding:14px">Loading…</div></div>
    <form data-tool="character-add" data-creator="${esc(c.handle)}">
      <label>Character name</label>
      <input type="text" name="character_name" required maxlength="80" placeholder="e.g. Big Tony Marlow">
      <div class="row">
        <div><label>Server</label><input type="text" name="server" maxlength="100" placeholder="e.g. Orbit RP"></div>
        <div><label>Faction / job</label><input type="text" name="faction" maxlength="100" placeholder="e.g. PD, Triads"></div>
      </div>
      <label>Description</label>
      <textarea name="description" maxlength="600" placeholder="One paragraph backstory or current arc"></textarea>
      <label>Status</label>
      <select name="status">
        <option value="active">Active</option>
        <option value="retired">Retired</option>
        <option value="dead">Dead</option>
      </select>
      <button type="submit" class="save">Add character</button>
    </form>
  `;

  const socialsBody = `
    <form data-tool="socials" data-creator="${esc(c.handle)}">
      <label>TikTok username</label>
      <input type="text" name="tiktok" maxlength="64" placeholder="username (no @)">
      <label>YouTube channel</label>
      <input type="text" name="youtube" maxlength="64" placeholder="channel handle">
      <label>X / Twitter username</label>
      <input type="text" name="x" maxlength="64" placeholder="username (no @)">
      <label>Instagram username</label>
      <input type="text" name="instagram" maxlength="64" placeholder="username (no @)">
      <label>Discord invite URL</label>
      <input type="url" name="discord" maxlength="200" placeholder="https://discord.gg/...">
      <p style="font-family:var(--font-m);font-size:10px;color:var(--ink-faint);letter-spacing:1px;margin:0 0 10px">Empty fields are kept as-is. Twitch + Kick handles can only be changed by an admin.</p>
      <button type="submit" class="save">Save socials</button>
    </form>
  `;

  const bioBody = `
    <form data-tool="bio" data-creator="${esc(c.handle)}">
      <label>Bio (markdown not rendered — keep it plain)</label>
      <textarea name="bio" maxlength="1200" placeholder="Who is ${esc(c.display_name)}? What's their thing? Recent storylines?"></textarea>
      <button type="submit" class="save">Save bio</button>
    </form>
  `;

  return `
    <div class="tools">
      <div class="tools-h">Mod Tools — ${esc(c.display_name)}</div>
      ${sec('character', '🎭 Characters', 'add_character', charBody, true)}
      ${sec('socials', '🔗 Socials editor', 'edit_socials', socialsBody)}
      ${sec('bio', '📝 Bio editor', 'edit_bio', bioBody)}
    </div>
  `;
}

// Inline-permission check — used at render-time when we don't have the
// full mod object handy. Mirrors PERM_BY_LEVEL above.
function modHasPermInline(level, perm) {
  return (PERM_BY_LEVEL[level] || []).includes(perm);
}
function permLabel(perm) {
  if (perm === 'add_character') return 'Regular (100 XP)';
  if (perm === 'edit_socials')  return 'Trusted (300 XP)';
  if (perm === 'edit_bio')      return 'Senior (700 XP)';
  return 'higher';
}
function getCachedProfile() {
  try { return JSON.parse(localStorage.getItem('cl:mod:profile') || 'null'); }
  catch { return null; }
}

function renderContributions(c) {
  const recent = c.recent.slice(0, 8);
  const recentHtml = recent.length
    ? `<ul class="contrib-list">${recent.map(r => `
        <li><span class="t">${esc(CONTRIB_LABELS[r.type] || r.type)} · ${esc(timeAgo(r.created_at))}</span><span class="x">+${r.xp_earned} XP</span></li>
      `).join('')}</ul>`
    : `<div class="empty">No actions yet — start tagging clips, adding characters, or writing notes to earn XP.</div>`;

  const totals = Object.entries(c.by_type || {}).map(([t, n]) =>
    `<li><span class="t">${esc(CONTRIB_LABELS[t] || t)}</span><span class="x">${n}</span></li>`
  ).join('');

  return `
    <h2 class="sec-h">Your Contributions <span class="sub">${c.total_xp} XP total</span></h2>
    <div class="contrib-row">
      <div class="contrib-card">
        <div class="contrib-h">Recent activity</div>
        ${recentHtml}
      </div>
      <div class="contrib-card">
        <div class="contrib-h">Lifetime breakdown</div>
        ${totals ? `<ul class="contrib-list">${totals}</ul>` : '<div class="empty">No contributions logged yet.</div>'}
      </div>
    </div>
  `;
}

loadDashboard();
setInterval(loadDashboard, 60_000);
</script>
</body>
</html>
