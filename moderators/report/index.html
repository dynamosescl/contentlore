<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0a0612">
<script src="/pwa.js" defer></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mod Report Card · ContentLore</title>
<meta name="description" content="A monthly summary of one ContentLore moderator's contributions to the UK GTA RP scene.">
<meta property="og:type" content="article">
<meta property="og:site_name" content="ContentLore">
<meta property="og:title" content="Mod Report Card · ContentLore">
<meta property="og:image" content="https://contentlore.com/logo.png">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0612;--ink:#fff;
  --rookie:#9aa6b2;--regular:#3acc88;--trusted:#5b9bff;--senior:#b56fff;--head:#f5c84a;
  --font-d:'Bebas Neue',Impact,sans-serif;
  --font-m:'JetBrains Mono',monospace;
  --font-b:'Inter',system-ui,sans-serif;
}
html{background:var(--bg);color-scheme:dark}
body{background:var(--bg);color:var(--ink);font-family:var(--font-b);min-height:100vh;-webkit-font-smoothing:antialiased;position:relative}
body::before{content:'';position:fixed;inset:0;background:
  radial-gradient(ellipse at 15% 10%, rgba(80,255,210,.08), transparent 60%),
  radial-gradient(ellipse at 85% 90%, rgba(255,200,80,.10), transparent 60%);
  pointer-events:none;z-index:0}
body>*{position:relative;z-index:1}

.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;border-bottom:1px solid rgba(255,255,255,.05);position:sticky;top:0;background:rgba(10,6,18,.85);backdrop-filter:blur(8px);z-index:100}
.nav .brand img{height:32px;display:block}
.back-link{font-family:var(--font-m);font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.65);text-decoration:none}
.back-link:hover{color:#fff}

.hero{display:flex;flex-direction:column;align-items:center;text-align:center;padding:64px 24px 48px;max-width:780px;margin:0 auto}
.hero-tag{font-family:var(--font-m);font-size:13px;letter-spacing:4px;text-transform:uppercase;background:linear-gradient(90deg,#7af,#fa7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:600}
.hero h1{font-family:var(--font-d);font-size:clamp(56px,11vw,108px);line-height:.95;letter-spacing:3px;text-transform:uppercase;background:linear-gradient(90deg,#fff,#fff,#a8d0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-top:14px}
.hero .lvl{display:inline-flex;align-items:center;gap:8px;margin-top:14px;font-family:var(--font-m);font-size:11px;letter-spacing:2px;text-transform:uppercase}
.lvl-pill{font-family:var(--font-m);font-size:10px;letter-spacing:2px;padding:4px 10px;border-radius:2px;color:#0a0c10;font-weight:700}
.lvl-pill.rookie{background:var(--rookie)}
.lvl-pill.regular{background:var(--regular)}
.lvl-pill.trusted{background:var(--trusted)}
.lvl-pill.senior{background:var(--senior);color:#fff}
.lvl-pill.head{background:var(--head)}
.hero p{max-width:560px;color:rgba(255,255,255,.65);line-height:1.6;font-size:15px;margin-top:18px}

.cards{max-width:1080px;margin:0 auto;padding:24px;display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:880px){.cards{grid-template-columns:1fr 1fr}}
@media(max-width:560px){.cards{grid-template-columns:1fr}}
.card{position:relative;padding:30px 28px;border-radius:24px;overflow:hidden;min-height:200px;display:flex;flex-direction:column;justify-content:space-between;box-shadow:0 18px 40px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.06)}
.card::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at top right,rgba(255,255,255,.12),transparent 60%);pointer-events:none}
.g1{background:linear-gradient(135deg,#1f4dff 0%,#9c1bff 100%)}
.g2{background:linear-gradient(135deg,#ff5e98 0%,#ffc74f 100%)}
.g3{background:linear-gradient(135deg,#00d2c0 0%,#0091ff 100%)}
.g4{background:linear-gradient(135deg,#ff7a00 0%,#ff2e6b 100%)}
.g5{background:linear-gradient(135deg,#9d4cff 0%,#1de1ff 100%)}
.g6{background:linear-gradient(135deg,#0c2a52 0%,#1572a8 100%)}
.card-tag{font-family:var(--font-m);font-size:11px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.85);font-weight:600;position:relative;z-index:2}
.card-big{font-family:var(--font-d);font-size:clamp(48px,8vw,72px);line-height:.95;letter-spacing:1px;color:#fff;position:relative;z-index:2;margin:8px 0 0}
.card-unit{font-family:var(--font-b);font-size:13px;color:rgba(255,255,255,.78);position:relative;z-index:2;margin-top:6px;letter-spacing:.5px}
.card-foot{font-family:var(--font-m);font-size:11px;color:rgba(255,255,255,.55);text-transform:uppercase;letter-spacing:1.5px;margin-top:auto;padding-top:14px;border-top:1px dashed rgba(255,255,255,.18);position:relative;z-index:2}

.section-h{font-family:var(--font-d);font-size:32px;letter-spacing:2px;margin:32px 0 14px;padding:0 24px;max-width:1080px;margin-left:auto;margin-right:auto}
.list{max-width:1080px;margin:0 auto;padding:0 24px}
.row{display:flex;justify-content:space-between;gap:14px;padding:12px 16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-left:3px solid #7af;border-radius:6px;margin-bottom:6px;font-family:var(--font-m);font-size:13px}
.row .left{flex:1;min-width:0;color:rgba(255,255,255,.85)}
.row .ctx{color:rgba(255,255,255,.45);font-size:11px;margin-top:2px;letter-spacing:.5px}
.row .when{color:rgba(255,255,255,.4);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;flex-shrink:0;align-self:flex-start}
.row .tag-pill{display:inline-block;padding:2px 8px;border-radius:2px;background:rgba(122,170,255,.15);color:#7af;font-size:11px;font-weight:600;letter-spacing:.5px}

.share-row{padding:36px 24px;max-width:780px;margin:0 auto}
.share-box{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:24px}
.share-tag{font-family:var(--font-m);font-size:12px;letter-spacing:3px;text-transform:uppercase;color:rgba(255,255,255,.85);margin-bottom:14px}
.share-line{display:flex;gap:8px}
.share-line input{flex:1;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.1);color:#fff;padding:12px 14px;border-radius:10px;font-family:var(--font-m);font-size:13px}
.share-line button{background:linear-gradient(135deg,#7af,#fa7);border:0;color:#0a0612;font-family:var(--font-d);font-size:14px;letter-spacing:2px;padding:12px 22px;border-radius:10px;cursor:pointer;transition:transform .15s}
.share-line button:hover{transform:translateY(-1px)}

.ftr{padding:24px;text-align:center;font-family:var(--font-m);font-size:12px;color:rgba(255,255,255,.5);letter-spacing:1.5px;text-transform:uppercase}
.ftr a{color:rgba(255,255,255,.7);text-decoration:none;margin:0 6px}
.ftr a:hover{color:#fff}

.empty-wrap{max-width:560px;margin:0 auto;padding:96px 24px;text-align:center}
.empty-wrap h1{font-family:var(--font-d);font-size:clamp(56px,12vw,96px);line-height:.95;letter-spacing:3px}
.empty-wrap p{margin-top:16px;color:rgba(255,255,255,.7);line-height:1.6}
.empty-wrap a{display:inline-block;margin-top:24px;font-family:var(--font-m);font-size:13px;text-transform:uppercase;letter-spacing:2px;color:#7af;text-decoration:none;border:1px solid rgba(255,255,255,.15);padding:12px 22px;border-radius:10px}
.empty-wrap a:hover{border-color:#7af}
</style>
</head>
<body>
<nav class="nav">
  <a href="/" class="brand"><img src="/logo.png" alt="ContentLore"></a>
  <a href="/moderators/" class="back-link">← Mods</a>
</nav>

<div id="host">
  <div class="empty-wrap"><h1>Loading…</h1></div>
</div>

<script>
const esc = s => (s ?? '').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const fmtN = n => n == null ? '—' : (n >= 1000 ? (n/1000).toFixed(1).replace(/\.0$/, '') + 'k' : String(Math.round(n)));
const CONTRIB_LABELS = {
  clip_tag: 'Clip tags',
  character_add: 'Characters added',
  social_update: 'Social updates',
  stream_notes: 'Stream notes',
  moment_flag: 'Moments flagged',
  bio_edit: 'Bio edits',
};

const params = new URLSearchParams(location.search);
const id = parseInt(params.get('id'), 10);
const host = document.getElementById('host');

async function load() {
  if (!id) {
    host.innerHTML = '<div class="empty-wrap"><h1>404</h1><p>No mod id provided. Append <code>?id=</code> to the URL.</p><a href="/moderators/">← Back</a></div>';
    return;
  }
  try {
    const r = await fetch('/api/mod/report?id=' + id);
    const d = await r.json();
    if (!d.ok) throw new Error(d.error || 'load failed');
    render(d);
  } catch (e) {
    host.innerHTML = `<div class="empty-wrap"><h1>404</h1><p>${esc(e.message || e)}</p><a href="/moderators/">← Back</a></div>`;
  }
}

function render(d) {
  const m = d.mod;
  const monthLabel = (() => {
    const [y, mo] = d.month.split('-').map(Number);
    return new Date(Date.UTC(y, mo - 1, 1)).toLocaleDateString('en-GB', { month: 'long', year: 'numeric' });
  })();
  const cContribs = m.creators_modded.map(esc).join(' · ') || '—';

  host.innerHTML = `
    <div class="hero">
      <div class="hero-tag">${esc(monthLabel)} Report Card</div>
      <h1>${esc(m.display_name)}</h1>
      <div class="lvl">
        <span class="lvl-pill ${esc(m.level)}">${esc(m.level)}</span>
        <span style="color:rgba(255,255,255,.65)">${m.xp} lifetime XP · Mods for ${cContribs}</span>
        ${m.mod_of_month ? '<span style="color:#f5c84a">👑 Mod of the Month</span>' : ''}
      </div>
      <p>One-screen recap of ${esc(m.display_name)}'s contributions to the UK GTA RP scene this month and across their time as a verified mod.</p>
    </div>

    <div class="cards">
      <div class="card g1">
        <div class="card-tag">XP this month</div>
        <div class="card-big">${fmtN(d.monthly.xp)}</div>
        <div class="card-unit">earned in ${esc(monthLabel)}</div>
        <div class="card-foot">${m.xp} lifetime</div>
      </div>
      <div class="card g2">
        <div class="card-tag">Hours backed</div>
        <div class="card-big">${d.monthly.hours_streamed_by_creators}</div>
        <div class="card-unit">streamed by their creators</div>
        <div class="card-foot">${cContribs.length > 80 ? cContribs.slice(0, 80) + '…' : cContribs}</div>
      </div>
      <div class="card g3">
        <div class="card-tag">Level</div>
        <div class="card-big" style="font-size:48px">${esc(d.lifetime.level_label)}</div>
        <div class="card-unit">${d.lifetime.next_level ? `${m.xp} / ${d.lifetime.next_level.min} → ${esc(d.lifetime.next_level.id.toUpperCase())}` : 'Max level reached'}</div>
        <div class="card-foot">${d.lifetime.progress_pct}% progress</div>
      </div>
      ${renderTypeCards(d.monthly.by_type)}
    </div>

    <h2 class="section-h">Recent clip tags</h2>
    <div class="list" id="tags-list">
      ${d.highlights.recent_clip_tags.length ? d.highlights.recent_clip_tags.map(t => `
        <div class="row">
          <div class="left">
            <span class="tag-pill">#${esc(t.tag)}</span>
            ${t.context_description ? `<div class="ctx">${esc(t.context_description)}</div>` : ''}
          </div>
          <div class="when">${esc(timeAgo(t.created_at))}</div>
        </div>
      `).join('') : '<div class="row"><div class="left">No clip tags yet.</div></div>'}
    </div>

    <h2 class="section-h">Notable moments flagged</h2>
    <div class="list" id="flag-list">
      ${d.highlights.recent_flagged_moments.length ? d.highlights.recent_flagged_moments.map(f => `
        <div class="row">
          <div class="left">
            <strong>${esc(f.label)}</strong>
            <div class="ctx">For ${esc(f.creator_handle)} · ${esc(f.session_date)}</div>
          </div>
          <div class="when">${esc(timeAgo(f.ts))}</div>
        </div>
      `).join('') : '<div class="row"><div class="left">No flagged moments yet.</div></div>'}
    </div>

    <div class="share-row">
      <div class="share-box">
        <div class="share-tag">Share this report</div>
        <div class="share-line">
          <input id="share-url" readonly value="${esc(location.origin + location.pathname + '?id=' + m.id)}">
          <button id="share-btn" type="button">Copy link</button>
        </div>
      </div>
    </div>

    <div class="ftr">
      ContentLore · Mod Report Card · <a href="/moderators/">All mods</a> · <a href="/">Home</a>
    </div>
  `;

  document.getElementById('share-btn').addEventListener('click', () => {
    navigator.clipboard.writeText(document.getElementById('share-url').value);
    document.getElementById('share-btn').textContent = 'Copied ✓';
    setTimeout(() => document.getElementById('share-btn').textContent = 'Copy link', 1800);
  });
}

function renderTypeCards(byType) {
  const colours = ['g4', 'g5', 'g6'];
  const entries = Object.entries(byType).sort((a, b) => b[1].n - a[1].n).slice(0, 3);
  if (!entries.length) return '';
  return entries.map(([t, v], i) => `
    <div class="card ${colours[i] || 'g4'}">
      <div class="card-tag">${esc(CONTRIB_LABELS[t] || t)}</div>
      <div class="card-big">${v.n}</div>
      <div class="card-unit">${v.xp} XP earned</div>
      <div class="card-foot">this month</div>
    </div>
  `).join('');
}

function timeAgo(ts) {
  if (!ts) return '';
  const diff = Math.floor(Date.now()/1000) - ts;
  if (diff < 3600) return Math.max(1, Math.floor(diff/60)) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}

load();
</script>
</body>
</html>
