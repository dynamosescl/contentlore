<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContentLore — Creators</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0A0A0B;--bg2:#111113;--bg3:#161618;--border:#2A2A2E;--t1:#E8E8EC;--t2:#9898A0;--t3:#5A5A65;--mag:#FF2D6B;--mag-dim:rgba(255,45,107,.12);--cyan:#00E5FF;--cyan-dim:rgba(0,229,255,.1);--green:#00FF85;--green-dim:rgba(0,255,133,.12);--gold:#D4A574;--font-d:'Oswald',sans-serif;--font-m:'JetBrains Mono',monospace;--font-b:system-ui,sans-serif;--clip:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));--clip-sm:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px))}
body{background:var(--bg);color:var(--t1);font-family:var(--font-b);min-height:100vh}
.nav{height:56px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;position:sticky;top:0;z-index:100}
.nav-brand{font-family:var(--font-d);font-weight:700;font-size:22px;text-transform:uppercase;letter-spacing:4px;margin-right:auto;text-decoration:none;color:var(--t1)}.nav-brand .cl{color:var(--mag)}
.nav-links{display:flex;gap:0}
.nav-link{font-family:var(--font-d);font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);text-decoration:none;padding:18px 16px;border-bottom:2px solid transparent;transition:all .2s}
.nav-link:hover{color:var(--t2)}.nav-link.active{color:var(--gold);border-bottom-color:var(--gold)}.nav-link.hub{color:var(--mag)}
.container{max-width:1200px;margin:0 auto;padding:40px 24px}
h1{font-family:var(--font-d);font-size:48px;text-transform:uppercase;letter-spacing:4px}
h1 .accent{color:var(--mag)}
.sub{font-family:var(--font-m);font-size:13px;color:var(--t3);margin-top:8px}
.stat-row{display:flex;gap:16px;margin:24px 0;flex-wrap:wrap}
.stat{background:var(--bg2);border:1px solid var(--border);clip-path:var(--clip-sm);padding:16px 20px;min-width:140px;text-align:center}
.stat .val{font-family:var(--font-d);font-size:32px;font-weight:700}
.stat .lbl{font-family:var(--font-m);font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;margin-top:4px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;margin-top:24px}
.card{background:var(--bg2);border:1px solid var(--border);clip-path:var(--clip-sm);padding:14px 16px;display:flex;align-items:center;gap:12px;transition:all .15s;cursor:pointer}
.card:hover{border-color:var(--mag);background:var(--bg3)}
.card .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.card .dot.live{background:var(--green);box-shadow:0 0 6px var(--green)}
.card .dot.off{background:var(--border)}
.card .name{font-family:var(--font-d);font-size:14px;text-transform:uppercase;letter-spacing:.5px}
.card .meta{font-family:var(--font-m);font-size:10px;color:var(--t3)}
.card .viewers{font-family:var(--font-m);font-size:12px;color:var(--green);margin-left:auto}
.empty{text-align:center;padding:40px;font-family:var(--font-m);font-size:13px;color:var(--t3)}
body::before{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.5}
*{position:relative;z-index:1}.nav{z-index:100}
</style>
</head>
<body>
<nav class="nav">
  <a href="/" class="nav-brand"><span class="cl">Content</span>Lore</a>
  <div class="nav-links">
    <a href="/" class="nav-link">Home</a>
    <a href="/gta-rp/" class="nav-link hub">GTA RP Hub</a>
    <a href="/the-platform/" class="nav-link">Platform Intel</a>
    <a href="/creators/" class="nav-link active">Creators</a>
    <a href="/about/" class="nav-link">About</a>
  </div>
</nav>
<div class="container">
  <h1><span class="accent">Creator</span> Roster</h1>
  <p class="sub">Every UK GTA RP creator we track — live status updated every 15 minutes</p>
  <div class="stat-row">
    <div class="stat"><div class="val" style="color:var(--cyan)" id="s-total">—</div><div class="lbl">Total Tracked</div></div>
    <div class="stat"><div class="val" style="color:var(--green)" id="s-live">—</div><div class="lbl">Live Now</div></div>
    <div class="stat"><div class="val" style="color:var(--mag)" id="s-viewers">—</div><div class="lbl">Total Viewers</div></div>
  </div>
  <div class="grid" id="creator-grid"><div class="empty">Loading creators…</div></div>
</div>
<script>
async function load() {
  try {
    const [lRes, cRes] = await Promise.all([
      fetch('/api/live-now').catch(()=>({json:()=>({})})),
      fetch('/api/creators?limit=200').catch(()=>({json:()=>({})}))
    ]);
    const lData = await lRes.json();
    const cData = await cRes.json();
    const live = lData.live || lData.creators || [];
    const creators = cData.creators || cData || [];
    const liveMap = {};
    live.forEach(c => { liveMap[(c.name||c.creator_name||'').toLowerCase()] = c; });
    document.getElementById('s-total').textContent = creators.length || '—';
    document.getElementById('s-live').textContent = live.length;
    document.getElementById('s-viewers').textContent = fmtN(live.reduce((s,c)=>s+(c.viewers||0),0));
    const merged = creators.map(c => {
      const name = (c.creator_name||c.name||'').toLowerCase();
      const l = liveMap[name];
      return {...c, isLive: !!l, viewers: l?.viewers || 0, server: l?.server || c.server || ''};
    }).sort((a,b) => b.isLive - a.isLive || b.viewers - a.viewers);
    const grid = document.getElementById('creator-grid');
    grid.innerHTML = merged.slice(0,100).map(c => {
      const name = c.creator_name || c.name || '?';
      return `<div class="card" onclick="window.open('https://twitch.tv/${name.toLowerCase()}','_blank')">
        <div class="dot ${c.isLive?'live':'off'}"></div>
        <div><div class="name">${name}</div><div class="meta">${c.server||c.primary_platform||'twitch'}</div></div>
        ${c.isLive ? `<div class="viewers">${fmtN(c.viewers)}</div>` : ''}
      </div>`;
    }).join('');
  } catch(e) { console.error(e); }
}
function fmtN(n){if(n>=1000)return(n/1000).toFixed(1)+'k';return n.toString()}
load();
</script>
</body>
</html>
