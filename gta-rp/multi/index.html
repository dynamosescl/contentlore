<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-View — Watch every UK GTA RP POV at once · ContentLore</title>
<meta name="description" content="Pick up to 6 UK GTA RP streams side by side with a detachable chat drawer. Twitch + Kick.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:oklch(0.10 0.04 190);
  --fg:oklch(0.97 0.02 320);
  --card:oklch(0.14 0.05 190);
  --card2:oklch(0.19 0.06 190);
  --ink-dim:oklch(0.78 0.05 320);
  --ink-faint:oklch(0.55 0.06 190);
  --signal:oklch(0.82 0.20 195);
  --signal-dim:oklch(0.65 0.18 195);
  --signal-cyan:oklch(0.85 0.18 200);
  --border:oklch(0.28 0.06 190);
  --live:oklch(0.82 0.20 195);
  --twitch:oklch(0.65 0.25 295);
  --kick:oklch(0.82 0.22 145);
  --destructive:oklch(0.68 0.27 25);
  --font-d:'Bebas Neue',Impact,sans-serif;
  --font-m:'JetBrains Mono',monospace;
  --font-b:'Inter',system-ui,sans-serif;
  --cut:polygon(0 0,calc(100% - 14px) 0,100% 14px,100% 100%,0 100%);
  --drawer-w:380px;
  --nav-h:48px;
}
html{background:var(--bg);color-scheme:dark}
body{background:var(--bg);color:var(--fg);font-family:var(--font-b);min-height:100vh;-webkit-font-smoothing:antialiased;position:relative}

/* Scanline overlay */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:1;background-image:repeating-linear-gradient(0deg,oklch(0.82 0.20 195/.04) 0 1px,transparent 1px 3px);mix-blend-mode:screen}
body>*{position:relative;z-index:3}

/* NAV */
.nav{height:var(--nav-h);background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;position:sticky;top:0;z-index:100}
.nav-brand{font-family:var(--font-d);font-size:22px;letter-spacing:2px;margin-right:24px;text-decoration:none;color:var(--fg);display:flex;align-items:center;gap:6px}
.nav-brand .cl{color:var(--signal)}
.nav-brand .tag{font-family:var(--font-m);font-size:9px;color:var(--ink-faint);letter-spacing:1px;background:oklch(0.82 0.20 195/.1);padding:2px 6px}
.nav-links{display:flex;gap:0}
.nav-link{font-family:var(--font-m);font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--ink-faint);text-decoration:none;padding:14px 14px;border-bottom:2px solid transparent;transition:all .2s}
.nav-link:hover{color:var(--ink-dim)}
.nav-link.active{color:var(--signal);border-bottom-color:var(--signal)}
.nav-live::before{content:'';width:6px;height:6px;background:var(--signal);border-radius:50%;display:inline-block;margin-right:4px;animation:lpulse 2s infinite}
@keyframes lpulse{0%,100%{box-shadow:0 0 0 0 oklch(0.82 0.20 195/.8),0 0 12px oklch(0.82 0.20 195/.6)}70%{box-shadow:0 0 0 10px oklch(0.82 0.20 195/0),0 0 18px oklch(0.82 0.20 195/.3)}}

.wrap{max-width:1600px;margin:0 auto;padding:12px 16px 40px;transition:padding-right .25s ease}
body.drawer-open .wrap{padding-right:calc(var(--drawer-w) + 16px)}

/* HEADER */
.header{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:20px}
.header-left .kicker{font-family:var(--font-m);font-size:11px;text-transform:uppercase;letter-spacing:3px;color:var(--signal);margin-bottom:6px;text-shadow:0 0 6px oklch(0.82 0.20 195/.7),0 0 18px oklch(0.82 0.20 195/.45)}
.header-left h1{font-family:var(--font-d);font-size:clamp(36px,6vw,64px);line-height:.95;color:var(--fg)}
.header-left h1 .neon{color:var(--signal);text-shadow:0 0 6px oklch(0.82 0.20 195/.4),0 0 18px oklch(0.82 0.20 195/.25)}
.header-left .sub{font-size:13px;color:var(--ink-dim);margin-top:6px}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-family:var(--font-m);font-size:11px;text-transform:uppercase;letter-spacing:2px}
.header-right .count{color:var(--ink-dim)}
.header-right .clear{color:var(--ink-dim);background:none;border:none;cursor:pointer;text-decoration:underline;font:inherit;text-transform:uppercase;letter-spacing:inherit}
.header-right .clear:hover{color:var(--signal)}
.af-toggle{display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border:1px solid var(--border);cursor:pointer;transition:all .2s;user-select:none}
.af-toggle.on{border-color:oklch(0.82 0.20 195/.6);color:var(--signal);background:oklch(0.82 0.20 195/.1)}
.af-toggle input{display:none}
.watch-btn{border:1px solid oklch(0.82 0.20 195/.6);color:var(--signal);background:none;padding:6px 12px;cursor:pointer;font:inherit;text-transform:uppercase;letter-spacing:inherit;transition:all .2s}
.watch-btn:hover{background:oklch(0.82 0.20 195/.15);box-shadow:0 0 14px oklch(0.82 0.20 195/.5)}
.drawer-toggle{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--border);background:none;color:var(--ink-dim);padding:6px 12px;cursor:pointer;font:inherit;text-transform:uppercase;letter-spacing:inherit;transition:all .15s}
.drawer-toggle:hover{border-color:var(--signal);color:var(--fg)}
body.drawer-open .drawer-toggle{border-color:oklch(0.82 0.20 195/.6);color:var(--signal);background:oklch(0.82 0.20 195/.1)}
.drawer-toggle .ic{font-size:13px;line-height:1}

/* STAGE */
.stage-header{display:flex;align-items:flex-end;justify-content:space-between;padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:12px}
.stage-header .sh-kicker{font-family:var(--font-m);font-size:11px;text-transform:uppercase;letter-spacing:3px;color:var(--signal);margin-bottom:4px}
.stage-header h2{font-family:var(--font-d);font-size:28px;color:var(--fg)}
.stage-header .mode-badge{font-family:var(--font-m);font-size:10px;text-transform:uppercase;letter-spacing:2px;padding:4px 8px;border:1px solid var(--border);color:var(--ink-dim)}
.stage-header .mode-badge.auto{border-color:oklch(0.82 0.20 195/.6);color:var(--signal);background:oklch(0.82 0.20 195/.1)}

/* LAYOUT PRESETS */
.layout-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-family:var(--font-m);margin-bottom:14px}
.layout-bar .lb-label{font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--ink-faint);margin-right:2px}
.layout-btn{font-family:var(--font-m);font-size:10px;text-transform:uppercase;letter-spacing:1px;padding:5px 10px;background:var(--card2);border:1px solid var(--border);color:var(--ink-dim);cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.layout-btn:hover{border-color:var(--signal);color:var(--fg)}
.layout-btn.active{background:var(--signal);color:var(--bg);border-color:var(--signal);font-weight:600}
.layout-btn .ico{display:inline-grid;gap:1px;width:14px;height:10px}
.layout-btn .ico .c{background:currentColor;border-radius:1px}

/* VIDEO GRID — tile = video + persistent info bar. Chat lives in the drawer now. */
.vid-grid{display:grid;gap:8px;margin-bottom:24px}
.vid-grid.layout-focus{grid-template-columns:1fr}
.vid-grid.layout-duo{grid-template-columns:1fr 1fr}
.vid-grid.layout-quad{grid-template-columns:1fr 1fr}
.vid-grid.layout-six{grid-template-columns:1fr 1fr 1fr}
@media(max-width:1100px){.vid-grid.layout-six{grid-template-columns:1fr 1fr}}
@media(max-width:700px){.vid-grid.layout-duo,.vid-grid.layout-quad,.vid-grid.layout-six{grid-template-columns:1fr}}

.tile{position:relative;border:1px solid var(--border);background:transparent;overflow:hidden;transition:all .2s;display:flex;flex-direction:column}
.tile.top-tile{border-color:var(--signal);box-shadow:0 0 24px oklch(0.82 0.20 195/.55)}
.tile-video{position:relative;aspect-ratio:16/9;background:#000;overflow:hidden}
.tile-video iframe{position:absolute;inset:0;width:100%;height:100%;border:none}

.tile-info{display:flex;align-items:center;gap:10px;padding:7px 10px;background:var(--card);border-top:1px solid var(--border);font-family:var(--font-m);font-size:11px;color:var(--ink-dim);min-height:32px;flex-wrap:wrap}
.tile-info .ti-name{font-family:var(--font-d);font-size:14px;letter-spacing:1px;color:var(--fg);text-decoration:none}
.tile-info .ti-name:hover{color:var(--signal)}
.tile-info .ti-game{color:var(--signal-cyan);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tile-info .ti-stat{display:inline-flex;align-items:center;gap:4px}
.tile-info .ti-stat.viewers{color:var(--signal);font-weight:600}
.tile-info .ti-stat.uptime{color:var(--ink-faint);margin-left:auto}
.tile-info .ti-chat{color:var(--ink-faint);background:none;border:none;cursor:pointer;font:inherit;padding:2px 6px;text-transform:uppercase;letter-spacing:1px;transition:color .15s}
.tile-info .ti-chat:hover{color:var(--signal)}

.tile-overlay{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:6px 8px;background:linear-gradient(180deg,rgba(0,0,0,.8),transparent);pointer-events:none;flex-wrap:wrap;gap:4px;z-index:2}
.tile-overlay>*{pointer-events:auto}
.tile-badge{font-family:var(--font-m);font-size:9px;text-transform:uppercase;letter-spacing:2px;padding:2px 6px;background:rgba(0,0,0,.6);display:inline-flex;align-items:center;gap:4px}
.tile-badge.live-b{color:var(--signal)}
.tile-badge.live-b .dot{width:5px;height:5px;background:var(--signal);border-radius:50%;animation:lpulse 2s infinite}
.tile-badge.name-b{color:var(--fg);font-family:var(--font-d);font-size:14px;letter-spacing:1px}
.tile-badge.plat-b.twitch{color:var(--twitch)}
.tile-badge.plat-b.kick{color:var(--kick)}
.tile-badge.top-b{color:var(--signal);border:1px solid oklch(0.82 0.20 195/.6);text-shadow:0 0 6px oklch(0.82 0.20 195/.7)}
.tile-badge.audio-b{color:var(--signal-cyan);border:1px solid oklch(0.85 0.18 200/.6)}
.tile-btn{font-family:var(--font-m);font-size:10px;text-transform:uppercase;color:var(--fg);background:rgba(0,0,0,.6);border:none;padding:4px 8px;cursor:pointer;transition:background .2s}
.tile-btn:hover{background:oklch(0.82 0.20 195/.3)}
.tile-btn.remove:hover{background:oklch(0.68 0.27 25/.8)}

/* ============================================================
   CHAT DRAWER — fixed to the right edge below the nav.
   Slides off-screen via translateX(100%) when closed.
   On <900px screens it becomes a bottom-up overlay covering the
   stream grid.
   ============================================================ */
.chat-drawer{
  position:fixed;
  top:var(--nav-h);
  right:0;
  bottom:0;
  width:var(--drawer-w);
  background:var(--card);
  border-left:1px solid var(--border);
  display:flex;
  flex-direction:column;
  z-index:90;
  transform:translateX(100%);
  transition:transform .25s ease;
  box-shadow:-12px 0 32px rgba(0,0,0,.4);
}
.chat-drawer.open{transform:translateX(0)}

.cd-head{display:flex;align-items:stretch;border-bottom:1px solid var(--border);background:var(--card2);min-height:40px}
.cd-tabs{display:flex;flex:1;overflow-x:auto;scrollbar-width:thin}
.cd-tabs::-webkit-scrollbar{height:4px}
.cd-tab{flex-shrink:0;padding:10px 14px;font-family:var(--font-m);font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--ink-dim);background:none;border:none;border-right:1px solid var(--border);cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all .15s;max-width:160px}
.cd-tab:hover{color:var(--fg);background:oklch(0.13 0.05 190/.6)}
.cd-tab.active{color:var(--signal);background:oklch(0.82 0.20 195/.12);border-bottom:2px solid var(--signal)}
.cd-tab .name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cd-tab .plat{font-size:8px;flex-shrink:0}
.cd-tab .plat.tw{color:oklch(0.82 0.20 195/.6)}
.cd-tab .plat.ki{color:oklch(0.82 0.22 145/.7)}
.cd-tab.active .plat{color:oklch(0.82 0.20 195/.9)}
.cd-close{flex-shrink:0;border:none;border-left:1px solid var(--border);background:none;color:var(--ink-dim);font-family:var(--font-m);font-size:14px;padding:0 14px;cursor:pointer;transition:all .15s}
.cd-close:hover{background:oklch(0.68 0.27 25/.2);color:var(--fg)}

.cd-body{flex:1;position:relative;background:#000;overflow:hidden}
.cd-body iframe{position:absolute;inset:0;width:100%;height:100%;border:none;display:block}
.cd-empty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;color:var(--ink-faint);font-family:var(--font-m);font-size:11px;text-transform:uppercase;letter-spacing:2px;line-height:1.6}
.cd-empty.hidden{display:none}

@media(max-width:900px){
  body.drawer-open .wrap{padding-right:16px}
  .chat-drawer{
    top:auto;
    left:0;
    right:0;
    bottom:0;
    width:100%;
    height:80vh;
    max-height:80vh;
    border-left:none;
    border-top:1px solid var(--border);
    transform:translateY(100%);
    box-shadow:0 -12px 32px rgba(0,0,0,.5);
  }
  .chat-drawer.open{transform:translateY(0)}
  .cd-tab{max-width:120px}
}

/* EMPTY STAGE */
.empty-stage{border:1px dashed var(--border);background:oklch(0.13 0.05 190/.4);padding:36px 24px;margin-bottom:24px}
.empty-stage.no-live{text-align:center;padding:48px}
.empty-stage h3{font-family:var(--font-d);font-size:clamp(26px,4vw,40px);color:var(--fg);margin-bottom:6px;letter-spacing:1px}
.empty-stage p{font-size:13px;color:var(--ink-dim);max-width:520px;margin:0 0 22px}
.empty-stage.no-live p{margin:0 auto;max-width:400px}
.es-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;margin-top:16px}
.es-card{position:relative;background:var(--card);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:all .2s;text-align:left}
.es-card:hover{border-color:var(--signal);transform:translateY(-2px);box-shadow:0 0 20px oklch(0.82 0.20 195/.3)}
.es-thumb{aspect-ratio:16/9;background:var(--card2);position:relative;overflow:hidden}
.es-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.es-thumb .ph{display:flex;align-items:center;justify-content:center;height:100%;font-family:var(--font-d);font-size:60px;color:oklch(0.55 0.06 190/.5)}
.es-vw{position:absolute;top:6px;right:6px;font-family:var(--font-m);font-size:10px;font-weight:600;padding:2px 6px;background:oklch(0.10 0.04 190/.85);color:var(--signal);border:1px solid oklch(0.82 0.20 195/.4)}
.es-live{position:absolute;top:6px;left:6px;font-family:var(--font-m);font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:2px;padding:2px 6px;background:var(--signal);color:var(--bg);display:inline-flex;align-items:center;gap:4px}
.es-live .dot{width:5px;height:5px;border-radius:50%;background:var(--bg);animation:lpulse 2s infinite}
.es-body{padding:10px 12px}
.es-name{font-family:var(--font-d);font-size:18px;letter-spacing:1px;color:var(--fg);margin-bottom:2px}
.es-meta{font-family:var(--font-m);font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--ink-faint)}
.es-add{display:block;width:100%;padding:8px;background:oklch(0.82 0.20 195/.12);border:none;border-top:1px solid oklch(0.82 0.20 195/.4);color:var(--signal);font-family:var(--font-m);font-size:11px;text-transform:uppercase;letter-spacing:2px;font-weight:600;cursor:pointer;transition:background .15s}
.es-add:hover{background:oklch(0.82 0.20 195/.25)}

/* ENDED SCENES */
.ended{margin-bottom:24px}
.ended .ended-label{font-family:var(--font-m);font-size:10px;text-transform:uppercase;letter-spacing:3px;color:var(--ink-dim);margin-bottom:8px}
.ended-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px}
.ended-card{flex-shrink:0;min-width:200px;border:1px solid var(--border);background:oklch(0.14 0.05 190/.6);padding:10px 14px}
.ended-card .ec-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px}
.ended-card .ec-label{font-family:var(--font-d);font-size:14px;color:var(--fg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ended-card .ec-ago{font-family:var(--font-m);font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--ink-faint);flex-shrink:0}
.ended-card .ec-names{font-family:var(--font-m);font-size:10px;color:var(--ink-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ROSTER */
.roster-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;margin-top:32px}
.roster-header h2{font-family:var(--font-d);font-size:32px;color:var(--fg)}
.roster-header a{font-family:var(--font-m);font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--ink-dim);text-decoration:none;transition:color .2s}
.roster-header a:hover{color:var(--signal)}

.roster-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
@media(min-width:1200px){.roster-grid{grid-template-columns:repeat(6,1fr)}}

.rc{position:relative;border:1px solid var(--border);background:var(--card);padding:10px;text-align:left;cursor:pointer;transition:all .2s;clip-path:var(--cut)}
.rc:hover{border-color:var(--signal);box-shadow:0 0 12px oklch(0.82 0.20 195/.35);transform:translateY(-2px)}
.rc.selected{border-color:var(--signal);background:oklch(0.82 0.20 195/.15);box-shadow:0 0 12px oklch(0.82 0.20 195/.45),inset 0 0 18px oklch(0.82 0.20 195/.12)}
.rc.disabled{opacity:.4;cursor:not-allowed;transform:none !important;box-shadow:none !important}
.rc-status{display:flex;align-items:center;gap:4px;min-height:14px;margin-bottom:6px}
.rc-live{font-family:var(--font-m);font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--signal);display:inline-flex;align-items:center;gap:4px}
.rc-live .dot{width:5px;height:5px;background:var(--signal);border-radius:50%;animation:lpulse 2s infinite}
.rc-onstage{font-family:var(--font-m);font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--signal);margin-left:auto}
.rc-main{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.rc-av{width:28px;height:40px;border-radius:50%;object-fit:cover;background:var(--card2);flex-shrink:0}
.rc-ini{width:28px;height:40px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:14px;color:var(--ink-faint);flex-shrink:0}
.rc-name{font-family:var(--font-d);font-size:18px;color:var(--fg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1}
.rc-plat{font-family:var(--font-m);font-size:9px;text-transform:uppercase;letter-spacing:2px;margin-top:2px}
.rc-plat.twitch{color:var(--twitch)}
.rc-plat.kick{color:var(--kick)}

::selection{background:var(--signal);color:var(--bg)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--signal-dim);border:2px solid var(--bg);box-shadow:0 0 8px var(--signal)}
::-webkit-scrollbar-thumb:hover{background:var(--signal)}

@media(max-width:600px){
  .roster-grid{grid-template-columns:repeat(2,1fr)}
  .header-right{font-size:10px}
  .nav-links{overflow-x:auto;-webkit-overflow-scrolling:touch}
}
</style>
</head>
<body>
<nav class="nav">
  <a href="/gta-rp/" class="nav-brand"><img src="/logo.png" alt="ContentLore" style="height:40px;filter:brightness(1.1)" loading="eager"></a>
  <div class="nav-links">
    <a href="/gta-rp/" class="nav-link nav-live">Live</a>
    <a href="/gta-rp/now/" class="nav-link">Now</a>
    <a href="/gta-rp/multi/" class="nav-link active">Multi-View</a>
    <a href="/gta-rp/clips/" class="nav-link">Clips</a>
    <a href="/gta-rp/timeline/" class="nav-link">Timeline</a>
    <a href="/gta-rp/analytics/" class="nav-link">Analytics</a>
    <a href="/gta-rp/streaks/" class="nav-link">Streaks</a>
    <a href="/gta-rp/servers/" class="nav-link">Servers</a>
  </div>
</nav>

<div class="wrap">
  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="kicker">Multi-View · live</div>
      <h1>Every angle. <span class="neon">One screen.</span></h1>
      <p class="sub">Pick up to 6 streams across Twitch + Kick. Chat lives in the right-side drawer — toggle with the 💬 button.</p>
    </div>
    <div class="header-right">
      <span class="count" id="sel-count">0/6 selected</span>
      <button class="clear" id="clear-btn" onclick="clearAll()" style="display:none">Clear</button>
      <label class="af-toggle" id="af-toggle" title="Auto-unmute the most active POV">
        <input type="checkbox" onchange="toggleAudioFollow(this.checked)">
        <span id="af-icon">🔇</span>
        <span>Audio follow</span>
      </label>
      <button class="watch-btn" onclick="watchLiveScene()">🔥 Watch Live Scene</button>
      <button class="drawer-toggle" id="drawer-toggle" onclick="toggleDrawer()" title="Toggle chat drawer">
        <span class="ic">💬</span><span>Chat</span>
      </button>
    </div>
  </div>

  <!-- LAYOUT PRESETS -->
  <div class="layout-bar">
    <span class="lb-label">Layout</span>
    <button class="layout-btn" data-layout="focus" onclick="setLayout('focus')" title="Focus — single stream"><span class="ico" style="grid-template-columns:1fr;grid-template-rows:1fr"><span class="c"></span></span>Focus</button>
    <button class="layout-btn" data-layout="duo" onclick="setLayout('duo')" title="Duo — two streams side by side"><span class="ico" style="grid-template-columns:1fr 1fr;grid-template-rows:1fr"><span class="c"></span><span class="c"></span></span>Duo</button>
    <button class="layout-btn" data-layout="quad" onclick="setLayout('quad')" title="Quad — 2×2"><span class="ico" style="grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr"><span class="c"></span><span class="c"></span><span class="c"></span><span class="c"></span></span>Quad</button>
    <button class="layout-btn active" data-layout="six" onclick="setLayout('six')" title="Six — 3×2 (max)"><span class="ico" style="grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr"><span class="c"></span><span class="c"></span><span class="c"></span><span class="c"></span><span class="c"></span><span class="c"></span></span>Six</button>
  </div>

  <!-- STAGE -->
  <div id="stage-area"></div>

  <!-- ENDED SCENES -->
  <div id="ended-area"></div>

  <!-- ROSTER -->
  <div class="roster-header">
    <h2>The Roster</h2>
    <a href="/gta-rp/">← Home</a>
  </div>
  <div class="roster-grid" id="roster-grid"></div>
</div>

<!-- CHAT DRAWER (lives outside .wrap so it's never replaced by stage re-renders) -->
<aside class="chat-drawer" id="chat-drawer" aria-label="Chat drawer">
  <div class="cd-head">
    <div class="cd-tabs" id="cd-tabs"></div>
    <button class="cd-close" onclick="toggleDrawer()" title="Close chat">✕</button>
  </div>
  <div class="cd-body">
    <iframe id="cd-frame" title="Live chat" hidden></iframe>
    <div class="cd-empty" id="cd-empty">Pick a stream to load chat</div>
  </div>
</aside>

<script>
const MAX = 6;
const PARENT = location.hostname;

const LAYOUTS = {
  focus: { cap: 1, label: 'Focus' },
  duo:   { cap: 2, label: 'Duo' },
  quad:  { cap: 4, label: 'Quad' },
  six:   { cap: 6, label: 'Six' },
};
const STORAGE_KEY        = 'cl:multi:selected:v1';
const LAYOUT_STORAGE_KEY = 'cl:multi:layout:v1';
const DRAWER_OPEN_KEY    = 'cl:multi:drawer-open:v1';
const DRAWER_CHAT_KEY    = 'cl:multi:drawer-chat:v1';

let streams = [];
let selected = [];
let layoutMode = 'six';
let autoMode = true;
let audioFollow = false;
let unmutedKey = null;
let endedScenes = [];
let lastLabel = null;
let lastPicks = [];
let initialized = false;

let drawerOpen  = null;   // resolved on first render against localStorage
let activeChatKey = null; // skey of the stream whose chat is currently loaded
let loadedChatKey = null; // skey of the iframe's currently-loaded src (avoid reload churn)

function skey(s) { return s.platform + ':' + (s.handle || s.display_name.toLowerCase()); }
function layoutCap() { return LAYOUTS[layoutMode]?.cap ?? MAX; }

// === PERSISTENCE ===
function saveSelection() {
  try {
    if (selected.length === 0) localStorage.removeItem(STORAGE_KEY);
    else localStorage.setItem(STORAGE_KEY, JSON.stringify(selected));
  } catch { /* private mode */ }
}
function loadSavedSelection() {
  try { const raw = localStorage.getItem(STORAGE_KEY); return raw ? JSON.parse(raw) : null; }
  catch { return null; }
}
function saveLayout() {
  try { localStorage.setItem(LAYOUT_STORAGE_KEY, layoutMode); } catch { /* ignore */ }
}
function loadSavedLayout() {
  try { const v = localStorage.getItem(LAYOUT_STORAGE_KEY); return LAYOUTS[v] ? v : null; }
  catch { return null; }
}
function saveDrawerState() {
  try {
    localStorage.setItem(DRAWER_OPEN_KEY, drawerOpen ? '1' : '0');
    if (activeChatKey) localStorage.setItem(DRAWER_CHAT_KEY, activeChatKey);
  } catch { /* ignore */ }
}
function loadDrawerOpen() {
  try {
    const v = localStorage.getItem(DRAWER_OPEN_KEY);
    if (v === '1') return true;
    if (v === '0') return false;
  } catch { /* ignore */ }
  return null; // unset → default determined per-viewport
}
function loadDrawerChatKey() {
  try { return localStorage.getItem(DRAWER_CHAT_KEY) || null; }
  catch { return null; }
}

// === URL PARAMS ===
function parseAddParams() {
  const params = new URLSearchParams(location.search);
  const all = params.getAll('add').flatMap(v => v.split(',')).map(v => v.trim().toLowerCase()).filter(Boolean);
  return [...new Set(all)];
}
function handlesToKeys(handles) {
  const keys = [];
  for (const h of handles) {
    const s = streams.find(s => (s.handle || '').toLowerCase() === h);
    if (s) keys.push(skey(s));
  }
  return keys;
}

function fmtBig(n) {
  if (n == null) return '—';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'k';
  return String(n);
}
function ago(at) {
  const s = Math.max(1, Math.floor((Date.now() - at) / 1000));
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  return Math.floor(s/3600) + 'h ago';
}
function fmtUptime(mins) {
  if (!mins) return '';
  const h = Math.floor(mins/60), m = mins%60;
  return h > 0 ? h+'h '+m+'m' : m+'m';
}
function avatarHtml(name, url, size, cls) {
  if (url) {
    return `<img src="${url}" alt="" loading="lazy" class="${cls}" style="width:${size}px;height:${size}px" onerror="this.outerHTML='<div class=\\'${cls.replace('rc-av','rc-ini')}\\' style=\\'width:${size}px;height:${size}px\\'>${(name||'?').charAt(0).toUpperCase()}</div>'">`;
  }
  return `<div class="${cls.replace('rc-av','rc-ini')}" style="width:${size}px;height:${size}px">${(name||'?').charAt(0).toUpperCase()}</div>`;
}

// === DATA ===
async function loadData() {
  try {
    const r = await fetch('/api/uk-rp-live');
    const d = await r.json();
    streams = (d.ok && d.live) ? d.live : [];

    if (!initialized) {
      initialized = true;
      const savedLayout = loadSavedLayout();
      if (savedLayout) {
        layoutMode = savedLayout;
        document.querySelectorAll('.layout-btn').forEach(b => b.classList.toggle('active', b.dataset.layout === layoutMode));
      }
      const urlHandles = parseAddParams();
      if (urlHandles.length > 0) {
        selected = handlesToKeys(urlHandles).slice(0, layoutCap());
        autoMode = false;
        saveSelection();
      } else {
        const saved = loadSavedSelection();
        if (saved && saved.length > 0) {
          selected = saved.filter(k => streams.some(s => skey(s) === k)).slice(0, layoutCap());
          autoMode = false;
        }
      }

      // Drawer state: default OPEN, except mobile gets default CLOSED so the
      // stream grid is visible on first load. Saved preference always wins.
      const stored = loadDrawerOpen();
      drawerOpen = stored !== null
        ? stored
        : window.matchMedia('(max-width: 900px)').matches ? false : true;
      activeChatKey = loadDrawerChatKey();
      applyDrawerState();
    }

    if (autoMode) autoSelect();
    renderAll();
  } catch(e) {
    console.error('Load failed:', e);
  }
}

function autoSelect() {
  const live = streams.filter(s => s.is_live).sort((a,b) => (b.viewers||0)-(a.viewers||0));
  if (live.length === 0) return;
  const picks = live.slice(0, layoutCap());
  const keys = picks.map(skey);
  const label = 'Top viewers';

  if (lastLabel && lastLabel !== label && lastPicks.length) {
    const names = lastPicks.map(k => streams.find(s => skey(s)===k)?.display_name).filter(Boolean);
    endedScenes = [{id: lastLabel+'-'+Date.now(), label: lastLabel, endedAt: Date.now(), participants: names}, ...endedScenes].slice(0,6);
  }
  lastLabel = label;
  lastPicks = keys;
  selected = keys;
  saveSelection();
}

function watchLiveScene() {
  autoMode = true;
  autoSelect();
  renderAll();
}

function toggle(stream) {
  autoMode = false;
  lastLabel = null;
  lastPicks = [];
  const key = skey(stream);
  const cap = layoutCap();
  if (selected.includes(key)) {
    selected = selected.filter(k => k !== key);
  } else {
    if (selected.length >= cap) return;
    selected.push(key);
  }
  saveSelection();
  renderAll();
}

function clearAll() {
  autoMode = false;
  selected = [];
  unmutedKey = null;
  lastLabel = null;
  lastPicks = [];
  saveSelection();
  renderAll();
}

function addStreamByKey(key) {
  const s = streams.find(x => skey(x) === key);
  if (!s) return;
  if (selected.includes(key)) return;
  if (selected.length >= layoutCap()) return;
  autoMode = false;
  lastLabel = null;
  lastPicks = [];
  selected.push(key);
  saveSelection();
  renderAll();
}

function setLayout(mode) {
  if (!LAYOUTS[mode] || mode === layoutMode) return;
  layoutMode = mode;
  const cap = layoutCap();
  if (selected.length > cap) {
    const ranked = selected
      .map(k => ({ k, viewers: streams.find(s => skey(s) === k)?.viewers || 0 }))
      .sort((a, b) => b.viewers - a.viewers)
      .slice(0, cap)
      .map(x => x.k);
    selected = ranked;
    saveSelection();
  }
  document.querySelectorAll('.layout-btn').forEach(b => b.classList.toggle('active', b.dataset.layout === mode));
  saveLayout();
  renderAll();
}

function toggleAudioFollow(on) {
  audioFollow = on;
  if (on) unmutedKey = null;
  document.getElementById('af-icon').textContent = on ? '🔊' : '🔇';
  document.getElementById('af-toggle').classList.toggle('on', on);
  renderStage();
}

function unmuteTile(key) {
  audioFollow = false;
  unmutedKey = key;
  document.getElementById('af-toggle').classList.remove('on');
  document.querySelector('#af-toggle input').checked = false;
  document.getElementById('af-icon').textContent = '🔇';
  renderStage();
}

function removeTile(stream) { toggle(stream); }

// === DRAWER ===
function applyDrawerState() {
  document.body.classList.toggle('drawer-open', !!drawerOpen);
  document.getElementById('chat-drawer').classList.toggle('open', !!drawerOpen);
}

function toggleDrawer() {
  drawerOpen = !drawerOpen;
  applyDrawerState();
  saveDrawerState();
  // If we just opened the drawer, make sure something is loaded.
  if (drawerOpen) renderDrawer();
}

function openDrawerToChat(key) {
  activeChatKey = key;
  if (!drawerOpen) {
    drawerOpen = true;
    applyDrawerState();
  }
  saveDrawerState();
  renderDrawer();
}

function setActiveChat(key) {
  activeChatKey = key;
  saveDrawerState();
  renderDrawer();
}

function chatSrcFor(stream) {
  const plat = (stream.platform || 'twitch').toLowerCase();
  if (plat === 'twitch') {
    return `https://www.twitch.tv/embed/${encodeURIComponent(stream.handle)}/chat?parent=${PARENT}&parent=www.${PARENT}&parent=contentlore.com&parent=www.contentlore.com&darkpopout`;
  }
  return `https://kick.com/${encodeURIComponent(stream.handle)}/chatroom`;
}

// Render the drawer's tabs + iframe. Critically: only swap iframe.src when
// the active stream actually changes — otherwise chat reloads on every poll.
function renderDrawer() {
  const live = selected.map(k => streams.find(s => skey(s)===k)).filter(s => s && s.is_live);
  const tabs = document.getElementById('cd-tabs');
  const frame = document.getElementById('cd-frame');
  const empty = document.getElementById('cd-empty');

  if (live.length === 0) {
    tabs.innerHTML = '';
    frame.hidden = true;
    frame.removeAttribute('src');
    loadedChatKey = null;
    empty.textContent = selected.length === 0 ? 'Pick a stream to load chat' : 'Selected streams are offline';
    empty.classList.remove('hidden');
    return;
  }

  // Pick a sensible active key if the current one is gone (or never set).
  if (!activeChatKey || !live.some(s => skey(s) === activeChatKey)) {
    const top = [...live].sort((a, b) => (b.viewers || 0) - (a.viewers || 0))[0];
    activeChatKey = skey(top);
    saveDrawerState();
  }

  // Render tabs.
  tabs.innerHTML = live.map(s => {
    const k = skey(s);
    const plat = (s.platform || 'twitch').toLowerCase();
    const platCls = plat === 'twitch' ? 'tw' : 'ki';
    const isActive = k === activeChatKey;
    return `<button class="cd-tab${isActive ? ' active' : ''}" data-key="${k}" onclick="setActiveChat('${k}')" title="${s.display_name}'s chat">
      <span class="name">${s.display_name}</span>
      <span class="plat ${platCls}">·${plat}</span>
    </button>`;
  }).join('');

  // Only reload the iframe when the active key actually changed.
  if (activeChatKey !== loadedChatKey) {
    const active = live.find(s => skey(s) === activeChatKey);
    frame.src = chatSrcFor(active);
    loadedChatKey = activeChatKey;
  }
  frame.hidden = false;
  empty.classList.add('hidden');
}

// === RENDER ===
function renderAll() {
  document.getElementById('sel-count').textContent = selected.length + '/' + layoutCap() + ' selected';
  document.getElementById('clear-btn').style.display = selected.length > 0 ? '' : 'none';

  renderStage();
  renderDrawer();
  renderEnded();
  renderRoster();
}

function renderEmptyStage() {
  const area = document.getElementById('stage-area');
  const live = streams.filter(s => s.is_live).sort((a, b) => (b.viewers || 0) - (a.viewers || 0));

  if (live.length === 0) {
    area.innerHTML = `<div class="empty-stage no-live">
      <h3>Stage's empty</h3>
      <p>Nobody from the roster is live right now. Come back when the scene wakes up — usually around 6pm UK time.</p>
    </div>`;
    return;
  }

  const cards = live.map(s => {
    const k = skey(s);
    const plat = (s.platform || 'twitch').toLowerCase();
    const thumbResolved = s.thumbnail_url || '';
    const thumbHtml = thumbResolved
      ? `<img src="${thumbResolved}" alt="" loading="lazy">`
      : `<div class="ph">${(s.display_name || '?').charAt(0)}</div>`;
    return `<div class="es-card">
      <div class="es-thumb">
        ${thumbHtml}
        <span class="es-live"><span class="dot"></span>Live</span>
        ${s.viewers != null ? `<span class="es-vw">${fmtBig(s.viewers)} viewers</span>` : ''}
      </div>
      <div class="es-body">
        <div class="es-name">${s.display_name}</div>
        <div class="es-meta">${plat}${s.game_name ? ' · ' + s.game_name : ''}${s.uptime_mins ? ' · ' + fmtUptime(s.uptime_mins) : ''}</div>
      </div>
      <button class="es-add" onclick="addStreamByKey('${k}')">+ Add to stage</button>
    </div>`;
  }).join('');

  area.innerHTML = `<div class="empty-stage">
    <h3>Stage's empty</h3>
    <p>One-click add any of the ${live.length} creator${live.length === 1 ? '' : 's'} live right now, or pick from the full roster below. Layout: <strong style="color:var(--fg);text-transform:uppercase">${LAYOUTS[layoutMode].label}</strong> (max ${layoutCap()}).</p>
    <div class="es-grid">${cards}</div>
  </div>`;
}

function renderStage() {
  const area = document.getElementById('stage-area');
  const selStreams = selected.map(k => streams.find(s => skey(s)===k)).filter(s => s && s.is_live);

  if (selStreams.length === 0) {
    renderEmptyStage();
    return;
  }

  const topKey = skey([...selStreams].sort((a,b)=>(b.viewers||0)-(a.viewers||0))[0]);
  const audioKey = audioFollow ? topKey : unmutedKey;

  const stageHeader = `<div class="stage-header">
    <div><div class="sh-kicker">Live Scene</div><h2>Detected Activity</h2></div>
    <span class="mode-badge${autoMode?' auto':''}">${autoMode ? 'Auto · Top viewers' : 'Manual'}</span>
  </div>`;

  const gridClass = 'vid-grid layout-' + layoutMode;
  const tiles = selStreams.map(s => {
    const k = skey(s);
    const isTop = k === topKey;
    const muted = audioFollow ? k !== topKey : k !== unmutedKey;
    const isAudio = k === audioKey;
    const plat = (s.platform||'twitch').toLowerCase();
    const twitchParents = `parent=${PARENT}&parent=www.${PARENT}&parent=contentlore.com&parent=www.contentlore.com`;
    const videoSrc = plat === 'twitch'
      ? `https://player.twitch.tv/?channel=${encodeURIComponent(s.handle)}&${twitchParents}&muted=${muted}&autoplay=true`
      : `https://player.kick.com/${encodeURIComponent(s.handle)}?muted=${muted}&autoplay=true`;

    return `<div class="tile${isTop?' top-tile':''}">
      <div class="tile-video">
        <iframe src="${videoSrc}" key="${k}-${muted?'m':'u'}" allowfullscreen allow="autoplay;fullscreen;picture-in-picture"></iframe>
        <div class="tile-overlay">
          <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">
            <span class="tile-badge live-b"><span class="dot"></span>Live</span>
            <span class="tile-badge plat-b ${plat}">${plat}</span>
            ${isTop ? '<span class="tile-badge top-b">★ Most Active POV</span>' : ''}
            ${isAudio ? '<span class="tile-badge audio-b">🔊 Audio</span>' : ''}
          </div>
          <div style="display:flex;gap:4px">
            ${muted ? `<button class="tile-btn" onclick="unmuteTile('${k}')" title="Unmute">🔊</button>` : ''}
            <button class="tile-btn remove" onclick="removeTile(streams.find(s=>skey(s)==='${k}'))" title="Remove">✕</button>
          </div>
        </div>
      </div>
      <div class="tile-info">
        <a class="ti-name" href="/creator-profile/${s.handle}" title="View ${s.display_name}'s profile">${s.display_name}</a>
        ${s.game_name ? `<span class="ti-game">${s.game_name}</span>` : ''}
        ${s.viewers != null ? `<span class="ti-stat viewers">${fmtBig(s.viewers)} watching</span>` : ''}
        ${s.uptime_mins ? `<span class="ti-stat uptime">${fmtUptime(s.uptime_mins)}</span>` : ''}
        <button class="ti-chat" onclick="openDrawerToChat('${k}')" title="Open this chat in the drawer">💬 Chat</button>
      </div>
    </div>`;
  }).join('');

  area.innerHTML = stageHeader + `<div class="${gridClass}">${tiles}</div>`;
}

function renderEnded() {
  const area = document.getElementById('ended-area');
  if (!endedScenes.length) { area.innerHTML = ''; return; }
  area.innerHTML = `<div class="ended">
    <div class="ended-label">Recently ended scenes</div>
    <div class="ended-strip">${endedScenes.map(sc => `
      <div class="ended-card">
        <div class="ec-top">
          <span class="ec-label">${sc.label}</span>
          <span class="ec-ago">${ago(sc.endedAt)}</span>
        </div>
        ${sc.participants.length ? `<div class="ec-names">${sc.participants.join(', ')}</div>` : ''}
      </div>`).join('')}
    </div>
  </div>`;
}

function renderRoster() {
  const grid = document.getElementById('roster-grid');
  const cap = layoutCap();
  grid.innerHTML = streams.map(s => {
    const k = skey(s);
    const isSel = selected.includes(k);
    const disabled = !isSel && selected.length >= cap;
    const plat = (s.platform||'twitch').toLowerCase();

    return `<button class="rc${isSel?' selected':''}${disabled?' disabled':''}" onclick="${disabled?'':(`toggle(streams.find(s=>skey(s)==='${k}'))`)}">
      <div class="rc-status">
        ${s.is_live ? '<span class="rc-live"><span class="dot"></span>Live</span>' : ''}
        ${isSel ? '<span class="rc-onstage">✓ On stage</span>' : ''}
      </div>
      <div class="rc-main">
        ${avatarHtml(s.display_name, s.avatar_url, 28, 'rc-av')}
        <div class="rc-name">${s.display_name}</div>
      </div>
      <div class="rc-plat ${plat}">${plat}${s.is_live && s.viewers != null ? ' · '+fmtBig(s.viewers) : ''}</div>
    </button>`;
  }).join('');
}

// === INIT ===
loadData();
setInterval(loadData, 90000);
</script>
<script src="/streak-checkin.js" defer></script>
</body>
</html>
