<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContentLore — Multi-View | UK GTA RP</title>
<meta name="description" content="Watch multiple UK GTA RP streams simultaneously with scene detection and live roster.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0A0A0B;--bg2:#111113;--bg3:#161618;--bg4:#1C1C1F;
  --border:#2A2A2E;--border-a:#3A3A3F;
  --t1:#E8E8EC;--t2:#9898A0;--t3:#5A5A65;
  --mag:#FF2D6B;--mag-g:rgba(255,45,107,.3);--mag-dim:rgba(255,45,107,.12);
  --cyan:#00E5FF;--cyan-g:rgba(0,229,255,.25);--cyan-dim:rgba(0,229,255,.1);
  --green:#00FF85;--green-dim:rgba(0,255,133,.12);
  --orange:#FF8A00;--red:#FF3B3B;
  --font-d:'Oswald',sans-serif;--font-m:'JetBrains Mono',monospace;--font-b:system-ui,-apple-system,sans-serif;
  --clip:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));
  --clip-sm:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--t1);font-family:var(--font-b)}

/* NAV */
.nav{height:48px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:0;position:relative;z-index:100}
.nav-brand{font-family:var(--font-d);font-weight:700;font-size:18px;text-transform:uppercase;letter-spacing:3px;margin-right:24px;display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--t1)}
.nav-brand .cl{color:var(--mag)}
.nav-brand .gta{font-size:11px;color:var(--t3);letter-spacing:1px;background:var(--mag-dim);padding:2px 6px;clip-path:var(--clip-sm)}
.nav-links{display:flex;gap:0}
.nav-link{font-family:var(--font-d);font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);text-decoration:none;padding:14px 14px;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.nav-link:hover{color:var(--t2)}
.nav-link.active{color:var(--mag);border-bottom-color:var(--mag)}
.nav-link.coming{opacity:.35;pointer-events:none}
.nav-live{display:inline-flex;align-items:center;gap:4px}
.nav-live::before{content:'';width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.nav-share{background:none;border:1px solid var(--border);color:var(--t2);font-family:var(--font-m);font-size:11px;padding:6px 12px;cursor:pointer;clip-path:var(--clip-sm);transition:all .2s}
.nav-share:hover{border-color:var(--cyan);color:var(--cyan)}

/* LAYOUT */
.app{display:grid;grid-template-columns:1fr 320px;grid-template-rows:1fr;height:calc(100vh - 48px);overflow:hidden}
.main{display:flex;flex-direction:column;overflow:hidden}
.sidebar{background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
@media(max-width:1100px){.app{grid-template-columns:1fr}.sidebar{display:none}}

/* GRID CONTROLS */
.grid-controls{display:flex;align-items:center;padding:8px 12px;gap:8px;background:var(--bg);border-bottom:1px solid var(--border)}
.grid-controls label{font-family:var(--font-m);font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
.scene-btn{background:var(--bg3);border:1px solid var(--border);color:var(--t2);font-family:var(--font-m);font-size:11px;padding:4px 10px;cursor:pointer;clip-path:var(--clip-sm);transition:all .15s}
.scene-btn:hover{border-color:var(--mag);color:var(--mag)}
.scene-btn.active{background:var(--mag-dim);border-color:var(--mag);color:var(--mag)}
.grid-controls .hint{margin-left:auto;font-family:var(--font-m);font-size:10px;color:var(--t3)}

/* STREAM GRID */
.stream-grid{flex:1;display:grid;gap:2px;padding:2px;overflow:hidden;background:var(--bg)}
.stream-grid.g6{grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr}
.stream-grid.g4{grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr}
.stream-grid.g2{grid-template-columns:1fr 1fr;grid-template-rows:1fr}
.stream-grid.featured .tile.is-featured{grid-column:span 2;grid-row:span 2}
.stream-grid.featured{grid-template-columns:2fr 1fr;grid-template-rows:1fr 1fr 1fr}

.tile{position:relative;background:var(--bg3);border:1px solid var(--border);overflow:hidden;min-height:0;display:flex;flex-direction:column;transition:border-color .2s}
.tile:hover{border-color:var(--border-a)}
.tile.is-featured{border-color:var(--mag);box-shadow:0 0 30px var(--mag-g)}
.tile.is-featured .tile-label{background:var(--mag)}
.tile-header{display:flex;align-items:center;justify-content:between;padding:4px 8px;background:rgba(0,0,0,.6);position:absolute;top:0;left:0;right:0;z-index:5;gap:6px}
.tile-label{font-family:var(--font-d);font-size:11px;text-transform:uppercase;letter-spacing:1px;background:var(--bg3);padding:2px 8px;clip-path:var(--clip-sm)}
.tile-platform{font-family:var(--font-m);font-size:9px;color:var(--t3)}
.tile-viewers{font-family:var(--font-m);font-size:10px;color:var(--green);margin-left:auto}
.tile-close{background:none;border:none;color:var(--t3);cursor:pointer;font-size:14px;padding:0 4px;margin-left:4px}
.tile-close:hover{color:var(--red)}
.tile iframe{flex:1;width:100%;height:100%;border:none}
.tile-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer}
.tile-empty:hover{background:var(--bg4)}
.tile-empty .plus{font-size:28px;color:var(--t3)}
.tile-empty span{font-family:var(--font-m);font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px}

/* ADD STREAM MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;display:none;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--bg2);border:1px solid var(--border);clip-path:var(--clip);padding:24px;width:400px;max-width:90vw}
.modal h3{font-family:var(--font-d);font-size:16px;text-transform:uppercase;letter-spacing:2px;margin-bottom:16px}
.modal input,.modal select{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--t1);padding:10px 12px;font-family:var(--font-m);font-size:13px;margin-bottom:12px;outline:none}
.modal input:focus{border-color:var(--cyan)}
.modal .modal-btns{display:flex;gap:8px}
.modal .btn{font-family:var(--font-d);font-size:13px;text-transform:uppercase;letter-spacing:1.5px;padding:10px 20px;border:none;cursor:pointer;clip-path:var(--clip-sm)}
.btn-mag{background:var(--mag);color:#fff}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--t2)}

/* SIDEBAR */
.side-tabs{display:flex;border-bottom:1px solid var(--border)}
.side-tab{flex:1;padding:10px;font-family:var(--font-d);font-size:11px;text-transform:uppercase;letter-spacing:1.5px;text-align:center;color:var(--t3);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent;transition:all .2s}
.side-tab:hover{color:var(--t2)}
.side-tab.active{color:var(--cyan);border-bottom-color:var(--cyan)}
.side-panel{flex:1;overflow-y:auto;display:none;padding:12px}
.side-panel.active{display:block}
.side-panel::-webkit-scrollbar{width:4px}
.side-panel::-webkit-scrollbar-thumb{background:var(--border)}

/* SCENES */
.scene-card{background:var(--bg3);border:1px solid var(--border);clip-path:var(--clip-sm);padding:12px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.scene-card:hover{border-color:var(--mag);background:var(--bg4)}
.scene-card .scene-server{font-family:var(--font-m);font-size:10px;color:var(--mag);text-transform:uppercase;letter-spacing:1px}
.scene-card .scene-streamers{font-family:var(--font-d);font-size:14px;margin-top:4px}
.scene-card .scene-viewers{font-family:var(--font-m);font-size:11px;color:var(--green);margin-top:4px}

/* ROSTER */
.roster-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.roster-item:hover{background:var(--bg3)}
.roster-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.roster-dot.live{background:var(--green);box-shadow:0 0 6px var(--green)}
.roster-name{font-family:var(--font-d);font-size:13px;text-transform:uppercase}
.roster-meta{font-family:var(--font-m);font-size:10px;color:var(--t3)}
.roster-viewers{font-family:var(--font-m);font-size:11px;color:var(--green);margin-left:auto}

/* CHAT */
.chat-frame{flex:1;width:100%;border:none}

/* NOISE TEXTURE */
.noise::before{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.5}
</style>
</head>
<body class="noise">
<nav class="nav">
  <a href="/gta-rp/" class="nav-brand"><span class="cl">Content</span>Lore<span class="gta">GTA RP</span></a>
  <div class="nav-links">
    <a href="/gta-rp/" class="nav-link nav-live">Live</a>
    <a href="/gta-rp/now/" class="nav-link">Now</a>
    <a href="/gta-rp/multi/" class="nav-link active">Multi-View</a>
    <a href="/gta-rp/lore/" class="nav-link">Lore</a>
    <a href="/gta-rp/beef/" class="nav-link">Beef</a>
    <a href="/gta-rp/servers/" class="nav-link">Servers</a>
  </div>
  <div class="nav-right">
    <button class="nav-share" onclick="shareScene()" title="Copy shareable link">⛓ Share Scene</button>
  </div>
</nav>

<div class="app">
  <div class="main">
    <div class="grid-controls">
      <label>Layout:</label>
      <button class="scene-btn active" data-layout="6" onclick="setLayout(6)">3×2</button>
      <button class="scene-btn" data-layout="4" onclick="setLayout(4)">2×2</button>
      <button class="scene-btn" data-layout="2" onclick="setLayout(2)">1×2</button>
      <div style="width:1px;height:20px;background:var(--border);margin:0 8px"></div>
      <label>Scenes:</label>
      <div id="scene-tags"></div>
      <span class="hint">double-click tile to feature</span>
    </div>
    <div class="stream-grid g6" id="stream-grid"></div>
  </div>
  <div class="sidebar">
    <div class="side-tabs">
      <button class="side-tab active" data-panel="scenes-panel">Scenes</button>
      <button class="side-tab" data-panel="roster-panel">Roster</button>
      <button class="side-tab" data-panel="chat-panel">Chat</button>
    </div>
    <div class="side-panel active" id="scenes-panel"></div>
    <div class="side-panel" id="roster-panel"></div>
    <div class="side-panel" id="chat-panel">
      <div style="text-align:center;padding:40px 12px;font-family:var(--font-m);font-size:11px;color:var(--t3)">Click a stream tile to load its chat here</div>
    </div>
  </div>
</div>

<!-- ADD STREAM MODAL -->
<div class="modal-overlay" id="add-modal">
  <div class="modal">
    <h3>Add Stream</h3>
    <select id="add-platform">
      <option value="twitch">Twitch</option>
      <option value="kick">Kick</option>
    </select>
    <input type="text" id="add-channel" placeholder="Channel name (e.g. zerkaa)">
    <div class="modal-btns">
      <button class="btn btn-mag" onclick="confirmAdd()">Add</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
const MAX_TILES = 6;
let currentLayout = 6;
let featuredIndex = -1;
let addTargetIndex = -1;
let streams = []; // {channel, platform, viewers}
let scenes = [];
let roster = [];

// === INIT ===
function init() {
  loadFromHash();
  if (!streams.length) streams = new Array(MAX_TILES).fill(null);
  while (streams.length < MAX_TILES) streams.push(null);
  renderGrid();
  loadScenes();
  loadRoster();
  setInterval(loadScenes, 30000);
  setInterval(loadRoster, 60000);
}

// === URL HASH for shareable links ===
function loadFromHash() {
  const hash = location.hash.slice(1);
  if (!hash) return;
  const params = new URLSearchParams(hash);
  const s = params.get('streams');
  if (s) {
    streams = s.split(',').map(entry => {
      const [platform, channel] = entry.includes(':') ? entry.split(':') : ['twitch', entry];
      return channel ? {channel, platform, viewers: null} : null;
    });
    const layout = params.get('layout');
    if (layout) currentLayout = parseInt(layout);
    const feat = params.get('featured');
    if (feat !== null) featuredIndex = parseInt(feat);
  }
}

function updateHash() {
  const s = streams.map(s => s ? `${s.platform}:${s.channel}` : '').join(',');
  const params = new URLSearchParams();
  params.set('streams', s);
  params.set('layout', currentLayout);
  if (featuredIndex >= 0) params.set('featured', featuredIndex);
  history.replaceState(null, '', '#' + params.toString());
}

function shareScene() {
  updateHash();
  const url = location.href;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.querySelector('.nav-share');
    btn.textContent = '✓ Copied!';
    setTimeout(() => btn.textContent = '⛓ Share Scene', 2000);
  });
}

// === LAYOUT ===
function setLayout(n) {
  currentLayout = n;
  featuredIndex = -1;
  document.querySelectorAll('.grid-controls .scene-btn[data-layout]').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.layout) === n);
  });
  renderGrid();
  updateHash();
}

// === GRID RENDERING ===
function renderGrid() {
  const grid = document.getElementById('stream-grid');
  grid.className = 'stream-grid';
  if (featuredIndex >= 0) {
    grid.classList.add('featured');
  } else {
    grid.classList.add(`g${currentLayout}`);
  }
  grid.innerHTML = '';
  const count = featuredIndex >= 0 ? MAX_TILES : currentLayout;
  for (let i = 0; i < count; i++) {
    const s = streams[i];
    const tile = document.createElement('div');
    tile.className = 'tile';
    if (i === featuredIndex) tile.classList.add('is-featured');
    tile.dataset.index = i;
    if (s) {
      const embedUrl = s.platform === 'kick'
        ? `https://player.kick.com/${s.channel}`
        : `https://player.twitch.tv/?channel=${s.channel}&parent=${location.hostname}&muted=true`;
      tile.innerHTML = `
        <div class="tile-header">
          <span class="tile-label">${s.channel}</span>
          <span class="tile-platform">${s.platform}</span>
          ${s.viewers != null ? `<span class="tile-viewers">${fmtN(s.viewers)}</span>` : ''}
          <button class="tile-close" onclick="removeStream(${i})" title="Remove">✕</button>
        </div>
        <iframe src="${embedUrl}" allowfullscreen></iframe>`;
      tile.addEventListener('dblclick', () => toggleFeatured(i));
      tile.addEventListener('click', () => loadChat(s));
    } else {
      tile.innerHTML = `<div class="tile-empty" onclick="openAdd(${i})"><div class="plus">+</div><span>Add Stream</span></div>`;
    }
    grid.appendChild(tile);
  }
}

function toggleFeatured(index) {
  if (featuredIndex === index) {
    featuredIndex = -1;
  } else {
    featuredIndex = index;
  }
  renderGrid();
  updateHash();
}

// === ADD / REMOVE ===
function openAdd(index) {
  addTargetIndex = index;
  document.getElementById('add-channel').value = '';
  document.getElementById('add-modal').classList.add('open');
  document.getElementById('add-channel').focus();
}
function closeModal() { document.getElementById('add-modal').classList.remove('open'); }
function confirmAdd() {
  const channel = document.getElementById('add-channel').value.trim().toLowerCase();
  const platform = document.getElementById('add-platform').value;
  if (!channel) return;
  streams[addTargetIndex] = {channel, platform, viewers: null};
  closeModal();
  renderGrid();
  updateHash();
}
function removeStream(i) {
  streams[i] = null;
  if (featuredIndex === i) featuredIndex = -1;
  renderGrid();
  updateHash();
}

// === CHAT ===
function loadChat(stream) {
  const panel = document.getElementById('chat-panel');
  if (stream.platform === 'twitch') {
    panel.innerHTML = `<iframe class="chat-frame" src="https://www.twitch.tv/embed/${stream.channel}/chat?parent=${location.hostname}&darkpopout"></iframe>`;
  } else {
    panel.innerHTML = `<div style="text-align:center;padding:40px 12px;font-family:var(--font-m);font-size:11px;color:var(--t3)">Kick chat embeds not yet supported.<br>Open chat at kick.com/${stream.channel}</div>`;
  }
  // Switch to chat tab
  document.querySelectorAll('.side-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.side-panel').forEach(p => p.classList.remove('active'));
  document.querySelector('[data-panel="chat-panel"]').classList.add('active');
  panel.classList.add('active');
}

// === SCENES ===
async function loadScenes() {
  try {
    const r = await fetch('/api/scenes');
    const data = await r.json();
    scenes = data.scenes || data || [];
    renderScenes();
    renderSceneTags();
  } catch(e) { console.warn('Scenes load failed:', e); }
}

function renderScenes() {
  const panel = document.getElementById('scenes-panel');
  if (!scenes.length) {
    panel.innerHTML = '<div style="text-align:center;padding:40px;font-family:var(--font-m);font-size:11px;color:var(--t3)">No active scenes detected</div>';
    return;
  }
  panel.innerHTML = scenes.map(sc => {
    const names = (sc.streamers || sc.creators || []).map(s => typeof s === 'string' ? s : s.name).join(', ');
    const viewers = sc.total_viewers || sc.viewers || 0;
    return `<div class="scene-card" onclick="loadScene(${JSON.stringify(sc).replace(/"/g,'&quot;')})">
      <div class="scene-server">${sc.server || 'Unknown Server'}</div>
      <div class="scene-streamers">${names || 'Unknown'}</div>
      <div class="scene-viewers">${fmtN(viewers)} viewers</div>
    </div>`;
  }).join('');
}

function renderSceneTags() {
  const servers = [...new Set(scenes.map(s => s.server).filter(Boolean))];
  document.getElementById('scene-tags').innerHTML = servers.map(s =>
    `<button class="scene-btn" onclick="filterScene('${s}')">${s}</button>`
  ).join('');
}

function loadScene(scene) {
  const creators = (scene.streamers || scene.creators || []);
  streams = creators.slice(0, MAX_TILES).map(c => {
    const name = typeof c === 'string' ? c : c.name;
    const platform = (typeof c === 'object' && c.platform) || 'twitch';
    return {channel: name.toLowerCase(), platform, viewers: c.viewers || null};
  });
  while (streams.length < MAX_TILES) streams.push(null);
  featuredIndex = -1;
  renderGrid();
  updateHash();
}

function filterScene(server) {
  const filtered = scenes.filter(s => s.server === server);
  if (filtered.length) loadScene(filtered[0]);
}

// === ROSTER ===
async function loadRoster() {
  try {
    const r = await fetch('/api/live-now');
    const data = await r.json();
    roster = data.live || data.creators || data || [];
    renderRoster();
  } catch(e) { console.warn('Roster load failed:', e); }
}

function renderRoster() {
  const panel = document.getElementById('roster-panel');
  if (!roster.length) {
    panel.innerHTML = '<div style="text-align:center;padding:40px;font-family:var(--font-m);font-size:11px;color:var(--t3)">No creators live right now</div>';
    return;
  }
  const sorted = [...roster].sort((a,b) => (b.viewers||0)-(a.viewers||0));
  panel.innerHTML = sorted.map(c => {
    const name = c.name || c.creator_name || c.channel || 'Unknown';
    const platform = c.platform || 'twitch';
    return `<div class="roster-item" onclick="addFromRoster('${name.toLowerCase()}','${platform}')">
      <div class="roster-dot live"></div>
      <div>
        <div class="roster-name">${name}</div>
        <div class="roster-meta">${platform}${c.server ? ' · ' + c.server : ''}</div>
      </div>
      <div class="roster-viewers">${c.viewers ? fmtN(c.viewers) : ''}</div>
    </div>`;
  }).join('');
}

function addFromRoster(channel, platform) {
  const emptyIdx = streams.findIndex(s => !s);
  if (emptyIdx === -1) {
    // Replace last tile
    streams[streams.length - 1] = {channel, platform, viewers: null};
  } else {
    streams[emptyIdx] = {channel, platform, viewers: null};
  }
  renderGrid();
  updateHash();
}

// === SIDEBAR TABS ===
document.querySelectorAll('.side-tab').forEach(t => {
  t.addEventListener('click', () => {
    document.querySelectorAll('.side-tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.side-panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById(t.dataset.panel).classList.add('active');
  });
});

// Enter key in modal
document.getElementById('add-channel').addEventListener('keydown', e => {
  if (e.key === 'Enter') confirmAdd();
});

// === UTIL ===
function fmtN(n) {
  if (n == null) return '';
  if (n >= 1000) return (n/1000).toFixed(1) + 'k';
  return n.toString();
}

// === GO ===
init();
</script>
</body>
</html>
