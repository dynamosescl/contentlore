<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-View — Watch every UK GTA RP POV at once · ContentLore</title>
<meta name="description" content="Pick up to 6 UK GTA RP streams and watch them side by side with switchable chat. Twitch + Kick.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:oklch(0.09 0.04 295);
  --fg:oklch(0.97 0.02 320);
  --card:oklch(0.13 0.05 295);
  --card2:oklch(0.18 0.06 295);
  --ink-dim:oklch(0.78 0.05 320);
  --ink-faint:oklch(0.55 0.06 295);
  --signal:oklch(0.72 0.30 350);
  --signal-dim:oklch(0.58 0.24 350);
  --signal-cyan:oklch(0.85 0.18 200);
  --border:oklch(0.28 0.08 295);
  --live:oklch(0.72 0.30 350);
  --twitch:oklch(0.65 0.25 295);
  --kick:oklch(0.82 0.22 145);
  --destructive:oklch(0.68 0.27 25);
  --font-d:'Bebas Neue',Impact,sans-serif;
  --font-m:'JetBrains Mono',monospace;
  --font-b:'Inter',system-ui,sans-serif;
  --cut:polygon(0 0,calc(100% - 14px) 0,100% 14px,100% 100%,0 100%);
}
html{background:var(--bg);color-scheme:dark}
body{background:var(--bg);color:var(--fg);font-family:var(--font-b);min-height:100vh;-webkit-font-smoothing:antialiased;position:relative}

/* Scanline overlay */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:1;background-image:repeating-linear-gradient(0deg,oklch(0.72 0.30 350/.04) 0 1px,transparent 1px 3px);mix-blend-mode:screen}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:2;background:oklch(0.85 0.18 200/.015);animation:crt 7s steps(1,end) infinite}
@keyframes crt{0%,92%,94%,96%,100%{opacity:0}93%{opacity:1}95%{opacity:.6}97%{opacity:.9}}
body>*{position:relative;z-index:3}

/* NAV */
.nav{height:48px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;position:sticky;top:0;z-index:100}
.nav-brand{font-family:var(--font-d);font-size:22px;letter-spacing:2px;margin-right:24px;text-decoration:none;color:var(--fg);display:flex;align-items:center;gap:6px}
.nav-brand .cl{color:var(--signal)}
.nav-brand .tag{font-family:var(--font-m);font-size:9px;color:var(--ink-faint);letter-spacing:1px;background:oklch(0.72 0.30 350/.1);padding:2px 6px}
.nav-links{display:flex;gap:0}
.nav-link{font-family:var(--font-m);font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--ink-faint);text-decoration:none;padding:14px 14px;border-bottom:2px solid transparent;transition:all .2s}
.nav-link:hover{color:var(--ink-dim)}
.nav-link.active{color:var(--signal);border-bottom-color:var(--signal)}
.nav-live::before{content:'';width:6px;height:6px;background:var(--signal);border-radius:50%;display:inline-block;margin-right:4px;animation:lpulse 2s infinite}
@keyframes lpulse{0%,100%{box-shadow:0 0 0 0 oklch(0.72 0.30 350/.8),0 0 12px oklch(0.72 0.30 350/.6)}70%{box-shadow:0 0 0 10px oklch(0.72 0.30 350/0),0 0 18px oklch(0.72 0.30 350/.3)}}

.wrap{max-width:1600px;margin:0 auto;padding:12px 16px 40px}

/* HEADER */
.header{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:12px;margin-bottom:20px}
.header-left .kicker{font-family:var(--font-m);font-size:11px;text-transform:uppercase;letter-spacing:3px;color:var(--signal);margin-bottom:6px;text-shadow:0 0 6px oklch(0.72 0.30 350/.7),0 0 18px oklch(0.72 0.30 350/.45)}
.header-left h1{font-family:var(--font-d);font-size:clamp(36px,6vw,64px);line-height:.95;color:var(--fg)}
.header-left h1 .neon{color:var(--signal);animation:flicker 4.5s steps(1,end) infinite}
@keyframes flicker{0%,19%,21%,23%,100%{opacity:1;text-shadow:0 0 6px oklch(0.72 0.30 350/.7),0 0 18px oklch(0.72 0.30 350/.45),0 0 38px oklch(0.72 0.30 350/.25)}20%,22%{opacity:.85;text-shadow:none}}
.header-left .sub{font-size:13px;color:var(--ink-dim);margin-top:6px}
.header-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-family:var(--font-m);font-size:11px;text-transform:uppercase;letter-spacing:2px}
.header-right .count{color:var(--ink-dim)}
.header-right .clear{color:var(--ink-dim);background:none;border:none;cursor:pointer;text-decoration:underline;font:inherit;text-transform:uppercase;letter-spacing:inherit}
.header-right .clear:hover{color:var(--signal)}
.af-toggle{display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border:1px solid var(--border);cursor:pointer;transition:all .2s;user-select:none}
.af-toggle.on{border-color:oklch(0.72 0.30 350/.6);color:var(--signal);background:oklch(0.72 0.30 350/.1)}
.af-toggle input{display:none}
.watch-btn{border:1px solid oklch(0.72 0.30 350/.6);color:var(--signal);background:none;padding:6px 12px;cursor:pointer;font:inherit;text-transform:uppercase;letter-spacing:inherit;transition:all .2s}
.watch-btn:hover{background:oklch(0.72 0.30 350/.15);box-shadow:0 0 14px oklch(0.72 0.30 350/.5)}

/* STAGE */
.stage-header{display:flex;align-items:flex-end;justify-content:space-between;padding-bottom:8px;border-bottom:1px solid var(--border);margin-bottom:12px}
.stage-header .sh-kicker{font-family:var(--font-m);font-size:11px;text-transform:uppercase;letter-spacing:3px;color:var(--signal);margin-bottom:4px}
.stage-header h2{font-family:var(--font-d);font-size:28px;color:var(--fg)}
.stage-header .mode-badge{font-family:var(--font-m);font-size:10px;text-transform:uppercase;letter-spacing:2px;padding:4px 8px;border:1px solid var(--border);color:var(--ink-dim)}
.stage-header .mode-badge.auto{border-color:oklch(0.72 0.30 350/.6);color:var(--signal);background:oklch(0.72 0.30 350/.1)}

.stage-wrap{display:grid;grid-template-columns:1fr 340px;gap:12px;margin-bottom:24px}
@media(max-width:1100px){.stage-wrap{grid-template-columns:1fr}}

/* VIDEO GRID */
.vid-grid{display:grid;gap:8px}
.vid-grid.g1{grid-template-columns:1fr}
.vid-grid.g2{grid-template-columns:1fr 1fr}
.vid-grid.g3{grid-template-columns:1fr 1fr 1fr}
.vid-grid.g4{grid-template-columns:1fr 1fr}
.vid-grid.g5,.vid-grid.g6{grid-template-columns:1fr 1fr 1fr}

.tile{position:relative;border:1px solid var(--border);background:#000;aspect-ratio:16/9;overflow:hidden;transition:all .2s}
.tile.top-tile{border-color:var(--signal);box-shadow:0 0 24px oklch(0.72 0.30 350/.55)}
.tile iframe{width:100%;height:100%;border:none}
.tile-overlay{position:absolute;top:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;padding:6px 8px;background:linear-gradient(180deg,rgba(0,0,0,.8),transparent);pointer-events:none;flex-wrap:wrap;gap:4px}
.tile-overlay>*{pointer-events:auto}
.tile-badge{font-family:var(--font-m);font-size:9px;text-transform:uppercase;letter-spacing:2px;padding:2px 6px;background:rgba(0,0,0,.6);display:inline-flex;align-items:center;gap:4px}
.tile-badge.live-b{color:var(--signal)}
.tile-badge.live-b .dot{width:5px;height:5px;background:var(--signal);border-radius:50%;animation:lpulse 2s infinite}
.tile-badge.name-b{color:var(--fg);font-family:var(--font-d);font-size:14px;letter-spacing:1px}
.tile-badge.plat-b.twitch{color:var(--twitch)}
.tile-badge.plat-b.kick{color:var(--kick)}
.tile-badge.top-b{color:var(--signal);border:1px solid oklch(0.72 0.30 350/.6);text-shadow:0 0 6px oklch(0.72 0.30 350/.7)}
.tile-badge.audio-b{color:var(--signal-cyan);border:1px solid oklch(0.85 0.18 200/.6)}
.tile-btn{font-family:var(--font-m);font-size:10px;text-transform:uppercase;color:var(--fg);background:rgba(0,0,0,.6);border:none;padding:4px 8px;cursor:pointer;transition:background .2s}
.tile-btn:hover{background:oklch(0.72 0.30 350/.3)}
.tile-btn.remove:hover{background:oklch(0.68 0.27 25/.8)}

/* CHAT PANEL */
.chat-panel{border:1px solid var(--border);background:var(--card);display:flex;flex-direction:column;min-height:480px}
.chat-tabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--border)}
.chat-tab{flex-shrink:0;padding:8px 12px;font-family:var(--font-m);font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--ink-dim);background:none;border:none;border-right:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .15s}
.chat-tab:hover{color:var(--fg);background:oklch(0.13 0.05 295/.6)}
.chat-tab.active{color:var(--signal);background:oklch(0.72 0.30 350/.15)}
.chat-tab .plat{font-size:8px}
.chat-tab .plat.tw{color:oklch(0.72 0.30 350/.5)}
.chat-tab .plat.ki{color:oklch(0.82 0.22 145/.5)}
.chat-tab.active .plat{color:oklch(0.72 0.30 350/.7)}
.chat-frame{flex:1;width:100%;border:none;background:#000}

/* EMPTY STAGE */
.empty-stage{border:1px dashed var(--border);background:oklch(0.13 0.05 295/.4);padding:48px;text-align:center;margin-bottom:24px}
.empty-stage h3{font-family:var(--font-d);font-size:clamp(28px,4vw,42px);color:var(--fg);margin-bottom:8px}
.empty-stage p{font-size:13px;color:var(--ink-dim);max-width:400px;margin:0 auto}

/* ENDED SCENES */
.ended{margin-bottom:24px}
.ended .ended-label{font-family:var(--font-m);font-size:10px;text-transform:uppercase;letter-spacing:3px;color:var(--ink-dim);margin-bottom:8px}
.ended-strip{display:flex;gap:8px;overflow-x:auto;padding-bottom:8px}
.ended-card{flex-shrink:0;min-width:200px;border:1px solid var(--border);background:oklch(0.13 0.05 295/.6);padding:10px 14px}
.ended-card .ec-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:4px}
.ended-card .ec-label{font-family:var(--font-d);font-size:14px;color:var(--fg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ended-card .ec-ago{font-family:var(--font-m);font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--ink-faint);flex-shrink:0}
.ended-card .ec-names{font-family:var(--font-m);font-size:10px;color:var(--ink-dim);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ROSTER */
.roster-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;margin-top:32px}
.roster-header h2{font-family:var(--font-d);font-size:32px;color:var(--fg)}
.roster-header a{font-family:var(--font-m);font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--ink-dim);text-decoration:none;transition:color .2s}
.roster-header a:hover{color:var(--signal)}

.roster-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
@media(min-width:1200px){.roster-grid{grid-template-columns:repeat(6,1fr)}}

.rc{position:relative;border:1px solid var(--border);background:var(--card);padding:10px;text-align:left;cursor:pointer;transition:all .2s;clip-path:var(--cut)}
.rc:hover{border-color:var(--signal);box-shadow:0 0 12px oklch(0.72 0.30 350/.35);transform:translateY(-2px)}
.rc.selected{border-color:var(--signal);background:oklch(0.72 0.30 350/.15);box-shadow:0 0 12px oklch(0.72 0.30 350/.45),inset 0 0 18px oklch(0.72 0.30 350/.12)}
.rc.disabled{opacity:.4;cursor:not-allowed;transform:none !important;box-shadow:none !important}
.rc-status{display:flex;align-items:center;gap:4px;min-height:14px;margin-bottom:6px}
.rc-live{font-family:var(--font-m);font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--signal);display:inline-flex;align-items:center;gap:4px}
.rc-live .dot{width:5px;height:5px;background:var(--signal);border-radius:50%;animation:lpulse 2s infinite}
.rc-onstage{font-family:var(--font-m);font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--signal);margin-left:auto}
.rc-main{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.rc-av{width:28px;height:28px;border-radius:50%;object-fit:cover;background:var(--card2);flex-shrink:0}
.rc-ini{width:28px;height:28px;border-radius:50%;background:var(--card2);display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:14px;color:var(--ink-faint);flex-shrink:0}
.rc-name{font-family:var(--font-d);font-size:18px;color:var(--fg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1}
.rc-plat{font-family:var(--font-m);font-size:9px;text-transform:uppercase;letter-spacing:2px;margin-top:2px}
.rc-plat.twitch{color:var(--twitch)}
.rc-plat.kick{color:var(--kick)}

::selection{background:var(--signal);color:var(--bg)}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--signal-dim);border:2px solid var(--bg);box-shadow:0 0 8px var(--signal)}
::-webkit-scrollbar-thumb:hover{background:var(--signal)}

@media(max-width:600px){
  .roster-grid{grid-template-columns:repeat(2,1fr)}
  .header-right{font-size:10px}
  .nav-links{overflow-x:auto;-webkit-overflow-scrolling:touch}
}
</style>
</head>
<body>
<nav class="nav">
  <a href="/gta-rp/" class="nav-brand"><span class="cl">ContentLore</span><span class="tag">UK</span></a>
  <div class="nav-links">
    <a href="/gta-rp/" class="nav-link nav-live">Live</a>
    <a href="/gta-rp/now/" class="nav-link">Now</a>
    <a href="/gta-rp/multi/" class="nav-link active">Multi-View</a>
    <a href="/gta-rp/lore/" class="nav-link">Lore</a>
    <a href="/gta-rp/beef/" class="nav-link">Beef</a>
    <a href="/gta-rp/servers/" class="nav-link">Servers</a>
  </div>
</nav>

<div class="wrap">
  <!-- HEADER -->
  <div class="header">
    <div class="header-left">
      <div class="kicker">Multi-View · live</div>
      <h1>Every angle. <span class="neon">One screen.</span></h1>
      <p class="sub">Pick up to 6 streams across Twitch + Kick. All start muted — click a tile to unmute.</p>
    </div>
    <div class="header-right">
      <span class="count" id="sel-count">0/4 selected</span>
      <button class="clear" id="clear-btn" onclick="clearAll()" style="display:none">Clear</button>
      <label class="af-toggle" id="af-toggle" title="Auto-unmute the most active POV">
        <input type="checkbox" onchange="toggleAudioFollow(this.checked)">
        <span id="af-icon">🔇</span>
        <span>Audio follow</span>
      </label>
      <button class="watch-btn" onclick="watchLiveScene()">🔥 Watch Live Scene</button>
    </div>
  </div>

  <!-- STAGE -->
  <div id="stage-area"></div>

  <!-- ENDED SCENES -->
  <div id="ended-area"></div>

  <!-- ROSTER -->
  <div class="roster-header">
    <h2>The Roster</h2>
    <a href="/gta-rp/">← Home</a>
  </div>
  <div class="roster-grid" id="roster-grid"></div>
</div>

<script>
/*
  API fields (confirmed from actual endpoints):
  /api/live-now → { ok, live: [{ display_name, avatar_url, platform, handle, viewers, uptime_mins, game_name, stream_title, profile_url }] }
  /api/creators → { ok, creators: [{ id, display_name, avatar_url, primary_platform, primary_handle, profile_url }] }
*/

const MAX = 6;
const PARENT = location.hostname;
let streams = [];       // all streams from API (live + offline merged)
let selected = [];       // keys of selected streams
let activeChat = null;
let autoMode = true;
let audioFollow = false;
let unmutedKey = null;
let endedScenes = [];
let lastLabel = null;
let lastPicks = [];
let creatorAvatars = {};  // display_name.lower → real avatar_url

function skey(s) { return s.platform + ':' + (s.handle || s.display_name.toLowerCase()); }

function fmtBig(n) {
  if (n == null) return '—';
  if (n >= 1e6) return (n/1e6).toFixed(1) + 'M';
  if (n >= 1e3) return (n/1e3).toFixed(1) + 'k';
  return String(n);
}

function ago(at) {
  const s = Math.max(1, Math.floor((Date.now() - at) / 1000));
  if (s < 60) return s + 's ago';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  return Math.floor(s/3600) + 'h ago';
}

function fmtUptime(mins) {
  if (!mins) return '';
  const h = Math.floor(mins/60), m = mins%60;
  return h > 0 ? h+'h '+m+'m' : m+'m';
}

function getAvatar(name) {
  return creatorAvatars[(name||'').toLowerCase()] || '';
}

function avatarHtml(name, url, size, cls) {
  const av = url || getAvatar(name);
  if (av && !av.includes('previews-ttv')) {
    return `<img src="${av}" alt="" loading="lazy" class="${cls}" style="width:${size}px;height:${size}px" onerror="this.outerHTML='<div class=\\'${cls.replace('rc-av','rc-ini')}\\' style=\\'width:${size}px;height:${size}px\\'>${(name||'?').charAt(0).toUpperCase()}</div>'">`;
  }
  return `<div class="${cls.replace('rc-av','rc-ini')}" style="width:${size}px;height:${size}px">${(name||'?').charAt(0).toUpperCase()}</div>`;
}

// === DATA ===
async function loadData() {
  try {
    const [liveRes, creatorsRes, recentRes] = await Promise.all([
      fetch('/api/live-now'),
      fetch('/api/creators?limit=500'),
      fetch('/api/recent-live').catch(() => ({json:()=>({})})),
    ]);
    const liveJson = await liveRes.json();
    const creatorsJson = await creatorsRes.json();
    const recentJson = await recentRes.json();

    const live = (liveJson.ok && liveJson.live) ? liveJson.live : [];
    const creators = (creatorsJson.ok && creatorsJson.creators) ? creatorsJson.creators : [];
    const recentSessions = recentJson.sessions || recentJson.recent || [];

    // Build set of recently active creator names
    const recentNames = new Set();
    live.forEach(s => recentNames.add((s.display_name||s.handle||'').toLowerCase()));
    recentSessions.forEach(s => recentNames.add((s.creator_name||s.display_name||s.name||'').toLowerCase()));

    // Build avatar lookup
    creatorAvatars = {};
    creators.forEach(c => {
      const k = (c.display_name||'').toLowerCase();
      if (k && c.avatar_url && !c.avatar_url.includes('previews-ttv')) {
        creatorAvatars[k] = c.avatar_url;
      }
    });

    // Build merged stream list
    const liveMap = {};
    live.forEach(s => {
      s.is_live = true;
      s.handle = s.handle || s.display_name.toLowerCase();
      liveMap[s.handle.toLowerCase()] = s;
    });

    streams = creators
      .filter(c => {
        // Only show creators who are live or recently active
        const name = (c.display_name||'').toLowerCase();
        const handle = (c.primary_handle||'').toLowerCase();
        return recentNames.has(name) || recentNames.has(handle);
      })
      .map(c => {
      const handle = (c.primary_handle || c.display_name || '').toLowerCase();
      const liveS = liveMap[handle] || liveMap[(c.display_name||'').toLowerCase()];
      if (liveS) {
        delete liveMap[handle];
        delete liveMap[(c.display_name||'').toLowerCase()];
        return { ...liveS, avatar_url: c.avatar_url || liveS.avatar_url };
      }
      return {
        handle,
        platform: c.primary_platform || 'twitch',
        display_name: c.display_name || handle,
        avatar_url: c.avatar_url,
        is_live: false,
        viewers: null,
        stream_title: null,
        game_name: null,
        uptime_mins: null,
      };
    });

    // Add any live streams not in creators
    Object.values(liveMap).forEach(s => streams.unshift(s));

    // Sort: live first by viewers, then alpha
    streams.sort((a,b) => {
      if (a.is_live !== b.is_live) return a.is_live ? -1 : 1;
      if (a.is_live && b.is_live) return (b.viewers||0) - (a.viewers||0);
      return (a.display_name||'').localeCompare(b.display_name||'');
    });

    if (autoMode) autoSelect();
    renderAll();
  } catch(e) {
    console.error('Load failed:', e);
  }
}

// === AUTO SELECT ===
function autoSelect() {
  const live = streams.filter(s => s.is_live).sort((a,b) => (b.viewers||0)-(a.viewers||0));
  if (live.length === 0) return;
  const picks = live.slice(0, MAX);
  const keys = picks.map(skey);
  const label = 'Top viewers';

  // Detect scene change
  if (lastLabel && lastLabel !== label && lastPicks.length) {
    const names = lastPicks.map(k => streams.find(s => skey(s)===k)?.display_name).filter(Boolean);
    endedScenes = [{id: lastLabel+'-'+Date.now(), label: lastLabel, endedAt: Date.now(), participants: names}, ...endedScenes].slice(0,6);
  }
  lastLabel = label;
  lastPicks = keys;
  selected = keys;
  if (!activeChat || !keys.includes(activeChat)) activeChat = keys[0] || null;
}

function watchLiveScene() {
  autoMode = true;
  autoSelect();
  renderAll();
}

function toggle(stream) {
  autoMode = false;
  lastLabel = null;
  lastPicks = [];
  const key = skey(stream);
  if (selected.includes(key)) {
    selected = selected.filter(k => k !== key);
    if (activeChat === key) activeChat = selected[0] || null;
  } else {
    if (selected.length >= MAX) return;
    selected.push(key);
    if (!activeChat) activeChat = key;
  }
  renderAll();
}

function clearAll() {
  autoMode = false;
  selected = [];
  activeChat = null;
  unmutedKey = null;
  lastLabel = null;
  lastPicks = [];
  renderAll();
}

function toggleAudioFollow(on) {
  audioFollow = on;
  if (on) unmutedKey = null;
  document.getElementById('af-icon').textContent = on ? '🔊' : '🔇';
  document.getElementById('af-toggle').classList.toggle('on', on);
  renderStage();
}

function setChat(key) {
  activeChat = key;
  renderChat();
  renderChatTabs();
}

function unmuteTile(key) {
  audioFollow = false;
  unmutedKey = key;
  document.getElementById('af-toggle').classList.remove('on');
  document.querySelector('#af-toggle input').checked = false;
  document.getElementById('af-icon').textContent = '🔇';
  renderStage();
}

function removeTile(stream) { toggle(stream); }

// === RENDER ===
function renderAll() {
  // Header
  document.getElementById('sel-count').textContent = selected.length + '/' + MAX + ' selected';
  document.getElementById('clear-btn').style.display = selected.length > 0 ? '' : 'none';

  renderStage();
  renderEnded();
  renderRoster();
}

function renderStage() {
  const area = document.getElementById('stage-area');
  const selStreams = selected.map(k => streams.find(s => skey(s)===k)).filter(s => s && s.is_live);

  if (selStreams.length === 0) {
    const hasLive = streams.some(s => s.is_live);
    area.innerHTML = `<div class="empty-stage">
      <h3>Stage's empty</h3>
      <p>${hasLive ? 'Pick up to '+MAX+' streams from the roster below to load them onto the stage.' : "Nobody from the roster is live right now. Come back when the scene wakes up."}</p>
    </div>`;
    return;
  }

  const topKey = skey([...selStreams].sort((a,b)=>(b.viewers||0)-(a.viewers||0))[0]);
  const audioKey = audioFollow ? topKey : unmutedKey;

  const stageHeader = `<div class="stage-header">
    <div><div class="sh-kicker">Live Scene</div><h2>Detected Activity</h2></div>
    <span class="mode-badge${autoMode?' auto':''}">${autoMode ? 'Auto · Top viewers' : 'Manual'}</span>
  </div>`;

  const gridClass = 'vid-grid g' + Math.min(selStreams.length, 6);
  const tiles = selStreams.map(s => {
    const k = skey(s);
    const isTop = k === topKey;
    const muted = audioFollow ? k !== topKey : k !== unmutedKey;
    const isAudio = k === audioKey;
    const plat = (s.platform||'twitch').toLowerCase();
    const twitchParents = `parent=${PARENT}&parent=www.${PARENT}&parent=contentlore.com&parent=www.contentlore.com`;
    const src = plat === 'twitch'
      ? `https://player.twitch.tv/?channel=${encodeURIComponent(s.handle)}&${twitchParents}&muted=${muted}&autoplay=true`
      : `https://player.kick.com/${encodeURIComponent(s.handle)}?muted=${muted}&autoplay=true`;

    return `<div class="tile${isTop?' top-tile':''}">
      <iframe src="${src}" key="${k}-${muted?'m':'u'}" allowfullscreen allow="autoplay;fullscreen;picture-in-picture"></iframe>
      <div class="tile-overlay">
        <div style="display:flex;align-items:center;gap:4px;flex-wrap:wrap">
          <span class="tile-badge live-b"><span class="dot"></span>Live</span>
          <span class="tile-badge name-b">${s.display_name}</span>
          <span class="tile-badge plat-b ${plat}">${plat}</span>
          ${isTop ? '<span class="tile-badge top-b">★ Most Active POV</span>' : ''}
          ${isAudio ? '<span class="tile-badge audio-b">🔊 Audio</span>' : ''}
        </div>
        <div style="display:flex;gap:4px">
          ${muted ? `<button class="tile-btn" onclick="unmuteTile('${k}')" title="Unmute">🔊</button>` : ''}
          <button class="tile-btn remove" onclick="removeTile(streams.find(s=>skey(s)==='${k}'))" title="Remove">✕</button>
        </div>
      </div>
    </div>`;
  }).join('');

  area.innerHTML = stageHeader + `<div class="stage-wrap">
    <div class="${gridClass}">${tiles}</div>
    <div class="chat-panel">
      <div class="chat-tabs" id="chat-tabs"></div>
      <iframe class="chat-frame" id="chat-frame"></iframe>
    </div>
  </div>`;

  renderChatTabs();
  renderChat();
}

function renderChatTabs() {
  const tabs = document.getElementById('chat-tabs');
  if (!tabs) return;
  const selStreams = selected.map(k => streams.find(s => skey(s)===k)).filter(s => s && s.is_live);
  tabs.innerHTML = selStreams.map(s => {
    const k = skey(s);
    const isActive = k === activeChat;
    const plat = (s.platform||'twitch').toLowerCase();
    return `<button class="chat-tab${isActive?' active':''}" onclick="setChat('${k}')">
      <span>${s.display_name}</span>
      <span class="plat ${plat==='twitch'?'tw':'ki'}">· ${plat}</span>
    </button>`;
  }).join('');
}

function renderChat() {
  const frame = document.getElementById('chat-frame');
  if (!frame) return;
  const active = streams.find(s => skey(s) === activeChat);
  if (!active) return;
  const plat = (active.platform||'twitch').toLowerCase();
  frame.src = plat === 'twitch'
    ? `https://www.twitch.tv/embed/${encodeURIComponent(active.handle)}/chat?parent=${PARENT}&parent=www.${PARENT}&parent=contentlore.com&parent=www.contentlore.com&darkpopout`
    : `https://kick.com/${encodeURIComponent(active.handle)}/chatroom`;
}

function renderEnded() {
  const area = document.getElementById('ended-area');
  if (!endedScenes.length) { area.innerHTML = ''; return; }
  area.innerHTML = `<div class="ended">
    <div class="ended-label">Recently ended scenes</div>
    <div class="ended-strip">${endedScenes.map(sc => `
      <div class="ended-card">
        <div class="ec-top">
          <span class="ec-label">${sc.label}</span>
          <span class="ec-ago">${ago(sc.endedAt)}</span>
        </div>
        ${sc.participants.length ? `<div class="ec-names">${sc.participants.join(', ')}</div>` : ''}
      </div>`).join('')}
    </div>
  </div>`;
}

function renderRoster() {
  const grid = document.getElementById('roster-grid');
  grid.innerHTML = streams.map(s => {
    const k = skey(s);
    const isSel = selected.includes(k);
    const disabled = !isSel && selected.length >= MAX;
    const plat = (s.platform||'twitch').toLowerCase();

    return `<button class="rc${isSel?' selected':''}${disabled?' disabled':''}" onclick="${disabled?'':(`toggle(streams.find(s=>skey(s)==='${k}'))`)}">
      <div class="rc-status">
        ${s.is_live ? '<span class="rc-live"><span class="dot"></span>Live</span>' : ''}
        ${isSel ? '<span class="rc-onstage">✓ On stage</span>' : ''}
      </div>
      <div class="rc-main">
        ${avatarHtml(s.display_name, s.avatar_url, 28, 'rc-av')}
        <div class="rc-name">${s.display_name}</div>
      </div>
      <div class="rc-plat ${plat}">${plat}${s.is_live && s.viewers != null ? ' · '+fmtBig(s.viewers) : ''}</div>
    </button>`;
  }).join('');
}

// === INIT ===
loadData();
setInterval(loadData, 90000);
</script>
</body>
</html>
