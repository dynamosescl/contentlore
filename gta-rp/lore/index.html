<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContentLore — Lore Tracker | UK GTA RP</title>
<meta name="description" content="Track every story arc, gang war, heist and saga across UK GTA RP servers. Chapter-by-chapter breakdowns.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0A0A0B;--bg2:#111113;--bg3:#161618;--bg4:#1C1C1F;
  --border:#2A2A2E;--border-a:#3A3A3F;
  --t1:#E8E8EC;--t2:#9898A0;--t3:#5A5A65;
  --mag:#FF2D6B;--mag-g:rgba(255,45,107,.3);--mag-dim:rgba(255,45,107,.12);
  --cyan:#00E5FF;--cyan-g:rgba(0,229,255,.25);--cyan-dim:rgba(0,229,255,.1);
  --green:#00FF85;--green-dim:rgba(0,255,133,.12);
  --orange:#FF8A00;--red:#FF3B3B;--yellow:#FFD600;
  --font-d:'Oswald',sans-serif;--font-m:'JetBrains Mono',monospace;--font-b:system-ui,-apple-system,sans-serif;
  --clip:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));
  --clip-sm:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));
}
body{background:var(--bg);color:var(--t1);font-family:var(--font-b);min-height:100vh}

/* NAV */
.nav{height:48px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:0;position:sticky;top:0;z-index:100}
.nav-brand{font-family:var(--font-d);font-weight:700;font-size:18px;text-transform:uppercase;letter-spacing:3px;margin-right:24px;display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--t1)}
.nav-brand .cl{color:var(--mag)}
.nav-brand .gta{font-size:11px;color:var(--t3);letter-spacing:1px;background:var(--mag-dim);padding:2px 6px;clip-path:var(--clip-sm)}
.nav-links{display:flex;gap:0}
.nav-link{font-family:var(--font-d);font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);text-decoration:none;padding:14px 14px;border-bottom:2px solid transparent;transition:all .2s}
.nav-link:hover{color:var(--t2)}
.nav-link.active{color:var(--mag);border-bottom-color:var(--mag)}
.nav-link.coming{opacity:.35;pointer-events:none}
.nav-live::before{content:'';width:6px;height:6px;background:var(--green);border-radius:50%;display:inline-block;margin-right:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* HERO */
.hero{padding:40px 24px 24px;max-width:1200px;margin:0 auto}
.hero h1{font-family:var(--font-d);font-size:48px;font-weight:700;text-transform:uppercase;letter-spacing:4px;line-height:1}
.hero h1 .accent{color:var(--cyan);text-shadow:0 0 40px var(--cyan-g)}
.hero p{font-family:var(--font-m);font-size:13px;color:var(--t3);margin-top:8px}

/* FILTERS */
.filters{display:flex;gap:8px;padding:0 24px 20px;max-width:1200px;margin:0 auto;flex-wrap:wrap;align-items:center}
.filter-btn{background:var(--bg3);border:1px solid var(--border);color:var(--t2);font-family:var(--font-m);font-size:11px;padding:6px 14px;cursor:pointer;clip-path:var(--clip-sm);transition:all .15s;text-transform:uppercase;letter-spacing:.5px}
.filter-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.filter-btn.active{background:var(--cyan-dim);border-color:var(--cyan);color:var(--cyan)}
.filter-sep{width:1px;height:20px;background:var(--border)}

/* GRID */
.lore-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:16px;padding:0 24px 40px;max-width:1200px;margin:0 auto}

/* LORE CARD */
.lore-card{background:var(--bg2);border:1px solid var(--border);clip-path:var(--clip);overflow:hidden;transition:all .25s;cursor:pointer;position:relative}
.lore-card:hover{border-color:var(--cyan);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.4)}

.weight-strip{height:4px;display:flex;gap:1px;background:var(--bg)}
.weight-strip .pip{flex:1}

.card-body{padding:16px 18px}
.card-meta{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.badge{font-family:var(--font-m);font-size:9px;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;clip-path:var(--clip-sm)}
.badge-kind{background:var(--bg3);border:1px solid var(--border);color:var(--t2)}
.badge-era-current{background:var(--green-dim);border:1px solid var(--green);color:var(--green)}
.badge-era-legacy{background:rgba(255,138,0,.12);border:1px solid var(--orange);color:var(--orange)}
.badge-era-legendary{background:var(--cyan-dim);border:1px solid var(--cyan);color:var(--cyan)}
.badge-server{background:var(--mag-dim);border:1px solid rgba(255,45,107,.3);color:var(--mag)}

.card-title{font-family:var(--font-d);font-size:22px;font-weight:600;text-transform:uppercase;letter-spacing:1px;line-height:1.2}
.card-desc{font-family:var(--font-b);font-size:13px;color:var(--t2);margin-top:8px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

.card-footer{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:var(--bg3);border-top:1px solid var(--border);margin:14px -18px -16px}
.chapter-count{font-family:var(--font-m);font-size:11px;color:var(--t3)}
.weight-display{display:flex;align-items:center;gap:4px}
.weight-dot{width:10px;height:10px;clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);background:var(--border)}
.weight-dot.on{background:var(--cyan)}
.linked-beefs{font-family:var(--font-m);font-size:10px;color:var(--mag)}

/* DETAIL OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:40px 20px}
.overlay.open{display:flex}
.detail{background:var(--bg2);border:1px solid var(--border);clip-path:var(--clip);max-width:700px;width:100%;padding:0}
.detail-body{padding:24px;position:relative}
.detail-close{position:absolute;top:16px;right:20px;background:none;border:none;color:var(--t3);font-size:24px;cursor:pointer}
.detail-close:hover{color:var(--red)}

/* CHAPTERS */
.chapters{margin-top:24px}
.chapters h3{font-family:var(--font-d);font-size:16px;text-transform:uppercase;letter-spacing:1.5px;color:var(--t2);margin-bottom:16px}
.chapter{background:var(--bg3);border:1px solid var(--border);clip-path:var(--clip-sm);padding:16px;margin-bottom:10px;position:relative;padding-left:48px}
.chapter-num{position:absolute;left:14px;top:14px;font-family:var(--font-d);font-size:20px;font-weight:700;color:var(--cyan);opacity:.5}
.chapter-title{font-family:var(--font-d);font-size:15px;text-transform:uppercase;letter-spacing:.5px}
.chapter-date{font-family:var(--font-m);font-size:10px;color:var(--t3);margin-top:2px}
.chapter-summary{font-family:var(--font-b);font-size:13px;color:var(--t2);margin-top:6px;line-height:1.5}

.linked-section{margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}
.linked-section h3{font-family:var(--font-d);font-size:14px;text-transform:uppercase;letter-spacing:1.5px;color:var(--t2);margin-bottom:12px}
.linked-beef-card{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--bg3);border:1px solid var(--border);clip-path:var(--clip-sm);cursor:pointer;transition:all .15s;margin-bottom:6px}
.linked-beef-card:hover{border-color:var(--mag)}
.linked-beef-card .lbc-title{font-family:var(--font-d);font-size:13px;text-transform:uppercase}
.linked-beef-card .lbc-heat{font-family:var(--font-m);font-size:11px;color:var(--mag)}

.empty-state{text-align:center;padding:80px 20px;font-family:var(--font-m);font-size:13px;color:var(--t3)}

body::before{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.5}
*{position:relative;z-index:1}
.nav{z-index:100}.overlay{z-index:200}

@media(max-width:600px){
  .hero h1{font-size:32px}
  .lore-grid{grid-template-columns:1fr;padding:0 12px 24px}
  .filters{padding:0 12px 16px}
}
</style>
</head>
<body>
<nav class="nav">
  <a href="/gta-rp/" class="nav-brand"><span class="cl">Content</span>Lore<span class="gta">GTA RP</span></a>
  <div class="nav-links">
    <a href="/gta-rp/" class="nav-link nav-live">Live</a>
    <a href="/gta-rp/now/" class="nav-link coming">Now</a>
    <a href="/gta-rp/multi/" class="nav-link">Multi-View</a>
    <a href="/gta-rp/lore/" class="nav-link active">Lore</a>
    <a href="/gta-rp/beef/" class="nav-link">Beef</a>
    <a href="/gta-rp/servers/" class="nav-link">Servers</a>
  </div>
</nav>

<div class="hero">
  <h1><span class="accent">Lore</span> Tracker</h1>
  <p>Every story arc, saga and chapter unfolding across UK RP</p>
</div>

<div class="filters" id="filters">
  <button class="filter-btn active" data-filter="all" onclick="filterLore('all')">All</button>
  <div class="filter-sep"></div>
  <button class="filter-btn" data-filter="gang-war" onclick="filterLore('gang-war')">⚔️ Gang War</button>
  <button class="filter-btn" data-filter="heist" onclick="filterLore('heist')">💰 Heist</button>
  <button class="filter-btn" data-filter="political" onclick="filterLore('political')">🏛 Political</button>
  <button class="filter-btn" data-filter="betrayal" onclick="filterLore('betrayal')">🗡 Betrayal</button>
  <button class="filter-btn" data-filter="rivalry" onclick="filterLore('rivalry')">🔥 Rivalry</button>
  <div class="filter-sep"></div>
  <button class="filter-btn" data-filter="era-current" onclick="filterEra('current')">Current</button>
  <button class="filter-btn" data-filter="era-legacy" onclick="filterEra('legacy')">Legacy</button>
  <button class="filter-btn" data-filter="era-legendary" onclick="filterEra('legendary')">Legendary</button>
  <div class="filter-sep"></div>
  <div id="server-filters"></div>
</div>

<div class="lore-grid" id="lore-grid">
  <div class="empty-state">Loading lore arcs…</div>
</div>

<div class="overlay" id="detail-overlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail" id="detail-content"></div>
</div>

<script>
let allArcs = [];
let currentKind = 'all';
let currentEra = null;
let currentServer = null;

async function loadLore() {
  try {
    const r = await fetch('/api/lore-arcs');
    const data = await r.json();
    allArcs = (data.arcs || data || []).map(a => ({
      ...a,
      chapters: typeof a.chapters === 'string' ? JSON.parse(a.chapters || '[]') : (a.chapters || []),
      linked_beefs: typeof a.linked_beefs === 'string' ? JSON.parse(a.linked_beefs || '[]') : (a.linked_beefs || []),
    }));
    buildServerFilters();
    renderLore();
  } catch(e) {
    document.getElementById('lore-grid').innerHTML = '<div class="empty-state">Failed to load lore arcs</div>';
  }
}

function buildServerFilters() {
  const servers = [...new Set(allArcs.map(a => a.server).filter(Boolean))];
  document.getElementById('server-filters').innerHTML = servers.map(s =>
    `<button class="filter-btn" data-server="${s}" onclick="filterServer('${s}')">${s}</button>`
  ).join('');
}

function filterLore(kind) {
  currentKind = kind; currentEra = null; currentServer = null;
  updateFilterUI();
  renderLore();
}
function filterEra(era) {
  currentEra = currentEra === era ? null : era;
  currentKind = 'all'; currentServer = null;
  updateFilterUI();
  renderLore();
}
function filterServer(server) {
  currentServer = currentServer === server ? null : server;
  currentKind = 'all'; currentEra = null;
  updateFilterUI();
  renderLore();
}
function updateFilterUI() {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (currentKind !== 'all') {
    const el = document.querySelector(`[data-filter="${currentKind}"]`);
    if (el) el.classList.add('active');
  } else if (currentEra) {
    const el = document.querySelector(`[data-filter="era-${currentEra}"]`);
    if (el) el.classList.add('active');
  } else if (currentServer) {
    const el = document.querySelector(`[data-server="${currentServer}"]`);
    if (el) el.classList.add('active');
  } else {
    document.querySelector('[data-filter="all"]').classList.add('active');
  }
}

function renderLore() {
  let filtered = allArcs;
  if (currentKind !== 'all') filtered = filtered.filter(a => a.kind === currentKind);
  if (currentEra) filtered = filtered.filter(a => a.era === currentEra);
  if (currentServer) filtered = filtered.filter(a => a.server === currentServer);

  const grid = document.getElementById('lore-grid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state">No lore arcs match your filters</div>';
    return;
  }

  filtered.sort((a,b) => (b.weight||0) - (a.weight||0));

  grid.innerHTML = filtered.map(a => {
    const weight = a.weight || 3;
    const pips = Array.from({length:5}, (_,i) =>
      `<div class="pip" style="background:${i < weight ? 'var(--cyan)' : 'var(--bg3)'}"></div>`
    ).join('');
    const weightDots = Array.from({length:5}, (_,i) =>
      `<div class="weight-dot${i < weight ? ' on' : ''}"></div>`
    ).join('');
    const chapters = a.chapters || [];
    const linked = a.linked_beefs || [];
    const kindLabel = (a.kind || 'other').replace(/-/g, ' ');

    return `<div class="lore-card" onclick="showDetail('${a.slug}')">
      <div class="weight-strip">${pips}</div>
      <div class="card-body">
        <div class="card-meta">
          ${a.server ? `<span class="badge badge-server">${a.server}</span>` : ''}
          <span class="badge badge-kind">${kindLabel}</span>
          <span class="badge badge-era-${a.era || 'current'}">${a.era || 'current'}</span>
        </div>
        <div class="card-title">${a.title}</div>
        <div class="card-desc">${a.description || ''}</div>
        <div class="card-footer">
          <span class="chapter-count">${chapters.length} chapter${chapters.length !== 1 ? 's' : ''}</span>
          <div style="display:flex;align-items:center;gap:12px">
            ${linked.length ? `<span class="linked-beefs">${linked.length} linked beef${linked.length!==1?'s':''}</span>` : ''}
            <div class="weight-display">${weightDots}</div>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function showDetail(slug) {
  try {
    const r = await fetch(`/api/lore/${slug}`);
    const data = await r.json();
    const a = data.arc || data;
    a.chapters = typeof a.chapters === 'string' ? JSON.parse(a.chapters || '[]') : (a.chapters || []);
    a.linked_beefs = typeof a.linked_beefs === 'string' ? JSON.parse(a.linked_beefs || '[]') : (a.linked_beefs || []);

    const weight = a.weight || 3;
    const weightDots = Array.from({length:5}, (_,i) =>
      `<div class="weight-dot${i < weight ? ' on' : ''}"></div>`
    ).join('');
    const kindLabel = (a.kind || 'other').replace(/-/g, ' ');

    let chaptersHtml = '';
    if (a.chapters.length) {
      chaptersHtml = '<div class="chapters"><h3>Chapters</h3>' +
        a.chapters.map((ch, i) => `
          <div class="chapter">
            <div class="chapter-num">${String(i+1).padStart(2,'0')}</div>
            <div class="chapter-title">${ch.title || 'Untitled'}</div>
            ${ch.date ? `<div class="chapter-date">${ch.date}</div>` : ''}
            <div class="chapter-summary">${ch.summary || ''}</div>
          </div>`).join('') + '</div>';
    }

    let linkedHtml = '';
    if (a.linked_beefs.length) {
      linkedHtml = '<div class="linked-section"><h3>🔗 Linked Beefs</h3>' +
        a.linked_beefs.map(slug => `
          <div class="linked-beef-card" onclick="window.location.href='/gta-rp/beef/#beef=${slug}'">
            <span class="lbc-title">${slug.replace(/-/g, ' ')}</span>
            <span class="lbc-heat">→</span>
          </div>`).join('') + '</div>';
    }

    const pips = Array.from({length:5}, (_,i) =>
      `<div class="pip" style="background:${i < weight ? 'var(--cyan)' : 'var(--bg3)'}"></div>`
    ).join('');

    document.getElementById('detail-content').innerHTML = `
      <div class="weight-strip">${pips}</div>
      <div class="detail-body">
        <button class="detail-close" onclick="closeDetail()">✕</button>
        <div class="card-meta">
          ${a.server ? `<span class="badge badge-server">${a.server}</span>` : ''}
          <span class="badge badge-kind">${kindLabel}</span>
          <span class="badge badge-era-${a.era || 'current'}">${a.era || 'current'}</span>
          <div class="weight-display" style="margin-left:auto">${weightDots}</div>
        </div>
        <div class="card-title" style="font-size:28px;margin-top:8px">${a.title}</div>
        <div style="font-family:var(--font-b);font-size:14px;color:var(--t2);margin-top:12px;line-height:1.6">${a.description || ''}</div>
        ${chaptersHtml}
        ${linkedHtml}
      </div>`;
    document.getElementById('detail-overlay').classList.add('open');
  } catch(e) { console.error('Detail load failed:', e); }
}

function closeDetail() { document.getElementById('detail-overlay').classList.remove('open'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

loadLore();
</script>
</body>
</html>
