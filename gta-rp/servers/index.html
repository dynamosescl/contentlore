<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContentLore — UK RP Servers | GTA RP</title>
<meta name="description" content="Complete directory of UK GTA RP servers with live streamer counts, viewer totals and activity indicators.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0A0A0B;--bg2:#111113;--bg3:#161618;--bg4:#1C1C1F;
  --border:#2A2A2E;--border-a:#3A3A3F;
  --t1:#E8E8EC;--t2:#9898A0;--t3:#5A5A65;
  --mag:#FF2D6B;--mag-g:rgba(255,45,107,.3);--mag-dim:rgba(255,45,107,.12);
  --cyan:#00E5FF;--cyan-g:rgba(0,229,255,.25);--cyan-dim:rgba(0,229,255,.1);
  --green:#00FF85;--green-dim:rgba(0,255,133,.12);
  --orange:#FF8A00;--red:#FF3B3B;
  --font-d:'Oswald',sans-serif;--font-m:'JetBrains Mono',monospace;--font-b:system-ui,-apple-system,sans-serif;
  --clip:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));
  --clip-sm:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));
}
body{background:var(--bg);color:var(--t1);font-family:var(--font-b);min-height:100vh}

.nav{height:48px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;position:sticky;top:0;z-index:100}
.nav-brand{font-family:var(--font-d);font-weight:700;font-size:18px;text-transform:uppercase;letter-spacing:3px;margin-right:24px;display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--t1)}
.nav-brand .cl{color:var(--mag)}
.nav-brand .gta{font-size:11px;color:var(--t3);letter-spacing:1px;background:var(--mag-dim);padding:2px 6px;clip-path:var(--clip-sm)}
.nav-links{display:flex;gap:0}
.nav-link{font-family:var(--font-d);font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);text-decoration:none;padding:14px 14px;border-bottom:2px solid transparent;transition:all .2s}
.nav-link:hover{color:var(--t2)}
.nav-link.active{color:var(--mag);border-bottom-color:var(--mag)}
.nav-link.coming{opacity:.35;pointer-events:none}
.nav-live::before{content:'';width:6px;height:6px;background:var(--green);border-radius:50%;display:inline-block;margin-right:4px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.hero{padding:40px 24px 24px;max-width:1200px;margin:0 auto}
.hero h1{font-family:var(--font-d);font-size:48px;font-weight:700;text-transform:uppercase;letter-spacing:4px;line-height:1}
.hero h1 .accent{color:var(--cyan);text-shadow:0 0 40px var(--cyan-g)}
.hero p{font-family:var(--font-m);font-size:13px;color:var(--t3);margin-top:8px}

/* SUMMARY BAR */
.summary-bar{display:flex;gap:24px;padding:0 24px 24px;max-width:1200px;margin:0 auto;flex-wrap:wrap}
.summary-stat{background:var(--bg2);border:1px solid var(--border);clip-path:var(--clip-sm);padding:12px 18px;min-width:140px}
.summary-stat .stat-label{font-family:var(--font-m);font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
.summary-stat .stat-value{font-family:var(--font-d);font-size:28px;font-weight:700;margin-top:2px}
.summary-stat .stat-value.mag{color:var(--mag)}
.summary-stat .stat-value.cyan{color:var(--cyan)}
.summary-stat .stat-value.green{color:var(--green)}

/* SERVER GRID */
.server-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(350px,1fr));gap:16px;padding:0 24px 40px;max-width:1200px;margin:0 auto}

.server-card{background:var(--bg2);border:1px solid var(--border);clip-path:var(--clip);overflow:hidden;transition:all .25s;position:relative}
.server-card:hover{border-color:var(--cyan);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.server-card.has-live{border-color:var(--green)}
.server-card.has-live .live-indicator{display:flex}

.live-indicator{display:none;position:absolute;top:12px;right:0;background:var(--green);color:#000;font-family:var(--font-m);font-size:9px;letter-spacing:1px;padding:3px 10px 3px 8px;clip-path:polygon(6px 0,100% 0,100% 100%,0 100%);align-items:center;gap:4px;animation:pulse 2s infinite}

.server-header{padding:18px 18px 0;display:flex;align-items:flex-start;justify-content:space-between}
.server-name{font-family:var(--font-d);font-size:24px;font-weight:700;text-transform:uppercase;letter-spacing:2px}
.server-badge{font-family:var(--font-m);font-size:9px;text-transform:uppercase;letter-spacing:1px;padding:3px 8px;clip-path:var(--clip-sm)}
.server-badge.uk{background:var(--cyan-dim);border:1px solid var(--cyan);color:var(--cyan)}
.server-badge.international{background:var(--mag-dim);border:1px solid rgba(255,45,107,.3);color:var(--mag)}

.server-desc{padding:8px 18px;font-family:var(--font-b);font-size:13px;color:var(--t2);line-height:1.5}

.server-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);margin-top:12px}
.server-stat{background:var(--bg3);padding:10px 14px;text-align:center}
.server-stat .ss-val{font-family:var(--font-d);font-size:18px;font-weight:600}
.server-stat .ss-label{font-family:var(--font-m);font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

/* LIVE STREAMERS SECTION */
.server-live{padding:12px 18px;border-top:1px solid var(--border)}
.server-live h4{font-family:var(--font-d);font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);margin-bottom:8px}
.live-streamer{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:var(--bg);border:1px solid var(--border);font-family:var(--font-m);font-size:11px;margin:0 4px 4px 0;clip-path:var(--clip-sm);cursor:pointer;transition:border-color .15s}
.live-streamer:hover{border-color:var(--green)}
.live-streamer .dot{width:5px;height:5px;background:var(--green);border-radius:50%}
.live-streamer .viewers{color:var(--green);font-size:10px}

.empty-state{text-align:center;padding:80px 20px;font-family:var(--font-m);font-size:13px;color:var(--t3)}

body::before{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.5}
*{position:relative;z-index:1}.nav{z-index:100}

@media(max-width:600px){
  .hero h1{font-size:32px}
  .server-grid{grid-template-columns:1fr;padding:0 12px 24px}
  .summary-bar{padding:0 12px 16px}
}
</style>
</head>
<body>
<nav class="nav">
  <a href="/gta-rp/" class="nav-brand"><span class="cl">Content</span>Lore<span class="gta">GTA RP</span></a>
  <div class="nav-links">
    <a href="/gta-rp/" class="nav-link nav-live">Live</a>
    <a href="/gta-rp/now/" class="nav-link">Now</a>
    <a href="/gta-rp/multi/" class="nav-link">Multi-View</a>
    <a href="/gta-rp/lore/" class="nav-link">Lore</a>
    <a href="/gta-rp/beef/" class="nav-link">Beef</a>
    <a href="/gta-rp/servers/" class="nav-link active">Servers</a>
  </div>
</nav>

<div class="hero">
  <h1>UK RP <span class="accent">Servers</span></h1>
  <p>Complete directory with live activity overlay</p>
</div>

<div class="summary-bar" id="summary-bar"></div>

<div class="server-grid" id="server-grid">
  <div class="empty-state">Loading servers…</div>
</div>

<script>
let servers = [];
let liveData = [];

async function loadAll() {
  try {
    const [sRes, lRes] = await Promise.all([
      fetch('/api/servers'),
      fetch('/api/live-now').catch(() => ({json: () => ({})}))
    ]);
    const sData = await sRes.json();
    const lData = await lRes.json();
    servers = sData.servers || sData || [];
    liveData = lData.live || lData.creators || lData || [];
    renderSummary();
    renderServers();
  } catch(e) {
    document.getElementById('server-grid').innerHTML = '<div class="empty-state">Failed to load server data</div>';
  }
}

function renderSummary() {
  const totalServers = servers.length;
  const liveCount = liveData.length;
  const totalViewers = liveData.reduce((sum, c) => sum + (c.viewers || 0), 0);
  const serversWithLive = [...new Set(liveData.map(c => c.server).filter(Boolean))].length;

  document.getElementById('summary-bar').innerHTML = `
    <div class="summary-stat"><div class="stat-label">Servers Tracked</div><div class="stat-value cyan">${totalServers}</div></div>
    <div class="summary-stat"><div class="stat-label">Live Now</div><div class="stat-value green">${liveCount}</div></div>
    <div class="summary-stat"><div class="stat-label">Total Viewers</div><div class="stat-value mag">${fmtN(totalViewers)}</div></div>
    <div class="summary-stat"><div class="stat-label">Active Servers</div><div class="stat-value cyan">${serversWithLive}</div></div>`;
}

function renderServers() {
  const grid = document.getElementById('server-grid');
  if (!servers.length) {
    grid.innerHTML = '<div class="empty-state">No servers in registry</div>';
    return;
  }

  // Augment with live data
  const augmented = servers.map(s => {
    const name = s.name || s.server_name || '';
    const keywords = (s.keywords || s.tags || []);
    const liveStreamers = liveData.filter(c => {
      const cServer = (c.server || '').toLowerCase();
      return cServer === name.toLowerCase() || keywords.some(k => cServer.includes(k.toLowerCase()));
    });
    return {...s, liveStreamers, liveCount: liveStreamers.length, totalViewers: liveStreamers.reduce((sum,c) => sum + (c.viewers||0), 0)};
  });

  // Sort: live servers first, then by live count
  augmented.sort((a,b) => b.liveCount - a.liveCount || (b.totalViewers - a.totalViewers));

  grid.innerHTML = augmented.map(s => {
    const name = s.name || s.server_name || 'Unknown';
    const desc = s.description || s.desc || '';
    const region = s.region || 'uk';
    const hasLive = s.liveCount > 0;
    const trackedCreators = s.tracked_creators || s.creator_count || '—';

    let liveSection = '';
    if (hasLive) {
      const streamers = s.liveStreamers.slice(0, 8).map(c => {
        const cName = c.name || c.creator_name || c.channel || '';
        return `<span class="live-streamer" onclick="window.open('https://twitch.tv/${cName.toLowerCase()}','_blank')">
          <span class="dot"></span>${cName}${c.viewers ? ` <span class="viewers">${fmtN(c.viewers)}</span>` : ''}
        </span>`;
      }).join('');
      const extra = s.liveCount > 8 ? `<span style="font-family:var(--font-m);font-size:10px;color:var(--t3)">+${s.liveCount - 8} more</span>` : '';
      liveSection = `<div class="server-live"><h4>Live Now</h4>${streamers}${extra}</div>`;
    }

    return `<div class="server-card${hasLive ? ' has-live' : ''}">
      <div class="live-indicator">⬤ LIVE</div>
      <div class="server-header">
        <div class="server-name">${name}</div>
        <span class="server-badge ${region}">${region.toUpperCase()}</span>
      </div>
      <div class="server-desc">${desc}</div>
      <div class="server-stats">
        <div class="server-stat"><div class="ss-val" style="color:var(--green)">${s.liveCount}</div><div class="ss-label">Live</div></div>
        <div class="server-stat"><div class="ss-val" style="color:var(--mag)">${fmtN(s.totalViewers)}</div><div class="ss-label">Viewers</div></div>
        <div class="server-stat"><div class="ss-val" style="color:var(--cyan)">${trackedCreators}</div><div class="ss-label">Tracked</div></div>
      </div>
      ${liveSection}
    </div>`;
  }).join('');
}

function fmtN(n) {
  if (n == null || isNaN(n)) return '0';
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'k';
  return n.toString();
}

loadAll();
setInterval(loadAll, 60000);
</script>
</body>
</html>
