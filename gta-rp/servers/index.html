<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/favicon.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UK RP Servers — ContentLore</title>
<meta name="description" content="UK GTA RP server directory with live activity overlay.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:oklch(0.09 0.04 295);--fg:oklch(0.97 0.02 320);
  --card:oklch(0.13 0.05 295);--card2:oklch(0.18 0.06 295);
  --ink-dim:oklch(0.78 0.05 320);--ink-faint:oklch(0.55 0.06 295);
  --signal:oklch(0.82 0.20 195);--signal-dim:oklch(0.65 0.18 195);--signal-cyan:oklch(0.85 0.18 200);
  --border:oklch(0.28 0.08 295);--live:oklch(0.82 0.20 195);
  --twitch:oklch(0.65 0.25 295);--kick:oklch(0.82 0.22 145);
  --font-d:'Bebas Neue',Impact,sans-serif;--font-m:'JetBrains Mono',monospace;--font-b:'Inter',system-ui,sans-serif;
  --cut:polygon(0 0,calc(100% - 14px) 0,100% 14px,100% 100%,0 100%);
}
html{background:var(--bg);color-scheme:dark}
body{background:var(--bg);color:var(--fg);font-family:var(--font-b);-webkit-font-smoothing:antialiased;position:relative}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:1;background-image:repeating-linear-gradient(0deg,oklch(0.82 0.20 195/.04) 0 1px,transparent 1px 3px);mix-blend-mode:screen}
body>*{position:relative;z-index:3}

.nav{height:48px;background:var(--card);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;position:sticky;top:0;z-index:100}
.nav-brand{font-family:var(--font-d);font-size:22px;letter-spacing:2px;margin-right:24px;text-decoration:none;color:var(--fg);display:flex;align-items:center;gap:6px}
.nav-brand .cl{color:var(--signal)}
.nav-brand .tag{font-family:var(--font-m);font-size:9px;color:var(--ink-faint);letter-spacing:1px;background:oklch(0.82 0.20 195/.1);padding:2px 6px}
.nav-links{display:flex}
.nav-link{font-family:var(--font-m);font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--ink-faint);text-decoration:none;padding:14px;border-bottom:2px solid transparent;transition:all .2s}
.nav-link:hover{color:var(--ink-dim)}
.nav-link.active{color:var(--signal);border-bottom-color:var(--signal)}
.ldot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:4px;animation:lp 2s infinite}
@keyframes lp{0%,100%{box-shadow:0 0 0 0 oklch(0.82 0.20 195/.8)}70%{box-shadow:0 0 0 8px oklch(0.82 0.20 195/0)}}

.hero{border-bottom:1px solid var(--border);padding:36px 24px;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;inset:0;opacity:.03;pointer-events:none;background-image:repeating-linear-gradient(135deg,var(--signal) 0 1px,transparent 1px 60px)}
.hero-inner{max-width:1200px;margin:0 auto}
.hero-kicker{font-family:var(--font-m);font-size:11px;text-transform:uppercase;letter-spacing:3px;color:var(--signal);margin-bottom:8px;text-shadow:0 0 6px oklch(0.82 0.20 195/.5)}
.hero h1{font-family:var(--font-d);font-size:clamp(36px,6vw,64px);line-height:.95}
.hero h1 .neon{color:var(--signal);animation:flicker 4.5s steps(1,end) infinite}
@keyframes flicker{0%,19%,21%,23%,100%{opacity:1;text-shadow:0 0 6px oklch(0.82 0.20 195/.7),0 0 18px oklch(0.82 0.20 195/.45)}20%,22%{opacity:.85;text-shadow:none}}
.hero-sub{font-size:14px;color:var(--ink-dim);margin-top:8px}
.hero-stats{display:flex;gap:24px;margin-top:20px}
.hs .v{font-family:var(--font-d);font-size:32px;line-height:1}
.hs .l{font-family:var(--font-m);font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--ink-faint);margin-top:2px}

.mx{max-width:1200px;margin:0 auto;padding:28px 24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:12px}
@media(max-width:700px){.grid{grid-template-columns:1fr}}

.sc{border:1px solid var(--border);background:var(--card);clip-path:var(--cut);overflow:hidden;transition:all .25s}
.sc:hover{border-color:var(--signal);transform:translateY(-2px);box-shadow:0 0 20px oklch(0.82 0.20 195/.2)}
.sc.live-server{border-color:oklch(0.82 0.20 195/.4)}
.sc-head{padding:16px 16px 0;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.sc-name{font-family:var(--font-d);font-size:26px;line-height:1}
.sc-live-badge{display:flex;align-items:center;gap:4px;font-family:var(--font-m);font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--signal);background:oklch(0.82 0.20 195/.1);padding:3px 8px;flex-shrink:0}
.sc-live-badge .dot{width:5px;height:5px;border-radius:50%;background:var(--live);animation:lp 2s infinite}
.sc-tag{font-family:var(--font-m);font-size:11px;color:var(--ink-dim);padding:0 16px;margin-top:4px;font-style:italic}
.sc-body{padding:8px 16px 12px;font-size:13px;color:var(--ink-dim);line-height:1.5}
.sc-vibes{padding:0 16px 8px;display:flex;gap:4px;flex-wrap:wrap}
.vibe{font-family:var(--font-m);font-size:9px;text-transform:uppercase;letter-spacing:1px;padding:2px 6px;border:1px solid var(--border);color:var(--ink-faint)}
.sc-stats{padding:8px 16px;border-top:1px solid var(--border);display:flex;gap:16px}
.ss{display:flex;align-items:baseline;gap:4px}
.ss .v{font-family:var(--font-d);font-size:18px}
.ss .l{font-family:var(--font-m);font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--ink-faint)}
.sc-bar{margin:0 16px;height:4px;background:oklch(0.09 0.04 295/.6);overflow:hidden}
.sc-fill{height:100%;background:var(--signal);transition:width .7s}
.sc-roster{padding:8px 16px 12px;font-family:var(--font-m);font-size:10px;color:var(--ink-faint);border-top:1px solid oklch(0.28 0.08 295/.5)}
.sc-roster span{color:var(--ink-dim)}

.footer{border-top:1px solid var(--border);padding:20px;text-align:center;font-family:var(--font-m);font-size:10px;text-transform:uppercase;letter-spacing:2px;color:var(--ink-faint);margin-top:20px}
::selection{background:var(--signal);color:var(--bg)}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes glitch{0%,92%,94%,96%,100%{transform:none;opacity:1}93%{transform:translateX(-2px) skewX(-0.5deg);opacity:.9}95%{transform:translateX(2px) skewX(0.5deg);opacity:.85}97%{transform:translateX(-1px)}}
@keyframes slideIn{from{opacity:0;transform:translateX(-12px)}to{opacity:1;transform:translateX(0)}}
@keyframes glow-pulse{0%,100%{box-shadow:0 0 4px oklch(0.82 0.20 195/.4)}50%{box-shadow:0 0 16px oklch(0.82 0.20 195/.6),0 0 32px oklch(0.82 0.20 195/.2)}}
.card:hover,.sc:hover,.scard:hover,.rcard:hover,.featured:hover{animation:glow-pulse 1.5s ease infinite}
.hero h1,.sec-title,.sh{animation:fadeUp .6s ease both}

</style>
</head>
<body>
<nav class="nav">
  <a href="/gta-rp/" class="nav-brand"><img src="/logo.png" alt="ContentLore" style="height:40px;filter:brightness(1.1)" loading="eager"></a>
  <div class="nav-links">
    <a href="/gta-rp/" class="nav-link"><span class="ldot" style="background:var(--live)"></span>Live</a>
    <a href="/gta-rp/now/" class="nav-link">Now</a>
    <a href="/gta-rp/multi/" class="nav-link">Multi-View</a>
    <a href="/gta-rp/servers/" class="nav-link active">Servers</a>
  </div>
</nav>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-kicker">Server Directory</div>
    <h1>UK RP <span class="neon">Servers</span></h1>
    <div class="hero-sub">Every UK GTA RP server tracked. Live activity overlay from stream detection.</div>
    <div class="hero-stats">
      <div class="hs"><div class="v" style="color:var(--signal)" id="s-total">0</div><div class="l">servers</div></div>
      <div class="hs"><div class="v" style="color:var(--signal-cyan)" id="s-active">0</div><div class="l">live now</div></div>
      <div class="hs"><div class="v" style="color:var(--kick)" id="s-viewers">0</div><div class="l">viewers</div></div>
    </div>
  </div>
</div>

<div class="mx">
  <div class="grid" id="grid"></div>
</div>

<div class="footer">ContentLore · UK GTA RP · Server Directory</div>

<script>
const SERVERS = [
  {id:'unique',name:'Unique RP',tag:'The big one. Drama factory of the UK scene.',blurb:'The flagship UK GTA RP server. High creator density, long-running storylines, and a constant rotation of beef, businesses and police chases.',keywords:['unique rp','uniquerp','unique'],roster:['kavsual','shammers','deggyuk','tyrone','samham','stoker','reeclare','megsmary'],vibes:['serious','criminal','civ-heavy']},
  {id:'tng',name:'TNG RP',tag:'The new kid making noise.',blurb:'Fresh UK server with launch energy and a growing creator roster. Currently running launch storylines pulling people in from the bigger servers.',keywords:['tng rp','tngrp','tng'],roster:['deggyuk','tazzthegeeza','wheelydev','absthename'],vibes:['serious','newbie-friendly']},
  {id:'orbit',name:'Orbit RP',tag:'Heads-down serious RP, UK base.',blurb:'UK serious-RP server with a focus on character-driven storylines and quality over volume. Lower noise floor, higher RP standard.',keywords:['orbit rp','orbitrp','orbit'],roster:['lbmm','reeclare','cherish_remedy','stoker'],vibes:['serious','civ-heavy']},
  {id:'new-era',name:'New Era RP',tag:'Fresh chapter, fresh storylines.',blurb:'Newer UK GTA RP server pitching itself as a clean-slate scene. Building roster and storylines from the ground up.',keywords:['new era rp','newera rp','new era','newera'],roster:[],vibes:['serious','newbie-friendly']},
  {id:'prodigy',name:'Prodigy RP',tag:'Up-and-comer with momentum.',blurb:'UK GTA RP server building a name on character-driven RP and a growing creator pull. One to watch.',keywords:['prodigy rp','prodigyrp','prodigy'],roster:[],vibes:['serious','criminal']},
  {id:'d10',name:'D10 RP',tag:'Tight-knit, story-first server.',blurb:'UK GTA RP server with a focused roster and an emphasis on long-form character work over high-volume action.',keywords:['d10 rp','d10rp','d10'],roster:[],vibes:['serious','civ-heavy']},
  {id:'unmatched',name:'Unmatched RP',tag:'Action-first, drama always.',blurb:"UK GTA RP server leaning into high-tempo content — chases, beefs and PD activity. Shammers' home turf.",keywords:['unmatched rp','unmatchedrp','unmatched'],roster:['shammers','kavsual','absthename','rexality','steeel','justj0hnnyhd'],vibes:['criminal','stunt']},
  {id:'verarp',name:'VeraRP',tag:'Community-focused UK roleplay.',blurb:'UK server with a strong community focus and an emphasis on organic storyline development.',keywords:['vera rp','verarp','vera'],roster:[],vibes:['serious']},
  {id:'endz',name:'The Endz',tag:'Street-level UK RP.',blurb:'UK GTA RP server with a gritty, street-level vibe. Drill culture meets roleplay.',keywords:['the endz','endz rp','endz'],roster:[],vibes:['criminal']},
  {id:'letsrp',name:"Let's RP",tag:'Welcoming to all levels.',blurb:'Beginner-friendly UK RP server with lower barriers to entry and a welcoming community.',keywords:["let's rp","letsrp","lets rp"],roster:[],vibes:['newbie-friendly']},
  {id:'drilluk',name:'Drill UK RP',tag:'UK drill meets GTA RP.',blurb:'UK server fusing drill culture aesthetics with GTA RP mechanics.',keywords:['drill uk','drilluk','drill rp'],roster:[],vibes:['criminal']},
  {id:'britishlife',name:'British Life RP',tag:'Everyday British life, RP-style.',blurb:'UK server offering a slower-paced, civ-heavy roleplay experience rooted in British culture.',keywords:['british life','britishlife'],roster:[],vibes:['civ-heavy','newbie-friendly']},
];

function detectServer(title) {
  if (!title) return null;
  const t = title.toLowerCase();
  for (const s of [...SERVERS].sort((a,b) => Math.max(...b.keywords.map(k=>k.length)) - Math.max(...a.keywords.map(k=>k.length)))) {
    for (const kw of s.keywords) { if (t.includes(kw)) return s; }
  }
  return null;
}

function fmtBig(n) {
  if (n==null) return '0';
  if (n>=1e3) return (n/1e3).toFixed(1)+'k';
  return String(n);
}

async function load() {
  try {
    const r = await fetch('/api/live-now');
    const d = await r.json();
    const live = (d.ok && d.live) ? d.live : [];

    // Map live streams to servers
    const srvData = SERVERS.map(srv => {
      const streams = live.filter(s => {
        const det = detectServer(s.stream_title || s.game_name);
        return det && det.id === srv.id;
      });
      return { ...srv, streams, liveCount: streams.length, viewers: streams.reduce((n,s)=>n+(s.viewers||0),0) };
    });

    const activeCount = srvData.filter(s => s.liveCount > 0).length;
    const totalViewers = srvData.reduce((n,s) => n + s.viewers, 0);
    const maxV = Math.max(1, ...srvData.map(s => s.viewers));

    document.getElementById('s-total').textContent = SERVERS.length;
    document.getElementById('s-active').textContent = activeCount;
    document.getElementById('s-viewers').textContent = fmtBig(totalViewers);

    // Sort: active servers first by viewers, then alphabetical
    srvData.sort((a,b) => {
      if (a.liveCount !== b.liveCount) return a.liveCount > 0 ? -1 : 1;
      if (a.liveCount > 0 && b.liveCount > 0) return b.viewers - a.viewers;
      return a.name.localeCompare(b.name);
    });

    document.getElementById('grid').innerHTML = srvData.map(srv => `
      <div class="sc${srv.liveCount > 0 ? ' live-server' : ''}">
        <div class="sc-head">
          <div class="sc-name">${srv.name}</div>
          ${srv.liveCount > 0 ? `<div class="sc-live-badge"><div class="dot"></div>${srv.liveCount} live</div>` : ''}
        </div>
        <div class="sc-tag">${srv.tag}</div>
        <div class="sc-body">${srv.blurb}</div>
        <div class="sc-vibes">${srv.vibes.map(v => `<span class="vibe">${v}</span>`).join('')}</div>
        <div class="sc-stats">
          <div class="ss"><span class="v" style="color:${srv.liveCount>0?'var(--signal)':'var(--ink-faint)'}">${srv.liveCount}</span><span class="l">live</span></div>
          <div class="ss"><span class="v" style="color:${srv.viewers>0?'var(--signal-cyan)':'var(--ink-faint)'}">${fmtBig(srv.viewers)}</span><span class="l">viewers</span></div>
        </div>
        <div class="sc-bar"><div class="sc-fill" style="width:${srv.liveCount>0?Math.max(4,(srv.viewers/maxV)*100):0}%"></div></div>
        ${srv.roster.length ? `<div class="sc-roster">Known creators: <span>${srv.roster.join(' · ')}</span></div>` : ''}
      </div>
    `).join('');
  } catch(e) { console.error(e); }
}

load();
setInterval(load, 90000);
</script>
</body>
</html>
