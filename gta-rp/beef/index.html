<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContentLore — Beef Tracker | UK GTA RP</title>
<meta name="description" content="Track every rivalry, grudge match and beef across UK GTA RP servers. Live heat ratings and beat-by-beat timelines.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0A0A0B;--bg2:#111113;--bg3:#161618;--bg4:#1C1C1F;
  --border:#2A2A2E;--border-a:#3A3A3F;
  --t1:#E8E8EC;--t2:#9898A0;--t3:#5A5A65;
  --mag:#FF2D6B;--mag-g:rgba(255,45,107,.3);--mag-dim:rgba(255,45,107,.12);
  --cyan:#00E5FF;--cyan-g:rgba(0,229,255,.25);--cyan-dim:rgba(0,229,255,.1);
  --green:#00FF85;--green-dim:rgba(0,255,133,.12);
  --orange:#FF8A00;--red:#FF3B3B;--yellow:#FFD600;
  --font-d:'Oswald',sans-serif;--font-m:'JetBrains Mono',monospace;--font-b:system-ui,-apple-system,sans-serif;
  --clip:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));
  --clip-sm:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));
}
body{background:var(--bg);color:var(--t1);font-family:var(--font-b);min-height:100vh}

/* NAV */
.nav{height:48px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:0;position:sticky;top:0;z-index:100}
.nav-brand{font-family:var(--font-d);font-weight:700;font-size:18px;text-transform:uppercase;letter-spacing:3px;margin-right:24px;display:flex;align-items:center;gap:8px;text-decoration:none;color:var(--t1)}
.nav-brand .cl{color:var(--mag)}
.nav-brand .gta{font-size:11px;color:var(--t3);letter-spacing:1px;background:var(--mag-dim);padding:2px 6px;clip-path:var(--clip-sm)}
.nav-links{display:flex;gap:0}
.nav-link{font-family:var(--font-d);font-size:12px;text-transform:uppercase;letter-spacing:1.5px;color:var(--t3);text-decoration:none;padding:14px 14px;border-bottom:2px solid transparent;transition:all .2s}
.nav-link:hover{color:var(--t2)}
.nav-link.active{color:var(--mag);border-bottom-color:var(--mag)}
.nav-link.coming{opacity:.35;pointer-events:none}
.nav-live{display:inline-flex;align-items:center;gap:4px}
.nav-live::before{content:'';width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* HERO */
.hero{padding:40px 24px 24px;max-width:1200px;margin:0 auto}
.hero h1{font-family:var(--font-d);font-size:48px;font-weight:700;text-transform:uppercase;letter-spacing:4px;line-height:1}
.hero h1 .accent{color:var(--mag);text-shadow:0 0 40px var(--mag-g)}
.hero p{font-family:var(--font-m);font-size:13px;color:var(--t3);margin-top:8px;letter-spacing:.5px}

/* FILTERS */
.filters{display:flex;gap:8px;padding:0 24px 20px;max-width:1200px;margin:0 auto;flex-wrap:wrap;align-items:center}
.filter-btn{background:var(--bg3);border:1px solid var(--border);color:var(--t2);font-family:var(--font-m);font-size:11px;padding:6px 14px;cursor:pointer;clip-path:var(--clip-sm);transition:all .15s;text-transform:uppercase;letter-spacing:.5px}
.filter-btn:hover{border-color:var(--mag);color:var(--mag)}
.filter-btn.active{background:var(--mag-dim);border-color:var(--mag);color:var(--mag)}
.filter-sep{width:1px;height:20px;background:var(--border)}

/* GRID */
.beef-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(360px,1fr));gap:16px;padding:0 24px 40px;max-width:1200px;margin:0 auto}

/* BEEF CARD */
.beef-card{background:var(--bg2);border:1px solid var(--border);clip-path:var(--clip);padding:0;overflow:hidden;transition:all .25s;cursor:pointer;position:relative}
.beef-card:hover{border-color:var(--mag);transform:translateY(-2px);box-shadow:0 8px 32px rgba(0,0,0,.4)}
.beef-card.both-live{border-color:var(--green);box-shadow:0 0 20px var(--green-dim)}
.beef-card.both-live::after{content:'BOTH SIDES LIVE';position:absolute;top:12px;right:0;background:var(--green);color:#000;font-family:var(--font-m);font-size:9px;letter-spacing:1px;padding:3px 10px 3px 8px;clip-path:polygon(6px 0,100% 0,100% 100%,0 100%);animation:pulse 2s infinite}

/* HEAT BAR */
.heat-strip{height:4px;background:var(--bg);display:flex;gap:1px}
.heat-strip .pip{flex:1;transition:background .3s}

.card-body{padding:16px 18px}
.card-server{font-family:var(--font-m);font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px}
.card-title{font-family:var(--font-d);font-size:22px;font-weight:600;text-transform:uppercase;letter-spacing:1px;line-height:1.2}
.card-desc{font-family:var(--font-b);font-size:13px;color:var(--t2);margin-top:8px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* SIDES */
.card-sides{display:grid;grid-template-columns:1fr auto 1fr;gap:8px;margin-top:14px;align-items:center}
.side{text-align:center}
.side-names{font-family:var(--font-d);font-size:13px;text-transform:uppercase;letter-spacing:.5px}
.side-label{font-family:var(--font-m);font-size:9px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.vs{font-family:var(--font-d);font-size:18px;font-weight:700;color:var(--mag);text-shadow:0 0 12px var(--mag-g)}

/* STATUS + HEAT */
.card-footer{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;background:var(--bg3);border-top:1px solid var(--border);margin-top:14px;margin:-0 -18px -16px}
.status-badge{font-family:var(--font-m);font-size:10px;text-transform:uppercase;letter-spacing:1px;padding:3px 10px;clip-path:var(--clip-sm)}
.status-active{background:var(--mag);color:#fff}
.status-cooling{background:var(--orange);color:#000}
.status-resolved{background:var(--t3);color:var(--t1)}
.status-legendary{background:linear-gradient(135deg,var(--cyan),var(--mag));color:#fff}
.heat-display{display:flex;align-items:center;gap:6px}
.heat-label{font-family:var(--font-m);font-size:10px;color:var(--t3);text-transform:uppercase}
.heat-num{font-family:var(--font-d);font-size:20px;font-weight:700;color:var(--mag)}

/* DETAIL OVERLAY */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:40px 20px}
.overlay.open{display:flex}
.detail{background:var(--bg2);border:1px solid var(--border);clip-path:var(--clip);max-width:700px;width:100%;padding:0}
.detail-heat-strip{height:6px;display:flex;gap:1px;background:var(--bg)}
.detail-heat-strip .pip{flex:1}
.detail-body{padding:24px}
.detail-close{position:absolute;top:16px;right:20px;background:none;border:none;color:var(--t3);font-size:24px;cursor:pointer}
.detail-close:hover{color:var(--red)}
.detail .card-title{font-size:28px}

/* TIMELINE */
.timeline{margin-top:24px;border-left:2px solid var(--border);padding-left:20px}
.beat{margin-bottom:20px;position:relative}
.beat::before{content:'';position:absolute;left:-25px;top:4px;width:10px;height:10px;border-radius:50%;background:var(--mag);border:2px solid var(--bg2)}
.beat.escalation::before{background:var(--red)}
.beat.confrontation::before{background:var(--orange)}
.beat.alliance::before{background:var(--cyan)}
.beat.resolution::before{background:var(--green)}
.beat.betrayal::before{background:var(--yellow)}
.beat-date{font-family:var(--font-m);font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
.beat-type{font-family:var(--font-m);font-size:10px;color:var(--mag);text-transform:uppercase;letter-spacing:1px;margin-left:8px}
.beat-summary{font-family:var(--font-b);font-size:14px;color:var(--t1);margin-top:4px;line-height:1.5}

.empty-state{text-align:center;padding:80px 20px;font-family:var(--font-m);font-size:13px;color:var(--t3)}

/* NOISE */
body::before{content:'';position:fixed;inset:0;background:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.5}
*{position:relative;z-index:1}
.nav{z-index:100}
.overlay{z-index:200}

@media(max-width:600px){
  .hero h1{font-size:32px}
  .beef-grid{grid-template-columns:1fr;padding:0 12px 24px}
  .filters{padding:0 12px 16px}
  .nav-links{overflow-x:auto;-webkit-overflow-scrolling:touch}
}
</style>
</head>
<body>
<nav class="nav">
  <a href="/gta-rp/" class="nav-brand"><span class="cl">Content</span>Lore<span class="gta">GTA RP</span></a>
  <div class="nav-links">
    <a href="/gta-rp/" class="nav-link nav-live">Live</a>
    <a href="/gta-rp/now/" class="nav-link coming">Now</a>
    <a href="/gta-rp/multi/" class="nav-link">Multi-View</a>
    <a href="/gta-rp/lore/" class="nav-link">Lore</a>
    <a href="/gta-rp/beef/" class="nav-link active">Beef</a>
    <a href="/gta-rp/servers/" class="nav-link">Servers</a>
  </div>
</nav>

<div class="hero">
  <h1><span class="accent">Beef</span> Tracker</h1>
  <p>Every rivalry, grudge match and score to settle across UK RP</p>
</div>

<div class="filters" id="filters">
  <button class="filter-btn active" data-filter="all" onclick="filterBeefs('all')">All</button>
  <div class="filter-sep"></div>
  <button class="filter-btn" data-filter="active" onclick="filterBeefs('active')">🔥 Active</button>
  <button class="filter-btn" data-filter="cooling" onclick="filterBeefs('cooling')">❄️ Cooling</button>
  <button class="filter-btn" data-filter="resolved" onclick="filterBeefs('resolved')">✓ Resolved</button>
  <button class="filter-btn" data-filter="legendary" onclick="filterBeefs('legendary')">⭐ Legendary</button>
  <div class="filter-sep"></div>
  <div id="server-filters"></div>
</div>

<div class="beef-grid" id="beef-grid">
  <div class="empty-state">Loading beefs…</div>
</div>

<!-- DETAIL OVERLAY -->
<div class="overlay" id="detail-overlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail" id="detail-content"></div>
</div>

<script>
let allBeefs = [];
let currentFilter = 'all';
let currentServer = null;

async function loadBeefs() {
  try {
    const r = await fetch('/api/beefs');
    const data = await r.json();
    allBeefs = (data.beefs || data || []).map(b => ({
      ...b,
      side_a: typeof b.side_a === 'string' ? JSON.parse(b.side_a || '[]') : (b.side_a || []),
      side_b: typeof b.side_b === 'string' ? JSON.parse(b.side_b || '[]') : (b.side_b || []),
      beats: typeof b.beats === 'string' ? JSON.parse(b.beats || '[]') : (b.beats || []),
    }));
    buildServerFilters();
    renderBeefs();
  } catch(e) {
    document.getElementById('beef-grid').innerHTML = '<div class="empty-state">Failed to load beefs</div>';
  }
}

function buildServerFilters() {
  const servers = [...new Set(allBeefs.map(b => b.server).filter(Boolean))];
  document.getElementById('server-filters').innerHTML = servers.map(s =>
    `<button class="filter-btn" data-server="${s}" onclick="filterServer('${s}')">${s}</button>`
  ).join('');
}

function filterBeefs(status) {
  currentFilter = status;
  currentServer = null;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-filter="${status}"]`).classList.add('active');
  document.querySelectorAll('[data-server]').forEach(b => b.classList.remove('active'));
  renderBeefs();
}

function filterServer(server) {
  currentServer = currentServer === server ? null : server;
  currentFilter = 'all';
  document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.remove('active'));
  if (!currentServer) document.querySelector('[data-filter="all"]').classList.add('active');
  document.querySelectorAll('[data-server]').forEach(b => b.classList.toggle('active', b.dataset.server === currentServer));
  renderBeefs();
}

function renderBeefs() {
  let filtered = allBeefs;
  if (currentFilter !== 'all') filtered = filtered.filter(b => b.status === currentFilter);
  if (currentServer) filtered = filtered.filter(b => b.server === currentServer);

  const grid = document.getElementById('beef-grid');
  if (!filtered.length) {
    grid.innerHTML = '<div class="empty-state">No beefs match your filters</div>';
    return;
  }

  // Sort: active first, then by heat desc
  filtered.sort((a,b) => {
    if (a.status === 'active' && b.status !== 'active') return -1;
    if (b.status === 'active' && a.status !== 'active') return 1;
    return (b.heat||0) - (a.heat||0);
  });

  grid.innerHTML = filtered.map(b => {
    const heat = b.heat || 5;
    const heatColor = heat >= 8 ? 'var(--red)' : heat >= 5 ? 'var(--mag)' : heat >= 3 ? 'var(--orange)' : 'var(--t3)';
    const pips = Array.from({length:10}, (_,i) =>
      `<div class="pip" style="background:${i < heat ? heatColor : 'var(--bg3)'}"></div>`
    ).join('');
    const sideA = (b.side_a || []).join(', ') || '???';
    const sideB = (b.side_b || []).join(', ') || '???';
    const bothLive = b.both_sides_live ? ' both-live' : '';

    return `<div class="beef-card${bothLive}" onclick="showDetail('${b.slug}')">
      <div class="heat-strip">${pips}</div>
      <div class="card-body">
        <div class="card-server">${b.server || 'Unknown Server'}</div>
        <div class="card-title">${b.title}</div>
        <div class="card-desc">${b.description || ''}</div>
        <div class="card-sides">
          <div class="side"><div class="side-label">Side A</div><div class="side-names">${sideA}</div></div>
          <div class="vs">VS</div>
          <div class="side"><div class="side-label">Side B</div><div class="side-names">${sideB}</div></div>
        </div>
        <div class="card-footer">
          <span class="status-badge status-${b.status || 'active'}">${b.status || 'active'}</span>
          <div class="heat-display">
            <span class="heat-label">Heat</span>
            <span class="heat-num" style="color:${heatColor}">${heat}</span>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

async function showDetail(slug) {
  try {
    const r = await fetch(`/api/beef/${slug}`);
    const data = await r.json();
    const b = data.beef || data;
    b.side_a = typeof b.side_a === 'string' ? JSON.parse(b.side_a || '[]') : (b.side_a || []);
    b.side_b = typeof b.side_b === 'string' ? JSON.parse(b.side_b || '[]') : (b.side_b || []);
    b.beats = typeof b.beats === 'string' ? JSON.parse(b.beats || '[]') : (b.beats || []);

    const heat = b.heat || 5;
    const heatColor = heat >= 8 ? 'var(--red)' : heat >= 5 ? 'var(--mag)' : heat >= 3 ? 'var(--orange)' : 'var(--t3)';
    const pips = Array.from({length:10}, (_,i) =>
      `<div class="pip" style="background:${i < heat ? heatColor : 'var(--bg3)'}"></div>`
    ).join('');
    const sideA = (b.side_a || []).join(', ') || '???';
    const sideB = (b.side_b || []).join(', ') || '???';

    let beatsHtml = '';
    if (b.beats && b.beats.length) {
      beatsHtml = '<div class="timeline">' + b.beats.map(bt => `
        <div class="beat ${bt.type || ''}">
          <div><span class="beat-date">${bt.date || 'Unknown'}</span><span class="beat-type">${bt.type || ''}</span></div>
          <div class="beat-summary">${bt.summary || ''}</div>
        </div>`).join('') + '</div>';
    }

    document.getElementById('detail-content').innerHTML = `
      <div class="detail-heat-strip">${pips}</div>
      <div class="detail-body" style="position:relative">
        <button class="detail-close" onclick="closeDetail()">✕</button>
        <div class="card-server">${b.server || 'Unknown Server'}</div>
        <div class="card-title">${b.title}</div>
        <div class="card-desc" style="-webkit-line-clamp:unset;margin-top:12px">${b.description || ''}</div>
        <div class="card-sides" style="margin-top:20px">
          <div class="side"><div class="side-label">Side A</div><div class="side-names">${sideA}</div></div>
          <div class="vs">VS</div>
          <div class="side"><div class="side-label">Side B</div><div class="side-names">${sideB}</div></div>
        </div>
        <div style="display:flex;align-items:center;gap:16px;margin-top:20px">
          <span class="status-badge status-${b.status || 'active'}">${b.status || 'active'}</span>
          <div class="heat-display"><span class="heat-label">Heat</span><span class="heat-num" style="color:${heatColor}">${heat}/10</span></div>
          ${b.both_sides_live ? '<span style="font-family:var(--font-m);font-size:11px;color:var(--green);animation:pulse 2s infinite">⬤ BOTH SIDES LIVE</span>' : ''}
        </div>
        ${beatsHtml ? '<h3 style="font-family:var(--font-d);font-size:16px;text-transform:uppercase;letter-spacing:1.5px;margin-top:28px;color:var(--t2)">Timeline</h3>' : ''}
        ${beatsHtml}
      </div>`;
    document.getElementById('detail-overlay').classList.add('open');
  } catch(e) {
    console.error('Detail load failed:', e);
  }
}

function closeDetail() {
  document.getElementById('detail-overlay').classList.remove('open');
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

loadBeefs();
</script>
</body>
</html>
