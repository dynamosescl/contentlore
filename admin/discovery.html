<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ContentLore Admin — Creator Discovery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:oklch(0.10 0.04 190);--bg2:oklch(0.14 0.05 190);--bg3:oklch(0.19 0.06 190);--bg4:oklch(0.22 0.06 190);
  --border:oklch(0.28 0.06 190);--border-a:oklch(0.38 0.08 190);
  --t1:oklch(0.97 0.02 320);--t2:oklch(0.78 0.05 320);--t3:oklch(0.55 0.06 190);
  --signal:oklch(0.82 0.20 195);--signal-g:oklch(0.82 0.20 195/.35);--signal-dim:oklch(0.82 0.20 195/.12);
  --signal-cyan:oklch(0.85 0.18 200);--signal-cyan-g:oklch(0.85 0.18 200/.30);--signal-cyan-dim:oklch(0.85 0.18 200/.10);
  --success:oklch(0.82 0.22 145);--success-dim:oklch(0.82 0.22 145/.12);
  --orange:oklch(0.78 0.18 60);--red:oklch(0.65 0.25 25);--yellow:oklch(0.88 0.18 95);
  --font-d:'Bebas Neue',Impact,sans-serif;--font-m:'JetBrains Mono',monospace;--font-b:'Inter',system-ui,sans-serif;
  --clip:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));
  --clip-sm:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));
}
html{background:var(--bg);color-scheme:dark}
body{background:var(--bg);color:var(--t1);font-family:var(--font-b);min-height:100vh;-webkit-font-smoothing:antialiased}

.admin-header{background:var(--bg2);border-bottom:1px solid var(--border);padding:16px 24px;display:flex;align-items:center;gap:16px}
.admin-header h1{font-family:var(--font-d);font-size:24px;letter-spacing:3px}
.admin-header .back{color:var(--signal-cyan);text-decoration:none;font-family:var(--font-m);font-size:13px;text-transform:uppercase;letter-spacing:2px}
.admin-header .back:hover{text-decoration:underline}

/* STATUS COUNTS */
.stat-bar{display:flex;gap:12px;padding:16px 24px;max-width:1400px;margin:0 auto;flex-wrap:wrap}
.stat-pill{background:var(--bg2);border:1px solid var(--border);clip-path:var(--clip-sm);padding:10px 16px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px}
.stat-pill:hover{border-color:var(--border-a)}
.stat-pill.active{border-color:var(--signal);background:var(--signal-dim)}
.stat-pill .count{font-family:var(--font-d);font-size:24px;letter-spacing:1px}
.stat-pill .label{font-family:var(--font-m);font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--t3)}
.stat-pill.pending .count{color:var(--orange)}
.stat-pill.watched .count{color:var(--yellow)}
.stat-pill.approved .count{color:var(--success)}
.stat-pill.rejected .count{color:var(--t3)}

/* CONTROLS */
.controls{display:flex;gap:8px;padding:0 24px 16px;max-width:1400px;margin:0 auto;align-items:center;flex-wrap:wrap}
.sort-btn{background:var(--bg3);border:1px solid var(--border);color:var(--t2);font-family:var(--font-m);font-size:12px;padding:7px 14px;cursor:pointer;clip-path:var(--clip-sm);transition:all .15s;text-transform:uppercase;letter-spacing:.5px}
.sort-btn:hover{border-color:var(--signal);color:var(--signal)}
.sort-btn.active{background:var(--signal-dim);border-color:var(--signal);color:var(--signal)}
.controls .sep{width:1px;height:20px;background:var(--border)}
.bulk-btn{background:var(--bg3);border:1px solid var(--border);color:var(--t2);font-family:var(--font-m);font-size:12px;padding:7px 14px;cursor:pointer;clip-path:var(--clip-sm);transition:all .15s}
.bulk-btn:hover{border-color:var(--red);color:var(--red)}
.select-count{font-family:var(--font-m);font-size:12px;color:var(--t3);margin-left:auto}

/* TABLE */
.table-wrap{padding:0 24px 40px;max-width:1400px;margin:0 auto;overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{font-family:var(--font-m);font-size:11px;color:var(--t3);text-transform:uppercase;letter-spacing:1px;text-align:left;padding:12px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg)}
td{padding:12px;border-bottom:1px solid var(--border);font-size:13px;transition:background .15s}
tr:hover td{background:var(--bg2)}
tr.selected td{background:var(--signal-dim)}
td.name{font-family:var(--font-d);font-size:17px;text-transform:uppercase;letter-spacing:1px;white-space:nowrap}
td.name a{color:var(--signal-cyan);text-decoration:none}
td.name a:hover{text-decoration:underline}
td.title{max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--t2);font-size:13px}
td.viewers{font-family:var(--font-m);font-size:13px;color:var(--success)}
td.count{font-family:var(--font-d);font-size:18px;text-align:center;letter-spacing:1px}
td.server{font-family:var(--font-m);font-size:12px;color:var(--signal);text-transform:uppercase}
td.seen{font-family:var(--font-m);font-size:12px;color:var(--t3);white-space:nowrap}
td.actions{white-space:nowrap}
.act-btn{background:none;border:1px solid var(--border);color:var(--t2);font-family:var(--font-m);font-size:11px;padding:5px 11px;cursor:pointer;clip-path:var(--clip-sm);transition:all .15s;margin-right:4px;text-transform:uppercase;letter-spacing:.5px}
.act-btn:hover{border-color:var(--border-a)}
.act-btn.approve{color:var(--success);border-color:oklch(0.82 0.22 145/.4)}
.act-btn.approve:hover{background:var(--success-dim);border-color:var(--success)}
.act-btn.reject{color:var(--red);border-color:oklch(0.65 0.25 25/.4)}
.act-btn.reject:hover{background:oklch(0.65 0.25 25/.1);border-color:var(--red)}
.act-btn.watch{color:var(--yellow);border-color:oklch(0.88 0.18 95/.4)}
.act-btn.watch:hover{background:oklch(0.88 0.18 95/.1);border-color:var(--yellow)}
.check{width:16px;height:16px;accent-color:var(--signal);cursor:pointer}
.tags{display:flex;gap:3px;flex-wrap:wrap;max-width:180px}
.tag{font-family:var(--font-m);font-size:11px;color:var(--t3);padding:2px 6px;background:var(--bg3);border:1px solid var(--border)}
.empty{text-align:center;padding:40px;color:var(--t3);font-family:var(--font-m);font-size:14px}
.avatar{width:28px;height:28px;border-radius:50%;object-fit:cover;border:1px solid var(--border);background:var(--bg3)}
.avatar-ph{width:28px;height:28px;border-radius:50%;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--font-d);font-size:15px;color:var(--t3)}
.toast{position:fixed;bottom:24px;right:24px;padding:14px 20px;font-family:var(--font-m);font-size:14px;clip-path:var(--clip);z-index:999;transform:translateY(100px);opacity:0;transition:all .3s}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:var(--success);color:var(--bg)}
.toast.error{background:var(--red);color:var(--t1)}
::selection{background:var(--signal);color:var(--bg)}
</style>
</head>
<body>
<div class="admin-header">
  <a href="/mod/" class="back">← MOD PANEL</a>
  <a href="/admin/content.html" class="back">CONTENT</a>
  <h1>Creator Discovery</h1>
</div>

<div class="stat-bar" id="stat-bar"></div>

<div class="controls">
  <span style="font-family:var(--font-m);font-size:12px;color:var(--t3);text-transform:uppercase;letter-spacing:1px">Sort:</span>
  <button class="sort-btn active" data-sort="count" onclick="setSort('count')">Seen Most</button>
  <button class="sort-btn" data-sort="viewers" onclick="setSort('viewers')">Top Viewers</button>
  <button class="sort-btn" data-sort="recent" onclick="setSort('recent')">Most Recent</button>
  <div class="sep"></div>
  <button class="bulk-btn" onclick="bulkReject()">Bulk Reject Selected</button>
  <span class="select-count" id="select-count">0 selected</span>
</div>

<div class="table-wrap">
  <table>
    <thead>
      <tr>
        <th><input type="checkbox" class="check" id="select-all" onchange="toggleAll()"></th>
        <th></th>
        <th>Creator</th>
        <th>Title</th>
        <th>Viewers</th>
        <th>Server</th>
        <th>Seen</th>
        <th>Tags</th>
        <th>First / Last</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody id="table-body"><tr><td colspan="10" class="empty">Loading…</td></tr></tbody>
  </table>
</div>

<div class="toast" id="toast"></div>

<script>
const TOKEN = localStorage.getItem('cl_admin_token') || prompt('Enter admin token:');
if (TOKEN) localStorage.setItem('cl_admin_token', TOKEN);
const headers = {'Content-Type':'application/json','Authorization':`Bearer ${TOKEN}`};

let currentStatus = 'pending';
let currentSort = 'count';
let creators = [];
let selected = new Set();

function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `toast ${type} show`;
  setTimeout(() => el.classList.remove('show'), 3000);
}

// Load
async function loadQueue() {
  try {
    const r = await fetch(`/api/admin/discovery?status=${currentStatus}&sort=${currentSort}&limit=100`, { headers });
    if (r.status === 401) { toast('Auth failed — check token', 'error'); return; }
    const data = await r.json();
    creators = data.creators || [];
    renderStats(data.statusCounts || {});
    renderTable();
    selected.clear();
    updateSelectCount();
  } catch(e) { toast('Load failed: ' + e.message, 'error'); }
}

function renderStats(counts) {
  const statuses = ['pending', 'watched', 'approved', 'rejected'];
  document.getElementById('stat-bar').innerHTML = statuses.map(s => {
    const c = counts[s] || 0;
    const active = s === currentStatus ? ' active' : '';
    return `<div class="stat-pill ${s}${active}" onclick="setStatus('${s}')">
      <span class="count">${c}</span>
      <span class="label">${s}</span>
    </div>`;
  }).join('');
}

function renderTable() {
  const tbody = document.getElementById('table-body');
  if (!creators.length) {
    tbody.innerHTML = `<tr><td colspan="10" class="empty">No ${currentStatus} creators</td></tr>`;
    return;
  }
  tbody.innerHTML = creators.map(c => {
    const tags = (c.discovered_tags || []).slice(0, 4).map(t => `<span class="tag">${t}</span>`).join('');
    const platform = c.platform || 'twitch';
    const link = platform === 'twitch' ? `https://twitch.tv/${c.name}` : `https://kick.com/${c.name}`;
    const firstSeen = c.first_seen ? new Date(c.first_seen + 'Z').toLocaleDateString('en-GB', {day:'2-digit',month:'short'}) : '—';
    const lastSeen = c.last_seen ? new Date(c.last_seen + 'Z').toLocaleDateString('en-GB', {day:'2-digit',month:'short'}) : '—';
    const isSelected = selected.has(c.id) ? ' selected' : '';
    const checked = selected.has(c.id) ? ' checked' : '';

    let actions = '';
    if (currentStatus === 'pending' || currentStatus === 'watched') {
      actions = `<button class="act-btn approve" onclick="doAction(${c.id},'approve')">✓</button><button class="act-btn watch" onclick="doAction(${c.id},'watch')">👁</button><button class="act-btn reject" onclick="doAction(${c.id},'reject')">✗</button>`;
    } else if (currentStatus === 'rejected' || currentStatus === 'approved') {
      actions = `<button class="act-btn" onclick="doAction(${c.id},'reset')">↺ Reset</button>`;
    }

    return `<tr class="${isSelected}" data-id="${c.id}">
      <td><input type="checkbox" class="check" data-id="${c.id}" onchange="toggleSelect(${c.id})"${checked}></td>
      <td>${c.profile_image ? `<img class="avatar" src="${c.profile_image}" alt="" loading="lazy" onerror="this.outerHTML='<div class=\\'avatar-ph\\'>${(c.name||'?').charAt(0).toUpperCase()}</div>'">` : `<div class="avatar-ph">${(c.name||'?').charAt(0).toUpperCase()}</div>`}</td>
      <td class="name"><a href="${link}" target="_blank">${c.name}</a></td>
      <td class="title" title="${(c.discovered_title||'').replace(/"/g,'&quot;')}">${c.discovered_title || '—'}</td>
      <td class="viewers">${c.discovered_viewers ? fmtN(c.discovered_viewers) : '—'}</td>
      <td class="server">${c.detected_server || '—'}</td>
      <td class="count">${c.discovery_count || 1}</td>
      <td><div class="tags">${tags}</div></td>
      <td class="seen">${firstSeen} → ${lastSeen}</td>
      <td class="actions">${actions}</td>
    </tr>`;
  }).join('');
}

function setStatus(status) {
  currentStatus = status;
  loadQueue();
}

function setSort(sort) {
  currentSort = sort;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.toggle('active', b.dataset.sort === sort));
  loadQueue();
}

function toggleSelect(id) {
  if (selected.has(id)) selected.delete(id); else selected.add(id);
  const row = document.querySelector(`tr[data-id="${id}"]`);
  if (row) row.classList.toggle('selected', selected.has(id));
  updateSelectCount();
}

function toggleAll() {
  const all = document.getElementById('select-all').checked;
  creators.forEach(c => { if (all) selected.add(c.id); else selected.delete(c.id); });
  document.querySelectorAll('.check[data-id]').forEach(cb => cb.checked = all);
  document.querySelectorAll('tbody tr').forEach(tr => {
    const id = parseInt(tr.dataset.id);
    if (id) tr.classList.toggle('selected', all);
  });
  updateSelectCount();
}

function updateSelectCount() {
  document.getElementById('select-count').textContent = `${selected.size} selected`;
}

async function doAction(id, action) {
  try {
    const r = await fetch('/api/admin/discovery', {
      method: 'POST', headers,
      body: JSON.stringify({ id, action })
    });
    const data = await r.json();
    if (data.success) {
      toast(`${data.name}: ${action}d`);
      loadQueue();
    } else {
      toast(data.error || 'Action failed', 'error');
    }
  } catch(e) { toast('Failed: ' + e.message, 'error'); }
}

async function bulkReject() {
  if (!selected.size) { toast('Nothing selected', 'error'); return; }
  if (!confirm(`Reject ${selected.size} creators?`)) return;
  try {
    const r = await fetch('/api/admin/discovery', {
      method: 'PUT', headers,
      body: JSON.stringify({ ids: [...selected], action: 'reject' })
    });
    const data = await r.json();
    if (data.success) {
      toast(`Rejected ${data.count} creators`);
      loadQueue();
    } else {
      toast(data.error, 'error');
    }
  } catch(e) { toast('Bulk reject failed', 'error'); }
}

function fmtN(n) {
  if (n >= 1000) return (n/1000).toFixed(1) + 'k';
  return n.toString();
}

loadQueue();
</script>
</body>
</html>
