<!doctype html>
<html lang="en-GB">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ContentLore — Coming Soon</title>
  <meta name="description" content="ContentLore is being rebuilt. A new experience is coming soon." />
  <meta name="theme-color" content="#0b0b12" />
  <meta property="og:title" content="ContentLore — Coming Soon" />
  <meta property="og:description" content="We're rebuilding ContentLore. Check back soon." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://contentlore.com/" />
  <meta property="og:site_name" content="ContentLore" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="ContentLore — Coming Soon" />
  <meta name="twitter:description" content="We're rebuilding ContentLore. Check back soon." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Outfit:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      color-scheme: dark;
      --bg: #08080d;
      --bg2: #111122;
      --text: #f4f5ff;
      --muted: #a8adcc;
      --line: rgba(255,255,255,.16);
      --accent: #9f7aea;
      --accent2: #22d3ee;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1000px 500px at 20% -10%, rgba(159,122,234,.30), transparent 55%),
        radial-gradient(1000px 500px at 90% 120%, rgba(34,211,238,.20), transparent 60%),
        linear-gradient(160deg, var(--bg), var(--bg2));
    }
    .card {
      width: min(760px, 100%);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: clamp(28px, 6vw, 56px);
      background: rgba(10, 11, 20, .58);
      backdrop-filter: blur(6px);
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,.35);
    }
    .logo {
      font-family: Outfit, Inter, sans-serif;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      font-size: clamp(18px, 2.2vw, 22px);
      margin: 0 0 20px;
      color: #d9dcff;
    }
    h1 {
      margin: 0;
      font-size: clamp(34px, 7vw, 70px);
      line-height: .98;
      letter-spacing: -.02em;
      font-weight: 800;
      text-wrap: balance;
    }
    p {
      margin: 18px auto 0;
      max-width: 56ch;
      color: var(--muted);
      font-size: clamp(16px, 2.6vw, 21px);
      line-height: 1.45;
    }
    .dots {
      display: inline-flex;
      gap: 8px;
      margin-top: 26px;
      align-items: center;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 0 rgba(159,122,234,.6);
      animation: pulse 1.8s infinite;
    }
    .dot:nth-child(2) { animation-delay: .22s; background: #7c8fff; }
    .dot:nth-child(3) { animation-delay: .44s; background: var(--accent2); }
    @keyframes pulse {
      0% { transform: scale(.94); box-shadow: 0 0 0 0 rgba(159,122,234,.6); }
      70% { transform: scale(1); box-shadow: 0 0 0 12px rgba(159,122,234,0); }
      100% { transform: scale(.94); box-shadow: 0 0 0 0 rgba(159,122,234,0); }
    }
  </style>
</head>
<body>
  <main class="card" aria-live="polite">
    <div class="logo">ContentLore</div>
    <h1>Coming Soon</h1>
    <p>We’re rebuilding ContentLore from the ground up with a fresh design and clearer direction. Thanks for your patience — we’ll be back shortly.</p>
    <div class="dots" aria-hidden="true">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>
  </main>
</body>
</html>
